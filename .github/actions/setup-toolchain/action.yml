# Shared setup-toolchain composite action (Story #3).
#
# Installs pnpm (version read from the repo's packageManager field), Node.js
# (version read from .nvmrc), and project dependencies via
# `pnpm install --frozen-lockfile`.
#
# Usage (ubuntu runners — default):
#   - name: Setup toolchain
#     uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@<sha>
#     with:
#       cache: 'true'
#
# Usage (self-hosted runners — cache: false + stable pnpm-dest):
#   - name: Setup toolchain
#     uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@<sha>
#     with:
#       cache: 'false'
#       pnpm-dest: '${{ runner.temp }}/pnpm'
#
# On self-hosted topologies where multiple job processes share $HOME, concurrent
# jobs race on ~/setup-pnpm (the pnpm/action-setup default). Setting pnpm-dest
# to runner.temp keeps the shim job-scoped, not under $HOME, and unaffected by
# `git clean -ffdx` on the next run.
#
# Usage (transitional lockfile-policy exception — see docs/reusable-workflows.md):
#   - name: Setup toolchain
#     uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@<sha>
#     with:
#       trust-lockfile: 'true'
#
# Usage (wrangler preflight — deploy jobs that run the consumer's
# lockfile-pinned wrangler, Story #231):
#   - name: Setup toolchain
#     uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@<sha>
#     with:
#       require-wrangler: 'true'
#
# SHA-pinned third-party actions.
name: Setup Toolchain
description: >
  Install pnpm (from packageManager field), Node.js (from .nvmrc), and
  project dependencies. Pass cache: 'false' on self-hosted runners that
  maintain their own warm pnpm store. Pass pnpm-dest to override the pnpm
  shim install location (defaults to runner.temp/pnpm for concurrency safety).
  Pass trust-lockfile: 'true' to append --trust-lockfile to the install step
  (default 'false' — unchanged behavior). Pass require-wrangler: 'true' to
  preflight that wrangler is installed from the consumer lockfile after the
  install step (default 'false' — no preflight).

inputs:
  cache:
    description: >
      Enable pnpm store caching via actions/setup-node. Set to 'false' on
      self-hosted runners that maintain their own warm pnpm store.
    required: false
    default: 'true'
  pnpm-dest:
    description: >
      Directory where pnpm/action-setup installs the pnpm shim. Leave unset
      (or pass an empty string) to use the default: runner.temp/pnpm —
      job-scoped, not under $HOME, safe for concurrent self-hosted jobs and
      unaffected by git clean -ffdx. Self-hosted callers should set this
      explicitly to the runner.temp/pnpm expression.
    required: false
    default: ''
  trust-lockfile:
    description: >
      Append --trust-lockfile to the install step when 'true'. Intended as a
      transitional/documented-exception flag for a consumer whose lockfile
      carries pnpm supply-chain policy findings (TRUST_DOWNGRADE /
      MINIMUM_RELEASE_AGE_VIOLATION) it has consciously accepted — not a
      permanent bypass. Default 'false' preserves today's behavior
      (plain `pnpm install --frozen-lockfile`, no trust override).
    required: false
    default: 'false'
  require-wrangler:
    description: >
      When 'true', preflight (after the install step) that wrangler resolves
      from the consumer's own lockfile-pinned install (pnpm exec wrangler
      --version), failing loudly with one authoritative, actionable message
      when it does not. This is the single-sourced replacement for the
      per-call-site preflight blocks the shared deploy workflow used to
      copy-paste before every wrangler invocation (Story #231). Default
      'false' — no preflight, unchanged behavior.
    required: false
    default: 'false'
  packages-read-token:
    description: >
      Optional token for authenticating the install step against a private npm
      registry (e.g. GitHub Packages). When set, it is exported as the
      PACKAGES_READ_TOKEN environment variable for the pnpm install step, so a
      consumer whose committed .npmrc authenticates a private scope through
      that variable resolves it during the frozen install. Leave unset
      (default '') for repos with no private-registry dependency: the variable
      is exported empty and harmlessly ignored (nothing references it). It is
      always exported (defaulting to '') so pnpm never hits an unset-variable
      expansion error.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      with:
        run_install: false
        dest: ${{ inputs['pnpm-dest'] || format('{0}/pnpm', runner.temp) }}

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version-file: .nvmrc
        cache: ${{ inputs.cache == 'true' && 'pnpm' || '' }}

    - name: Install dependencies
      shell: bash
      env:
        TRUST_LOCKFILE: ${{ inputs.trust-lockfile }}
        # Exported (defaulting to '') so a consumer whose committed .npmrc
        # authenticates a private registry via ${PACKAGES_READ_TOKEN} resolves
        # it during the frozen install. Empty for repos without a private dep —
        # nothing references it, and pnpm never sees an unset-variable error.
        PACKAGES_READ_TOKEN: ${{ inputs['packages-read-token'] }}
      run: |
        if [ "${TRUST_LOCKFILE}" = "true" ]; then
          pnpm install --frozen-lockfile --trust-lockfile
        else
          pnpm install --frozen-lockfile
        fi

    # Wrangler preflight (opt-in, Story #231). The ONE authoritative
    # is-wrangler-installed check the shared deploy workflow's jobs opt into,
    # replacing the message-drifting copies that used to precede every
    # `pnpm exec wrangler` call site. `pnpm exec` never falls back to a
    # registry fetch, so a consumer without wrangler as a devDependency is
    # told to pin it rather than deploying a floating version.
    - name: Preflight lockfile-pinned wrangler
      if: ${{ inputs.require-wrangler == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if ! pnpm exec wrangler --version >/dev/null 2>&1; then
          echo "::error::wrangler is not installed from the consumer lockfile." \
            "Add it as a devDependency (pnpm add -D wrangler) so this workflow runs a" \
            "pinned version — the shared workflow refuses to fetch registry-latest wrangler at runtime."
          exit 1
        fi
        echo "wrangler preflight OK: $(pnpm exec wrangler --version)"
