# Shared setup-toolchain composite action (Story #3).
#
# Installs pnpm (version read from the repo's packageManager field), Node.js
# (version read from .nvmrc), and project dependencies via
# `pnpm install --frozen-lockfile`.
#
# Usage (ubuntu runners — default):
#   - name: Setup toolchain
#     uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@<sha>
#     with:
#       cache: 'true'
#
# Usage (self-hosted runners — cache: false + stable pnpm-dest):
#   - name: Setup toolchain
#     uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@<sha>
#     with:
#       cache: 'false'
#       pnpm-dest: '${{ runner.temp }}/pnpm'
#
# On self-hosted topologies where multiple job processes share $HOME, concurrent
# jobs race on ~/setup-pnpm (the pnpm/action-setup default). Setting pnpm-dest
# to runner.temp keeps the shim job-scoped, not under $HOME, and unaffected by
# `git clean -ffdx` on the next run.
#
# Usage (transitional lockfile-policy exception — see docs/reusable-workflows.md):
#   - name: Setup toolchain
#     uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@<sha>
#     with:
#       trust-lockfile: 'true'
#
# SHA-pinned third-party actions.
name: Setup Toolchain
description: >
  Install pnpm (from packageManager field), Node.js (from .nvmrc), and
  project dependencies. Pass cache: 'false' on self-hosted runners that
  maintain their own warm pnpm store. Pass pnpm-dest to override the pnpm
  shim install location (defaults to runner.temp/pnpm for concurrency safety).
  Pass trust-lockfile: 'true' to append --trust-lockfile to the install step
  (default 'false' — unchanged behavior).

inputs:
  cache:
    description: >
      Enable pnpm store caching via actions/setup-node. Set to 'false' on
      self-hosted runners that maintain their own warm pnpm store.
    required: false
    default: 'true'
  pnpm-dest:
    description: >
      Directory where pnpm/action-setup installs the pnpm shim. Leave unset
      (or pass an empty string) to use the default: runner.temp/pnpm —
      job-scoped, not under $HOME, safe for concurrent self-hosted jobs and
      unaffected by git clean -ffdx. Self-hosted callers should set this
      explicitly to the runner.temp/pnpm expression.
    required: false
    default: ''
  trust-lockfile:
    description: >
      Append --trust-lockfile to the install step when 'true'. Intended as a
      transitional/documented-exception flag for a consumer whose lockfile
      carries pnpm supply-chain policy findings (TRUST_DOWNGRADE /
      MINIMUM_RELEASE_AGE_VIOLATION) it has consciously accepted — not a
      permanent bypass. Default 'false' preserves today's behavior
      (plain `pnpm install --frozen-lockfile`, no trust override).
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      with:
        run_install: false
        dest: ${{ inputs['pnpm-dest'] || format('{0}/pnpm', runner.temp) }}

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version-file: .nvmrc
        cache: ${{ inputs.cache == 'true' && 'pnpm' || '' }}

    - name: Install dependencies
      shell: bash
      env:
        TRUST_LOCKFILE: ${{ inputs.trust-lockfile }}
      run: |
        if [ "${TRUST_LOCKFILE}" = "true" ]; then
          pnpm install --frozen-lockfile --trust-lockfile
        else
          pnpm install --frozen-lockfile
        fi
