# CodeQL SAST analysis — unconditional (Story #6).
#
# Analyzes javascript-typescript on pull_request, push to main, and a weekly
# schedule. NOT gated on repository.visibility — runs on both public and
# private repos (CodeQL is available via GitHub Actions on private repos).
#
# Consumable as a reusable workflow (workflow_call) or as a documented
# copy-target for consumer repos (domio/swarm-os, athportal, etc.).
#
# SHA-pinned third-party actions per §6.2 of initial-roadmap.md.
name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Weekly on Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_call:
    inputs:
      language:
        description: 'CodeQL language to analyze'
        required: false
        type: string
        default: 'javascript-typescript'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: ${{ inputs.language || 'javascript-typescript' }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: '/language:${{ inputs.language || ''javascript-typescript'' }}'
