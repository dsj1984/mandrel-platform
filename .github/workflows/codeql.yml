# CodeQL SAST analysis — unconditional (Story #6).
#
# Analyzes javascript-typescript on pull_request, push to main, and a weekly
# schedule. NOT gated on repository.visibility — runs on both public and
# private repos (CodeQL is available via GitHub Actions on private repos).
#
# Consumable as a reusable workflow (workflow_call) or as a documented
# copy-target for consumer repos (domio/swarm-os, athportal, etc.).
#
# SHA-pinned third-party actions.
name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Weekly on Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_call:
    inputs:
      language:
        description: 'CodeQL language to analyze'
        required: false
        type: string
        default: 'javascript-typescript'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    # A hung analysis would otherwise hold a runner for GitHub's 6h default.
    timeout-minutes: 30
    # L11: concurrency at JOB level, not workflow level. This workflow is
    # consumable via `workflow_call`, and a called workflow's WORKFLOW-level
    # `concurrency` is never evaluated (its jobs run inside the CALLER's run) —
    # so consumers got no dedup and rapid pushes stacked full 30-min analyses.
    # Job-level works for both the direct push/PR/schedule triggers here AND
    # the workflow_call path. Rapid pushes to the same ref stack full analyses
    # without this; superseded runs are cancelled — only the newest commit's
    # analysis matters. Keyed by github.ref (the analyzed ref).
    concurrency:
      group: codeql-${{ github.ref }}
      cancel-in-progress: true
    steps:
      # Shallow clone: CodeQL analyzes the checked-out tree; it does not need
      # git history (fetch-depth: 0 only slowed the checkout down).
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: ${{ inputs.language || 'javascript-typescript' }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: '/language:${{ inputs.language || ''javascript-typescript'' }}'
