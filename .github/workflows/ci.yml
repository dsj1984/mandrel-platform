# mandrel-platform CI (Story #9).
#
# Self-tests the mandrel-platform repo on every pull request and push to main.
# Runs the branch-protection context lint to validate docs/runbooks/main-protection.json
# and other fast integrity checks appropriate for a config-and-scripts package.
#
# The context lint (`check-required-contexts`) is the canonical self-test for
# the main-protection contract: it asserts every context in requiredStatusChecks
# and every job in upstreamJobs is actually emitted by a workflow in this repo.
#
# The portability lint (`check-workflow-portability`) closes the cross-repo
# blind spot: GitHub validates a reusable workflow's / composite action's
# interface only when a CONSUMER repo calls it, so footguns like relative
# `uses: ./` paths and `${{ }}` expressions in input descriptions/defaults
# ship green here and break every consumer. The lint asserts both invariants
# statically (see the #24 → #29 → #30 → #32 blocker chain that motivated it).
#
# Consumer adoption:
#   Copy scripts/check-required-contexts.mjs and scripts/check-workflow-portability.mjs
#   into your project's scripts/ directory, then add the steps below to your CI:
#
#     - name: Lint branch-protection contract
#       run: node scripts/check-required-contexts.mjs
#     - name: Lint workflow portability
#       run: node scripts/check-workflow-portability.mjs
#
#   See docs/runbooks/branch-protection-setup.md for the full setup guide.
#
# SHA-pinned third-party actions per roadmap.md.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Branch-protection context lint ────────────────────────────────────────
  #
  # Validates that every context in docs/runbooks/main-protection.json
  # is actually emitted by a workflow job in this repo. Exits non-zero on a
  # phantom check. This is the canonical self-test for the contract; consumers
  # copy scripts/check-required-contexts.mjs and run the same step in their CI.
  check-required-contexts:
    name: Lint branch-protection contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc

      - name: Lint branch-protection contract
        run: node scripts/check-required-contexts.mjs

  # ── Cross-repo portability lint ───────────────────────────────────────────
  #
  # Statically asserts the invariants GitHub only enforces at cross-repo
  # call / action-load time: no relative `uses: ./` paths in reusable
  # workflows; no `${{ }}` expressions in workflow_call input/secret
  # descriptions or input defaults (and composite-action input defaults);
  # and no internal SHA pin lagging onto a manifest that still carries one
  # of those footguns. These produce a silent "workflow file issue / 0 jobs"
  # or a "Set up job" load failure for consumers but pass naive in-repo CI —
  # the exact failure modes of #30, #32 and #35. Consumers copy
  # scripts/check-workflow-portability.mjs and run the same step.
  #
  # fetch-depth: 0 is REQUIRED so the pin-lag guard (Rule 3) can resolve the
  # manifest at each pinned SHA via `git show`. Without full history the guard
  # degrades to a non-fatal skipped NOTE.
  check-workflow-portability:
    name: Lint workflow portability
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc

      - name: Lint workflow portability
        run: node scripts/check-workflow-portability.mjs

  # ── Aggregator: single required branch-protection context ─────────────────
  #
  # Mirrors the ci-required pattern from pr-quality.yml: a single stable
  # context name that consumers register in branch protection. Passes when
  # all jobs in `needs` succeed or are skipped.
  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - check-required-contexts
      - check-workflow-portability
    steps:
      - name: Check all job results
        shell: bash
        env:
          CTX_RESULT: ${{ needs.check-required-contexts.result }}
          PORT_RESULT: ${{ needs.check-workflow-portability.result }}
        run: |
          failed=()
          for job_result in \
            "check-required-contexts:${CTX_RESULT}" \
            "check-workflow-portability:${PORT_RESULT}"; do
            job="${job_result%%:*}"
            result="${job_result##*:}"
            if [ "${result}" != "success" ] && [ "${result}" != "skipped" ]; then
              failed+=("${job}(${result})")
            fi
          done

          if [ ${#failed[@]} -gt 0 ]; then
            echo "❌ Failed jobs: ${failed[*]}" >&2
            exit 1
          fi

          echo "✅ All jobs passed."
