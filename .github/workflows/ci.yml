# mandrel-platform CI (Story #9).
#
# Self-tests the mandrel-platform repo on every pull request and push to main.
# Runs the branch-protection context lint to validate docs/runbooks/main-protection.json
# and other fast integrity checks appropriate for a config-and-scripts package.
#
# The context lint (`check-required-contexts`) is the canonical self-test for
# the main-protection contract: it asserts every context in requiredStatusChecks
# and every job in upstreamJobs is actually emitted by a workflow in this repo.
#
# The portability lint (`check-workflow-portability`) closes the cross-repo
# blind spot: GitHub validates a reusable workflow's / composite action's
# interface only when a CONSUMER repo calls it, so footguns like relative
# `uses: ./` paths and `${{ }}` expressions in input descriptions/defaults
# ship green here and break every consumer. The lint asserts both invariants
# statically (see the #24 → #29 → #30 → #32 blocker chain that motivated it).
#
# Consumer adoption:
#   Copy scripts/check-required-contexts.mjs and scripts/check-workflow-portability.mjs
#   into your project's scripts/ directory, then add the steps below to your CI:
#
#     - name: Lint branch-protection contract
#       run: node scripts/check-required-contexts.mjs
#     - name: Lint workflow portability
#       run: node scripts/check-workflow-portability.mjs
#
#   See docs/runbooks/branch-protection-setup.md for the full setup guide.
#
# SHA-pinned third-party actions.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Node-script checks (contract, portability, pins, unit tests) ──────────
  #
  # One job, one checkout, one Node setup, one step per script. These four
  # checks were previously four separate jobs, each paying ~30-45s of
  # checkout/setup for seconds of actual work — the majority of the
  # workflow's runner minutes on every PR and push (Story #238). Only the
  # `ci-required` aggregator is a required branch-protection context, so
  # per-job granularity bought log grouping, not protection; per-STEP
  # granularity in this job preserves the same at-a-glance failure signal.
  # No path filters: required contexts wedge as "Expected" when path-filtered.
  #
  # The steps, in order:
  #
  # 1. Branch-protection context lint — validates that every context in
  #    docs/runbooks/main-protection.json is actually emitted by a workflow
  #    job in this repo. Exits non-zero on a phantom check. Canonical
  #    self-test for the contract; consumers copy
  #    scripts/check-required-contexts.mjs and run the same step.
  #
  # 2. Cross-repo portability lint — statically asserts the invariants GitHub
  #    only enforces at cross-repo call / action-load time: no relative
  #    `uses: ./` paths in reusable workflows; no `${{ }}` expressions in
  #    workflow_call input/secret descriptions or input defaults (and
  #    composite-action input defaults); and no internal SHA pin lagging onto
  #    a manifest that still carries one of those footguns. These produce a
  #    silent "workflow file issue / 0 jobs" or a "Set up job" load failure
  #    for consumers but pass naive in-repo CI — the exact failure modes of
  #    #30, #32 and #35. Consumers copy scripts/check-workflow-portability.mjs.
  #
  # 3. Third-party action-pin ratchet — walks every workflow and composite
  #    action.yml and FAILS if any third-party `uses:` is pinned to anything
  #    other than a full 40-char commit SHA (a single `owner/repo@v4`
  #    slipping past review re-introduces mutable-tag risk with 3× blast
  #    radius across the consumer fleet, Story #112). First-party
  #    self-references (dsj1984/mandrel-platform/*) are exempt — governed by
  #    the portability lint's pin-lag guard (Rule 3). Algorithm unit-tested
  #    in scripts/check-action-pins.{mjs,test.mjs}; consumers copy the script.
  #
  # 4. Unit tests — the repo's own `npm test` suite
  #    (`node --test "scripts/**/*.test.mjs"`, Story #192): ~2,800 LOC of
  #    guardrail + edge-security tests over the very scripts consumers copy
  #    into their CI. Dependency-free (Node's built-in test runner), so the
  #    job needs only a Node runtime, not a package install.
  #
  # fetch-depth: 0 is REQUIRED so the portability lint's pin-lag guard
  # (Rule 3) can resolve the manifest at each pinned SHA via `git show`.
  # Without full history the guard degrades to a non-fatal skipped NOTE.
  node-scripts:
    name: Node-script checks (contract, portability, pins, tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc

      - name: Lint branch-protection contract
        run: node scripts/check-required-contexts.mjs

      - name: Lint workflow portability
        run: node scripts/check-workflow-portability.mjs

      - name: Lint third-party action pins
        run: node scripts/check-action-pins.mjs

      - name: Run unit tests
        run: npm test

  # ── Workflow lint (actionlint + embedded shellcheck) ──────────────────────
  #
  # The reusable workflows ARE the product, yet their YAML was historically
  # validated only by a full cross-repo smoke round-trip — expensive, late
  # feedback. The entire SAST-track shell-bug class (#81/#82/#85/#86/#92)
  # surfaced only at smoke time; actionlint catches that class statically.
  # This job shifts that validation left into the platform's own ci-required
  # (Story #108). It complements — does not replace — the cross-repo smoke gate.
  #
  # actionlint's embedded shellcheck lints every `run:` block, which is what
  # catches the shell-bug class. shellcheck ships preinstalled on the
  # ubuntu-latest image, so no extra install step is needed for it.
  #
  # PIN HYGIENE: actionlint is pinned to a release version and the linux_amd64
  # release archive is verified against its pinned SHA-256 before extraction —
  # the same download-and-verify posture this repo uses for the pinned gitleaks
  # binary in secret-scan-push.yml. Bump ACTIONLINT_VERSION and ACTIONLINT_SHA256
  # in lockstep (checksums:
  # https://github.com/rhysd/actionlint/releases/download/v<version>/actionlint_<version>_checksums.txt).
  actionlint:
    name: Lint workflows (actionlint + shellcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ACTIONLINT_VERSION: '1.7.12'
      ACTIONLINT_SHA256: '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Download + verify a PINNED actionlint binary, then lint every workflow
      # under .github/workflows/. actionlint auto-discovers `.github/workflows/`
      # when invoked with no path args, so pr-quality.yml, deploy-cloudflare.yml,
      # secret-scan-push.yml and the rest are all covered. shellcheck is on
      # PATH (ubuntu-latest), so actionlint runs it on every `run:` block.
      - name: Install pinned actionlint and lint workflows
        shell: bash
        run: |
          set -euo pipefail
          asset="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${asset}"
          tmp="$(mktemp -d)"
          echo "Downloading pinned actionlint: ${url}"
          curl -fsSL "$url" -o "${tmp}/${asset}"
          actual="$(sha256sum "${tmp}/${asset}" | awk '{print $1}')"
          if [ "$actual" != "$ACTIONLINT_SHA256" ]; then
            echo "::error::actionlint checksum mismatch for ${asset}: expected ${ACTIONLINT_SHA256}, got ${actual}"
            exit 1
          fi
          echo "✅ actionlint ${asset} checksum verified."
          tar -xzf "${tmp}/${asset}" -C "${tmp}" actionlint
          chmod +x "${tmp}/actionlint"
          "${tmp}/actionlint" -version
          # No path args → actionlint discovers and lints all .github/workflows/*.
          # -color forces the annotated output even though stdout is not a TTY.
          "${tmp}/actionlint" -color

  # ── Aggregator: single required branch-protection context ─────────────────
  #
  # Mirrors the ci-required pattern from pr-quality.yml: a single stable
  # context name that consumers register in branch protection. Passes when
  # all jobs in `needs` succeed or are skipped.
  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - node-scripts
      - actionlint
    steps:
      # Self-maintaining aggregator: results are derived from `toJSON(needs)`,
      # so the `needs:` array above is the single source of truth — adding a
      # job to `needs:` is the ONLY edit required to include it in the gate.
      # Pass on `success`/`skipped`; fail on anything else, INCLUDING
      # `cancelled` (load-bearing for the fail-fast design: a tier cancelled
      # by a sibling's failure must not read as green). Requires `jq` on the
      # runner (preinstalled on GitHub-hosted images). Guarded by
      # scripts/check-ci-required-aggregator.test.mjs — do not reintroduce a
      # hardcoded per-job env/loop list here.
      - name: Check all required job results
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failed="$(jq -r '
            to_entries
            | map(select(.value.result != "success" and .value.result != "skipped"))
            | map("\(.key)(\(.value.result))")
            | join(" ")
          ' <<<"${NEEDS_JSON}")"

          if [ -n "${failed}" ]; then
            echo "❌ Failed jobs: ${failed}" >&2
            exit 1
          fi

          echo "✅ All required jobs passed (success or skipped)."
