# Reusable Cloudflare deploy workflow with defence-in-depth (Story #5).
#
# Consumable as a reusable workflow (workflow_call) by any consumer repo:
#
#   jobs:
#     deploy:
#       uses: dsj1984/mandrel-platform/.github/workflows/deploy-cloudflare.yml@<sha>
#       with:
#         environment: production
#         workers: "api,worker-cron"
#         migrate: true
#       secrets: inherit
#
# Runner (Story #222): every job's `runs-on:` reads the optional `runner`
# input (default 'ubuntu-latest'), mirroring secret-scan-push.yml /
# pr-quality.yml. The secret-isolation-audit job's gitleaks download is
# runner-portable (Story #229): the shared gitleaks-scan composite action's
# cross-platform asset selector resolves the darwin/linux arm64/x64 asset
# for whatever platform `runner` lands on.
#
# CI-green gate (Story #175, slimmed in Story #237): `github.event` inside a
# reusable workflow is the CALLER's event, so this workflow owns the CI-green
# guard even though it cannot own the caller's `on:` block. The gate is a
# job-level `if:` expression on the two entry jobs (no dedicated gate job —
# a red upstream `workflow_run` spins up ZERO runners; the whole chain
# reports `skipped`):
#
#   github.event_name != 'workflow_run' ||
#   github.event.workflow_run.conclusion == 'success'
#
# Defence-in-depth layers (in execution order):
#   0. environments-isolation-audit — opt-in (enable-environments-isolation-audit),
#                              audits GitHub Environments' deployment branch
#                              policies against the canonical posture (custom
#                              policy, single allowed branch, no wildcard).
#   1. secret-isolation-audit — scans for plaintext secrets before any code runs.
#   2. check-env             — validates required env/secrets exist for the target
#                              environment; blocks deploy if any are absent.
#   3. migration             — when migrate:true, snapshots the database before
#                              any forward-only migration runs, then applies the
#                              migrations — two named steps in ONE job (D1 by
#                              default; overridable via snapshot-command /
#                              migrate-command for non-D1 engines, gated by an
#                              optional pre-migrate-assert-command host guard).
#                              The built-in D1 export is BLOCKING: a failed export
#                              (or an empty snapshot artifact) fails the run so no
#                              migrate:true pipeline proceeds without a recovery
#                              point. The D1 database name is passed positionally
#                              via the optional d1-database input (falls back to
#                              wrangler config resolution when empty).
#   4. deploy                — optionally runs build-command (with build-env),
#                              then deploys each worker via wrangler deploy, or
#                              runs a consumer-supplied deploy-command (for
#                              pnpm-workspace monorepos with no root wrangler
#                              config) that replaces the built-in deploy loop.
#   4b. worker-secrets       — opt-in (worker-secrets input). After deploy and
#                              BEFORE boot-smoke, writes each named runtime
#                              secret onto every deployed worker via the
#                              VERSIONS secret API (wrangler versions secret
#                              put — immune to Cloudflare error 10215) and
#                              promotes the resulting version to 100%, so
#                              boot-smoke probes a worker carrying current
#                              secret values and any active≠latest split from a
#                              prior rollback self-heals (Story #170). Default
#                              off → skipped, byte-identical to today.
#   5. boot-smoke            — HTTP health-check against each deployed worker, or
#                              a consumer-supplied smoke-command. Non-200 fails
#                              the run AND triggers wrangler rollback. The
#                              workers.dev host is derived from the account
#                              subdomain slug (never the account ID) and can be
#                              overridden with smoke_base_url / smoke_paths, or
#                              disabled entirely with smoke:false. Opt-in
#                              verify-commit-sha (Story #176) additionally
#                              asserts the health response's "version" field
#                              matches github.sha, failing smoke (and
#                              triggering rollback) on a mismatch.
#   6. require-deploy-ran    — always-on (Story #268), one cheap runner. Green
#                              stops meaning "deployed" and starts also meaning
#                              "silently did nothing" the moment a
#                              `workflow_run`-gated caller's upstream CI goes
#                              red: layer 1's CI-green guard skips the entire
#                              chain, and an all-`skipped` run concludes
#                              `success` — visually identical to a real deploy.
#                              This job runs regardless of the guard and fails
#                              LOUDLY exactly when the chain was gated off by
#                              non-success upstream CI, so the run is honestly
#                              red instead of falsely green. Every other
#                              trigger (and every green-CI workflow_run) is
#                              unaffected.
#
# Command seams (Story #41): the D1 export/apply, build, and workers.dev smoke
# defaults are all overridable so non-D1 / build-step / custom-host consumers can
# adopt the workflow without losing snapshot, migrate, build-env, or smoke safety
# nets. With NONE of the seam inputs set, behaviour is the built-in D1
# path (export/apply against the remote DB + workers.dev smoke) — the smoke host
# is the corrected account subdomain rather than the account ID, and the D1
# snapshot is blocking (a failed export fails the run).
#
# Secret surface (FROZEN — Story #61, build-split capstone): only the stable
# {CLOUDFLARE_*, TURSO_*} set crosses this reusable-workflow boundary. CF creds
# deploy; TURSO creds feed the non-D1 snapshot/migrate seam commands. The former
# optional build-secret allowlist (Story #46: SENTRY_*, CLERK_*, SITE_URL) is
# gone: consumers build CONSUMER-SIDE and hand the deploy-ready output over via
# the build-artifact input (Story #56), so no build secret reaches this workflow.
# build-command stays (now secretless; build-env carries plaintext public values).
#
# SHA-pinned third-party actions.
#
# Wrangler version pinning (Story #202): EVERY wrangler invocation in this
# workflow — the built-in D1 export/migrate, the deploy loop, the
# worker-secrets provisioning, the `wrangler whoami` subdomain derivation,
# and the auto-rollback — runs the CONSUMER'S OWN lockfile-pinned wrangler
# via `pnpm exec wrangler`, installed by the Setup toolchain step
# (`pnpm install --frozen-lockfile`). This workflow NEVER fetches a
# registry-latest wrangler at runtime (the previous pnpx-style behaviour)
# with production Cloudflare credentials in scope. The is-wrangler-installed
# preflight is SINGLE-SOURCED in setup-toolchain's `require-wrangler` input
# (Story #231): each job that runs wrangler passes require-wrangler with an
# expression matching exactly the conditions under which its built-in steps
# invoke wrangler, and the preflight fails LOUDLY with one authoritative,
# actionable message (`pnpm add -D wrangler`) when wrangler is not a
# devDependency — replacing the five message-drifting per-call-site copies.
#
# Extracted deploy scripts (Story #231): the boot-smoke probe
# (scripts/deploy-boot-smoke.mjs) and the worker-secrets provisioning loop
# (scripts/deploy-worker-secrets.mjs) live as versioned, unit-tested platform
# scripts, sparse-checked out of dsj1984/mandrel-platform at
# `github.job_workflow_sha` — the exact commit the caller's
# `deploy-cloudflare.yml@<ref>` pin resolved to — so the script version
# always travels in lockstep with the workflow pin (same model as
# uptime-apply.yml → apply-uptime-monitors.mjs). The per-worker deploy loop
# and the rollback loop stay inline: each is a short, branch-free bash loop
# whose extraction would add a checkout dependency to the hot deploy path
# without materially improving testability.
name: Deploy Cloudflare

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target Cloudflare environment (e.g. staging, production)'
        required: true
        type: string
      runner:
        description: >
          Runs-on label for every job in this workflow. Single string (e.g.
          'ubuntu-latest') or a JSON-encoded label array string (e.g.
          '["self-hosted","domio-runner"]'). Defaults to ubuntu-latest.
        required: false
        type: string
        default: 'ubuntu-latest'
      gh-environment:
        description: >
          GitHub Deployment Environment name to attach to every
          secret-touching job, so a consumer whose deploy secrets are
          Environment-scoped (the recommended isolation pattern) can resolve
          them. This is DISTINCT from the "environment" input above: that one
          is the Cloudflare --env label (DEPLOY_ENV -> wrangler --env), whereas
          this one is a GitHub Deployment Environment used purely for secret
          scoping and protection rules. Leave empty (the default) for
          repo-scoped / D1 consumers — an empty value attaches no GitHub
          Environment and behaviour is unchanged. Set it (e.g. staging,
          production) only when your CLOUDFLARE_* / TURSO_* secrets live in a
          GitHub Environment of that name.
        required: false
        type: string
        default: ''
      workers:
        description: >
          Comma-separated list of Cloudflare Worker names to deploy
          (e.g. "api,worker-cron"). Each name must match a wrangler.toml
          [env.<environment>] section in the consumer repo.
        required: true
        type: string
      migrate:
        description: >
          Run database migrations. When true, a pre-migration snapshot is
          taken before any forward-only migration is applied. Defaults to the
          D1 tooling; override migrate-command / snapshot-command for non-D1
          engines.
        required: false
        type: boolean
        default: false
      db-engine:
        description: >
          Database engine label for the default migrate/snapshot tooling.
          "d1" (default) uses wrangler d1 export/apply. Any other value (e.g.
          "turso") requires migrate-command and snapshot-command to be set,
          since this workflow ships no built-in tooling for non-D1 engines.
        required: false
        type: string
        default: 'd1'
      d1-database:
        description: >
          Optional D1 database name passed as the positional argument to the
          built-in "wrangler d1 export" / "wrangler d1 migrations apply"
          commands (both target --remote). Only consulted on the built-in D1
          path (db-engine d1, no snapshot-command / migrate-command). Leave
          empty (the default) to let wrangler resolve the database from the
          consumer's wrangler config for the target --env; set it when the
          config does not make the database unambiguous for the environment.
        required: false
        type: string
        default: ''
      snapshot-command:
        description: >
          Consumer-supplied pre-migration snapshot command. When set, it
          replaces the built-in "wrangler d1 export" snapshot so a non-D1
          consumer (e.g. turso db shell .dump) can take its own recovery
          point. Runs in the checkout root before migrate.
          ARTIFACT CONTRACT (M13): any files this command writes under temp/
          (glob temp/* — NOT only *.sql) are uploaded as the snapshot
          artifact. Unlike the built-in D1 export — whose .sql dump IS the
          recovery point and whose upload is BLOCKING — a consumer
          snapshot-command that writes NO temp/ file is NOT an error: absence
          is a loud warning, because your recovery reference may legitimately
          live in the GitHub step summary or an external PITR system (e.g.
          Turso point-in-time recovery) rather than a temp/ file. If you rely
          on the uploaded artifact as your recovery point, ensure the command
          writes it under temp/.
        required: false
        type: string
        default: ''
      migrate-command:
        description: >
          Consumer-supplied migrate command. When set, it replaces the
          built-in "wrangler d1 migrations apply" so a non-D1 consumer (e.g.
          drizzle-kit migrate) can apply its own migrations. Runs after the
          snapshot and after pre-migrate-assert-command (if set).
        required: false
        type: string
        default: ''
      pre-migrate-assert-command:
        description: >
          Optional host-guard hook command run BEFORE migrate (and before the
          snapshot is consumed). A non-zero exit aborts the migration job, so a
          consumer can refuse to migrate unless the resolved DB host matches an
          expected pattern (defence-in-depth against migrating the wrong DB).
        required: false
        type: string
        default: ''
      build-command:
        description: >
          Optional build command run in the deploy job BEFORE wrangler deploy
          (e.g. "pnpm build" or "astro build"). Now SECRETLESS: only plaintext
          build-env values and the stable {CLOUDFLARE_*, TURSO_*} secrets are
          in scope — no build secrets cross this boundary. Build-time env from
          build-env is exported into the shell before this runs, so
          prerender/astro builds bake the correct build-time values. Prefer the
          consumer-side build + build-artifact handoff for any build that needs
          its own secrets.
        required: false
        type: string
        default: ''
      build-env:
        description: >
          Optional build-time environment passthrough, one KEY=VALUE per line.
          Each line is exported into the build shell before build-command runs.
          Use for prerender-only PLAINTEXT build-time values (e.g.
          CHAT_DISABLED, PUBLIC_TURNSTILE_SITE_KEY, ENVIRONMENT, SITE_URL). Do
          NOT put secrets here in plaintext. Build secrets no longer cross this
          reusable-workflow boundary at all: consumers build consumer-side and
          hand the deploy-ready output over via build-artifact, so the deploy
          secret surface is frozen at {CLOUDFLARE_*, TURSO_*}.
        required: false
        type: string
        default: ''
      build-artifact:
        description: >
          Optional name of a build artifact (uploaded by the consumer's own
          build job earlier in the same run) to download into the deploy job
          before deploying. When set, the deploy job downloads this artifact
          and SKIPS build-command entirely (the deploy-ready output is already
          built consumer-side, so no framework rebuild and no build secrets
          cross this reusable-workflow boundary). When empty (the default),
          behaviour is unchanged — build-command runs exactly as it does today.
          This is the consumer-side-build handoff that freezes the deploy
          secret allowlist at the stable CLOUDFLARE_* / TURSO_* set.
        required: false
        type: string
        default: ''
      build-artifact-path:
        description: >
          Optional extraction path for the downloaded build-artifact. When
          empty (the default), the artifact is extracted into the checkout
          root / working directory. Only consulted when build-artifact is set.
        required: false
        type: string
        default: ''
      deploy-command:
        description: >
          Optional deploy command run in the deploy job. When set, it REPLACES
          the built-in per-worker root-level "wrangler deploy" loop (symmetric
          to snapshot-command / migrate-command / build-command / smoke-command).
          Use this for pnpm-workspace monorepos that have no root wrangler
          config, where each worker must be deployed from its own package dir
          (e.g. cd apps/api && wrangler deploy, or wrangler deploy --config
          dist/server/wrangler.json). It runs once in the checkout root with
          WORKERS (the deployed csv), DEPLOY_ENV, the Cloudflare creds, and the
          frozen {CLOUDFLARE_*, TURSO_*} secret set exported (no build secrets).
          The deployed_workers output is set to the workers input so downstream
          smoke / rollback targeting keeps working. When unset, the built-in
          root-level deploy loop runs.
        required: false
        type: string
        default: ''
      rollback-command:
        description: >
          Optional rollback command run in the boot-smoke job when smoke fails
          or is cancelled (M14 — symmetric to deploy-command). When set, it
          REPLACES the built-in per-worker root-level "pnpm exec wrangler
          rollback" loop. Use this for pnpm-workspace monorepos whose workers
          were deployed from their own package dir (or via `wrangler deploy
          --config dist/server/wrangler.json`), where the built-in root-level
          rollback cannot address them — leaving the "auto-rollback" guarantee
          silently void. It runs once in the checkout root with WORKERS (the
          resolved rollback csv — the smoke-failed set, or every deployed
          worker when smoke wedged before writing its failed-list), DEPLOY_ENV,
          the Cloudflare creds, and the frozen {CLOUDFLARE_*, TURSO_*} secret
          set exported. When unset, the built-in root-level rollback loop runs.
        required: false
        type: string
        default: ''
      smoke:
        description: >
          Run the built-in boot-smoke + auto-rollback job. Default true. Set
          false to skip the built-in smoke entirely so the caller can run its
          own post-deploy verification step (auto-rollback is also skipped).
        required: false
        type: boolean
        default: true
      smoke-command:
        description: >
          Consumer-supplied smoke command. When set, it REPLACES the built-in
          workers.dev probe (covers multi-route / custom-host consumers). It
          runs once in the checkout root with WORKERS (the deployed csv) and
          SMOKE_BASE_URL exported; a non-zero exit fails the run and triggers
          the same wrangler rollback as the built-in probe.
        required: false
        type: string
        default: ''
      smoke_base_url:
        description: >
          Optional base URL for the built-in probe (e.g. https://godomio.com).
          When set, each smoke path is appended to this base instead of the
          derived workers.dev host. Also exported to smoke-command as
          SMOKE_BASE_URL. No trailing slash.
        required: false
        type: string
        default: ''
      smoke_paths:
        description: >
          Comma-separated list of paths the built-in probe requests against
          each target (e.g. "/,/portal,/api/health"). Defaults to "/health".
          Each path must start with a leading slash.
        required: false
        type: string
        default: '/health'
      workers_dev_subdomain:
        description: >
          Optional workers.dev account subdomain slug used to build the
          built-in probe URL (e.g. "dsj1984" → https://<worker>.dsj1984.workers.dev).
          When empty, it is derived at runtime from "wrangler whoami". NEVER
          pass the account ID here — workers.dev subdomains are keyed by the
          account name/slug, not the account UUID.
        required: false
        type: string
        default: ''
      verify-commit-sha:
        description: >
          Opt-in (Story #176). When true, the built-in boot-smoke probe
          additionally asserts that each deployed worker's health endpoint
          reports the SHA this run is deploying (github.sha), turning the
          release-tagging convention into a deploy-time invariant. Requires
          the worker's health endpoint to return a JSON body with a
          "version" field set to the deployed commit SHA (see
          docs/runbooks/post-deploy-smoke.md#3-health-endpoint-contract), e.g.
          `app.get('/health', (c) => c.json({ status: 'ok', version:
          c.env.GIT_COMMIT_SHA }))`. A mismatch (or a missing/unparsable
          "version" field) fails the smoke check for that worker and
          triggers the same auto-rollback as an HTTP-status failure.
          Ignored when smoke-command is set (the consumer-supplied probe
          owns its own verification). Defaults to false so existing
          consumers are unaffected until they opt in.
        required: false
        type: boolean
        default: false
      worker-secrets:
        description: >
          Opt-in (Story #170). Newline-separated list of Worker runtime
          secret NAMES to provision IN-PIPELINE, from the values the deploy
          job already receives via `secrets: inherit`, immediately after the
          deploy step and BEFORE boot-smoke. Each name is written onto every
          deployed worker via the VERSIONS secret API
          (`wrangler versions secret put <NAME>`), which — unlike the standard
          `wrangler secret put` — is IMMUNE to Cloudflare error 10215
          ("secret modification with Worker versions") even when a prior
          rollback left the Worker at active ≠ latest-uploaded. The workflow
          then promotes the resulting version to 100% traffic
          (`wrangler versions deploy`), so the just-uploaded secrets are the
          ACTIVE version boot-smoke probes AND the active/latest split any
          prior rollback introduced is realigned (self-heal). Use this ONLY
          for deploy-critical secrets a health check depends on (e.g.
          TURSO_AUTH_TOKEN); leave everything else to the out-of-band
          Infisical→Cloudflare sync. Empty (the default) is a no-op — the step
          is skipped entirely and behaviour is byte-identical to today. See
          docs/reusable-workflows.md#in-pipeline-worker-secrets-opt-in for the
          in-pipeline-vs-Infisical guidance.
        required: false
        type: string
        default: ''
      enable-environments-isolation-audit:
        description: >
          Run the shared Environments isolation-audit job (Story #172)
          BEFORE secret-isolation-audit. Verifies that gh-environment (when
          set) and any additional environments-to-audit both restrict
          deploys via a custom deployment branch policy naming ONLY
          isolation-audit-branch (default "main") — never a wildcard,
          never "protected branches only", never zero policies. Defaults to
          false (opt-in) so existing consumers without branch policies
          configured yet (see docs/runbooks/environments-provisioning.md#6-deployment-branch-policy)
          are not broken by adopting a workflow update. Set true once your
          consumer has applied the canonical posture.
        required: false
        type: boolean
        default: false
      environments-to-audit:
        description: >
          Comma-separated GitHub Environment names to audit when
          enable-environments-isolation-audit is true, IN ADDITION to
          gh-environment (deduplicated automatically). Leave empty to audit
          only gh-environment. Ignored when
          enable-environments-isolation-audit is false.
        required: false
        type: string
        default: ''
      isolation-audit-branch:
        description: >
          The single branch name the isolation audit requires each audited
          environment to restrict deploys to. Defaults to "main" (the
          platform's canonical deployable branch).
        required: false
        type: string
        default: 'main'
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: 'Cloudflare API token with Worker and D1 write permissions'
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        description: 'Cloudflare Account ID'
        required: true
      # ----- Migrate secret passthrough (frozen allowlist) -----
      # The deploy secret surface is FROZEN at {CLOUDFLARE_*, TURSO_*}
      # (build-split capstone, Story #61). The former optional build-secret
      # allowlist (Story #46: SENTRY_*, PUBLIC_CLERK_PUBLISHABLE_KEY,
      # CLERK_SECRET_KEY, SITE_URL) has been removed: every consumer now builds
      # consumer-side and hands the deploy-ready output over via build-artifact,
      # so no build secret crosses this reusable-workflow boundary. Only the two
      # TURSO secrets below remain optional — the non-D1 snapshot/migrate seam
      # commands consume them. The CLOUDFLARE_* secrets above are required for
      # deploy. Callers may still forward further secrets via `secrets: inherit`
      # and reference them from their own seam commands, but the workflow itself
      # maps only the frozen set into its seam-step `env:` blocks (never via
      # `with:`).
      TURSO_DATABASE_URL:
        description: 'Optional Turso database URL for non-D1 snapshot/migrate seam commands.'
        required: false
      TURSO_AUTH_TOKEN:
        description: 'Optional Turso auth token for non-D1 snapshot/migrate seam commands.'
        required: false
      # Scanner-only optional secret — NOT part of the frozen deploy/seam
      # passthrough set above (it is never mapped into a deploy or seam `env:`).
      # VESTIGIAL since the gitleaks-CLI migration: the secret-isolation-audit
      # job now runs the event-agnostic gitleaks CLI (not gitleaks-action), which
      # does not consume a licence. The declaration is retained so consumers that
      # still pass it via an explicit `secrets:` map do not error; it is no longer
      # referenced anywhere in this file and can be dropped in a future breaking
      # release.
      GITLEAKS_LICENSE:
        description: 'Deprecated/unused: retained for back-compat with callers that still pass it.'
        required: false
      audit-token:
        description: >
          Optional PAT used ONLY by the environments-isolation-audit job to
          read each environment's deployment_branch_policy. That field requires
          repo Administration:read, which is NOT a grantable GITHUB_TOKEN
          workflow permission — so with the default token the audit false-fails
          "NO deployment branch policy" even when a policy IS set. Provide a
          classic PAT with `repo` scope (or a fine-grained PAT with
          Administration: read) when enable-environments-isolation-audit is
          true. Falls back to github.token when unset (behaviour byte-identical
          to before this secret existed — the audit only reads what the default
          token can see).
        required: false
      packages-read-token:
        description: >
          Optional token for reading a private npm registry (GitHub Packages
          etc.) during the build/snapshot jobs' install. Passed to every
          setup-toolchain call site so a consumer whose committed .npmrc
          authenticates a private scope via ${PACKAGES_READ_TOKEN} installs
          cleanly on the frozen-lockfile deploy jobs. Omit for repos without a
          private-registry dependency (default behaviour unchanged).
        required: false
      # ----- worker-secrets passthrough (opt-in, Story #170) -----
      # The in-pipeline worker-secrets step (see the `worker-secrets` input and
      # the "Provision worker secrets in-pipeline" step in the deploy job) does
      # NOT declare each provisioned secret as its own named `secrets:` entry —
      # a reusable workflow cannot map a runtime-variable set of secret NAMES
      # into typed `secrets:` slots, and freezing a per-name allowlist here would
      # defeat the opt-in "consumer enumerates the names" model. Instead, the
      # step resolves each name the consumer lists in `worker-secrets` from the
      # INHERITED secrets context (`${{ toJSON(secrets) }}`), which a caller
      # forwards with `secrets: inherit` exactly as it already does for the seam
      # commands. This keeps the frozen {CLOUDFLARE_*, TURSO_*} DEPLOY surface
      # unchanged (those two remain the only secrets mapped into deploy/seam
      # `env:` blocks) while letting the opt-in step provision any consumer-named
      # runtime secret that is already inherited. When `worker-secrets` is empty
      # (the default) the step is skipped and no secret beyond the frozen set is
      # ever read.

# Least-privilege: content-read only. Each job that needs more escalates
# individually (wrangler deploy needs no additional GH permissions).
permissions:
  contents: read

# Serialization lives at the JOB level (migration / deploy / boot-smoke), NOT
# here (H1, L11). A called workflow's WORKFLOW-level `concurrency` is never
# evaluated — its jobs run inside the CALLER's run — so a workflow-level block
# here would be dead code that promises a "one deploy per environment"
# serialization it cannot deliver (this repo documents the same pitfall in
# uptime-apply.yml). The real serialization is the job-level `concurrency`
# on migration / deploy / boot-smoke, keyed by
# `deploy-cf-${{ github.repository }}-${{ inputs.environment }}` with
# `cancel-in-progress: false` (queue, never cancel a mid-apply migration).

jobs:
  # ---------------------------------------------------------------------------
  # 0a. Environments isolation audit (opt-in, Story #172)
  #    Verifies that this repo's GitHub Environments restrict deploys to the
  #    canonical branch (default "main") via a custom deployment branch
  #    policy — never a wildcard, never "protected branches only", never zero
  #    policies. Runs BEFORE the secret scan so a mis-scoped environment is
  #    caught even faster than a leaked secret. Opt-in via
  #    enable-environments-isolation-audit (default false) so existing
  #    consumers without branch policies configured yet are not broken by
  #    adopting a workflow bump.
  # ---------------------------------------------------------------------------
  environments-isolation-audit:
    name: Environments isolation audit
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    # Opt-in gate AND the CI-green gate (see the header comment): on a
    # `workflow_run` trigger with a non-success upstream conclusion this job —
    # like every job in the workflow — is skipped before a runner is assigned.
    if: >-
      ${{ inputs.enable-environments-isolation-audit == true &&
          (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    permissions:
      contents: read
    steps:
      - name: Resolve audited environment list
        id: resolve-envs
        shell: bash
        run: |
          set -euo pipefail
          declare -A seen=()
          envs=()
          IFS=',' read -ra extra <<< "$ENVIRONMENTS_TO_AUDIT"
          for e in "$GH_ENVIRONMENT" "${extra[@]}"; do
            e="$(echo "$e" | xargs)"
            [ -z "$e" ] && continue
            if [ -z "${seen[$e]:-}" ]; then
              seen[$e]=1
              envs+=("$e")
            fi
          done
          if [ "${#envs[@]}" -eq 0 ]; then
            echo "::error::enable-environments-isolation-audit is true but no environment resolved (set gh-environment and/or environments-to-audit)."
            exit 1
          fi
          printf -v joined '%s,' "${envs[@]}"
          echo "environments=${joined%,}" >> "$GITHUB_OUTPUT"
        env:
          GH_ENVIRONMENT: ${{ inputs.gh-environment }}
          ENVIRONMENTS_TO_AUDIT: ${{ inputs.environments-to-audit }}

      - name: Audit deployment branch policies
        uses: dsj1984/mandrel-platform/.github/actions/environments-isolation-audit@b48be232f44cba7fb759a69808cf50fffb42895d # v0.21.0
        with:
          environments: ${{ steps.resolve-envs.outputs.environments }}
          allowed-branch: ${{ inputs.isolation-audit-branch }}
        env:
          # Prefer the caller-supplied PAT (audit-token) — reading an
          # environment's deployment_branch_policy needs repo Administration:read,
          # which the default GITHUB_TOKEN cannot be granted. Fall back to
          # github.token when no PAT is provided.
          GH_TOKEN: ${{ secrets.audit-token || github.token }}

  # ---------------------------------------------------------------------------
  # 1. Secret isolation audit
  #    Scans the checkout for hardcoded secrets BEFORE any deploy step runs.
  #    Fails fast so a secret-in-source-tree never reaches Cloudflare.
  #
  #    CI-green guard (Story #175, slimmed in Story #237): `github.event`
  #    inside a reusable workflow is the CALLER's event, so this workflow can
  #    own the CI-green guard even though it cannot own the caller's `on:`
  #    block. Consumers gating staging on CI (`workflow_run`) previously
  #    hand-copied this exact guard as a caller-side `preflight` job
  #    (athportal, swarm-os) — `workflow_run` fires on BOTH success and
  #    failure, so without the guard a red upstream run would still deploy.
  #    Centralizing it here means a `workflow_run`-triggered caller needs no
  #    caller-side preflight guard at all; see the canonical
  #    `templates/workflows/deploy-staging.yml` caller template.
  #
  #    The guard is a job-level `if:` expression (not a dedicated gate job —
  #    Story #237 dropped the former `require-ci-green` job, which booted a
  #    runner on EVERY upstream CI completion just to evaluate this pure
  #    expression):
  #
  #    - `workflow_run` events: this job is skipped unless the upstream run's
  #      conclusion was `success`; every downstream job then skips through
  #      the `needs:` chain, so a red upstream run spins up ZERO runners.
  #      (This trades Story #175's skip-with-notice annotation for a
  #      zero-runner skipped chain — the all-skipped run is itself the
  #      unambiguous signal; see Story #237.)
  #    - Every other event (`workflow_dispatch`, `push`, `pull_request`, …):
  #      passes through unconditionally — those triggers are operator- or
  #      branch-protection-intentional and carry no upstream conclusion to
  #      gate on.
  # ---------------------------------------------------------------------------
  secret-isolation-audit:
    name: Secret isolation audit
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    needs: [environments-isolation-audit]
    if: >-
      ${{ always() &&
          (needs.environments-isolation-audit.result == 'success' || needs.environments-isolation-audit.result == 'skipped') &&
          (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Checkout
        # Shallow clone (the actions/checkout default): the scan below is
        # `gitleaks dir` — a working-tree scan that never reads git history —
        # so the former `fetch-depth: 0` full-history clone was pure waste on
        # every deploy (Story #237). Full-HISTORY secret coverage lives in
        # secret-scan-push.yml (`gitleaks git` over fetch-depth: 0).
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Gitleaks secret scan
        # The gitleaks-action rejects the `workflow_run` event ("The
        # [workflow_run] event is not yet supported"), which breaks any deploy
        # gated on CI-green via a `workflow_run` trigger (swarm-os is the first
        # consumer to exercise the shared deploy that way). The shared
        # gitleaks-scan composite invokes the gitleaks CLI directly instead —
        # it is event-agnostic and preserves the secret-in-tree guarantee on
        # every trigger (push / PR / workflow_run / dispatch / schedule).
        # Pinned by version + SHA-256 for supply-chain safety (the map is
        # single-homed in the composite); `dir` scans the checked-out tree,
        # matching this job's intent. Runner-portable (Story #229): the
        # composite's cross-platform asset selector replaced this step's
        # former fixed-linux_x64 download, so a darwin/arm64 self-hosted
        # `runner` override resolves the right binary for free. Blocking scan:
        # a non-zero exit (leak found) fails this job and, via the downstream
        # `needs:`, the whole deploy.
        #
        # PIN NOTE (Story #229, same lockstep model as setup-toolchain / #162):
        # pinned to the intra-PR commit that introduced the composite — the
        # first SHA whose tree contains it. Bump to the next release SHA in
        # the post-release pin-bump follow-up.
        uses: dsj1984/mandrel-platform/.github/actions/gitleaks-scan@b48be232f44cba7fb759a69808cf50fffb42895d
        with:
          mode: dir

  # ---------------------------------------------------------------------------
  # 2. Environment gate
  #    Validates that required secrets/env vars exist for the target environment.
  #    Blocks deploy if any critical variables are absent.
  # ---------------------------------------------------------------------------
  check-env:
    name: Check environment (${{ inputs.environment }})
    # GitHub Deployment Environment (distinct from the Cloudflare --env label).
    # Empty (the default) attaches no Environment — behaviour is unchanged.
    environment: ${{ inputs.gh-environment }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    needs: secret-isolation-audit
    # H0 un-poison: this job MUST carry an explicit `if:` with a status-check
    # function (`!cancelled()`). Without one, GitHub's implicit `success()`
    # evaluates the TRANSITIVE ancestor chain, not just direct needs — so the
    # default-skipped opt-in `environments-isolation-audit` root
    # (enable-environments-isolation-audit defaults false → always `skipped`)
    # skip-poisons this job on EVERY trigger (actions/runner#2205), silently
    # skipping check-env and cascading through migration/deploy/boot-smoke.
    # `!cancelled()` scopes the gate to the DIRECT need
    # (secret-isolation-audit == 'success') and the CI-green guard, so a
    # skipped opt-in ancestor no longer poisons the chain while a genuinely
    # failed/cancelled run still stops here.
    if: >-
      ${{ !cancelled() &&
          needs.secret-isolation-audit.result == 'success' &&
          (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          errors=0

          check_var() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::Required secret/var '$name' is absent or empty for environment '$DEPLOY_ENV'."
              errors=$((errors + 1))
            else
              echo "::notice::$name is set."
            fi
          }

          check_var "CLOUDFLARE_API_TOKEN"  "$CLOUDFLARE_API_TOKEN"
          check_var "CLOUDFLARE_ACCOUNT_ID" "$CLOUDFLARE_ACCOUNT_ID"

          # Non-D1 engines must supply their own migrate + snapshot commands —
          # this workflow ships no built-in tooling for them. Fail fast here so
          # a passing migrate:true never silently skips the real migration.
          if [ "$MIGRATE" = "true" ] && [ "$DB_ENGINE" != "d1" ]; then
            if [ -z "$MIGRATE_COMMAND" ]; then
              echo "::error::db-engine '$DB_ENGINE' requires migrate-command (no built-in tooling for non-D1 engines)."
              errors=$((errors + 1))
            fi
            if [ -z "$SNAPSHOT_COMMAND" ]; then
              echo "::error::db-engine '$DB_ENGINE' requires snapshot-command (no built-in tooling for non-D1 engines)."
              errors=$((errors + 1))
            fi
          fi

          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors required variable(s) missing — aborting deploy."
            exit 1
          fi
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          MIGRATE: ${{ inputs.migrate }}
          DB_ENGINE: ${{ inputs.db-engine }}
          MIGRATE_COMMAND: ${{ inputs.migrate-command }}
          SNAPSHOT_COMMAND: ${{ inputs.snapshot-command }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ---------------------------------------------------------------------------
  # 3. Migration (snapshot + apply, one job — Story #237)
  #    Only runs when migrate:true. Named steps preserve per-stage UI
  #    visibility, in this exact order:
  #      1. Pre-migration snapshot  — snapshots the database BEFORE any
  #         forward-only migration is applied so a recovery point always
  #         exists. Defaults to "wrangler d1 export"; a consumer-supplied
  #         snapshot-command replaces it for non-D1 engines.
  #      2. Upload snapshot artifact — BLOCKING (if-no-files-found: error);
  #         the artifact is durably uploaded before any migration touches
  #         the database.
  #      3. Pre-migrate host-guard assertion — optional
  #         pre-migrate-assert-command hook (non-zero aborts).
  #      4. Apply migrations — defaults to "wrangler d1 migrations apply";
  #         a consumer-supplied migrate-command replaces it.
  #    Formerly two sequential jobs (pre-migration-snapshot → migrate) with
  #    identical gating and environment: — merging them drops one runner
  #    spin-up plus a duplicate checkout + frozen install per migrate deploy,
  #    and removes the ambiguous 'skipped' cause the deploy job's if: had to
  #    defend against. Timeout is 30 (was 20+20): the two stages share ONE
  #    checkout + toolchain install now, so 30 covers the combined worst case
  #    with headroom.
  # ---------------------------------------------------------------------------
  migration:
    name: Migration (${{ inputs.environment }})
    # GitHub Deployment Environment (distinct from the Cloudflare --env label).
    # Empty (the default) attaches no Environment — behaviour is unchanged.
    environment: ${{ inputs.gh-environment }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    needs: check-env
    # H1: reusable-side per-environment serialization at JOB level (a called
    # workflow's workflow-level concurrency is inert — see the top-of-file
    # note). Keyed by caller repo + target environment; cancel-in-progress
    # false so an in-flight `wrangler d1 migrations apply` is queued behind,
    # never cancelled mid-apply (a half-applied forward-only migration is
    # unrecoverable).
    concurrency:
      group: deploy-cf-${{ github.repository }}-${{ inputs.environment }}
      cancel-in-progress: false
    # H0 un-poison: an explicit status-check function (`!cancelled()`) plus a
    # direct-need result check, so the skipped opt-in
    # environments-isolation-audit ancestor does not transitively skip-poison
    # this job (actions/runner#2205). `inputs.migrate == true` keeps the
    # no-migrate skip; the check-env result gate ensures we only migrate after
    # a real environment validation.
    if: >-
      ${{ !cancelled() &&
          needs.check-env.result == 'success' &&
          inputs.migrate == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup toolchain
        uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@b48be232f44cba7fb759a69808cf50fffb42895d
        with:
          cache: 'true'
          packages-read-token: ${{ secrets.packages-read-token }}
          # Single-sourced wrangler preflight (Story #231): the built-in D1
          # export / migrations-apply branches run `pnpm exec wrangler`, so
          # require it whenever EITHER built-in branch is active (a consumer
          # that supplies BOTH snapshot-command and migrate-command owns its
          # own tooling and is exempt, matching the former inline preflights).
          require-wrangler: ${{ (inputs.snapshot-command == '' || inputs.migrate-command == '') && 'true' || 'false' }}

      - name: Pre-migration snapshot (backup before migration)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p temp
          SNAPSHOT_KEY="pre-migration-${DEPLOY_ENV}-$(date -u +%Y%m%dT%H%M%SZ)"
          echo "SNAPSHOT_KEY=$SNAPSHOT_KEY" >> "$GITHUB_ENV"
          export SNAPSHOT_KEY

          if [ -n "$SNAPSHOT_COMMAND" ]; then
            # Consumer-supplied snapshot (non-D1). Runs with SNAPSHOT_KEY and
            # DEPLOY_ENV exported; the consumer is responsible for writing its
            # dump where it wants (temp/*.sql is uploaded as the artifact).
            echo "::group::Running consumer snapshot-command"
            bash -c "$SNAPSHOT_COMMAND"
            echo "::endgroup::"
          else
            # Built-in D1 export — BLOCKING.
            #
            # Exports the remote D1 database for this environment to a local SQL
            # dump. The database name is passed positionally (d1-database input);
            # when empty, wrangler resolves it from the consumer's wrangler
            # config for the target --env. This is the recovery point for the
            # forward-only migration that follows, so a failed export MUST fail
            # the job (set -euo pipefail above; no warning fallback) rather than
            # letting the pipeline migrate without a snapshot. The empty-artifact
            # case is caught by if-no-files-found: error on the upload step.
            #
            # In production workflows, callers should forward the dump to durable
            # storage (R2, GCS, S3) via an additional step using `secrets: inherit`.
            #
            # Wrangler is invoked via the consumer's OWN lockfile-pinned binary
            # (`pnpm exec wrangler`), installed by the Setup toolchain step
            # (`pnpm install --frozen-lockfile`) and preflighted by its
            # require-wrangler input. This NEVER fetches an unpinned
            # registry-latest wrangler at runtime with production Cloudflare
            # credentials in scope.
            pnpm exec wrangler d1 export ${D1_DATABASE:+"$D1_DATABASE"} \
              --env "$DEPLOY_ENV" \
              --remote \
              --output "temp/${SNAPSHOT_KEY}.sql"
          fi
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          D1_DATABASE: ${{ inputs.d1-database }}
          SNAPSHOT_COMMAND: ${{ inputs.snapshot-command }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Migrate secret passthrough (frozen allowlist: TURSO_*).
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      # Snapshot-artifact upload — split by path (M13).
      #
      # The built-in D1 export and a consumer-supplied snapshot-command have
      # DIFFERENT artifact contracts, so they upload separately:
      #
      #   • Built-in D1 path (snapshot-command empty): the .sql dump IS the
      #     recovery point, so its upload stays BLOCKING — an absent
      #     temp/*.sql means the export produced no dump, and a migrate:true
      #     pipeline must not proceed without a recovery point.
      #   • Consumer snapshot-command (snapshot-command set): the consumer owns
      #     its recovery reference, which may legitimately live in the step
      #     summary or an external PITR system (e.g. Turso PITR) rather than a
      #     temp/ file. Uploading temp/*.sql with if-no-files-found: error here
      #     converted every such consumer from silent-green to hard-red on
      #     activation (M13, verified against both Turso consumers). So this
      #     path globs temp/* (any artifact the command wrote, not only .sql)
      #     and downgrades absence to a LOUD WARNING, never an error.
      - name: Upload snapshot artifact (built-in D1 export — BLOCKING)
        if: ${{ inputs.snapshot-command == '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: db-snapshot-${{ inputs.environment }}-${{ github.run_id }}
          path: temp/*.sql
          retention-days: 7
          # Blocking: an empty snapshot artifact means the D1 export produced no
          # dump — fail the run so a migrate:true pipeline never proceeds without
          # a recovery point. This upload runs BEFORE the apply step below, so
          # the recovery point is durably stored before any migration runs.
          if-no-files-found: error

      - name: Upload snapshot artifact (consumer snapshot-command — warn on absence)
        if: ${{ inputs.snapshot-command != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: db-snapshot-${{ inputs.environment }}-${{ github.run_id }}
          # Widened glob: upload any artifact the consumer snapshot-command
          # wrote under temp/, not only *.sql (a non-D1 dump may be .md, .dump,
          # .json, …). Absence is a LOUD WARNING, not an error: the consumer's
          # recovery reference may live in the step summary or an external PITR
          # system. See docs/reusable-workflows.md#snapshot-command-artifact-contract.
          path: temp/*
          retention-days: 7
          if-no-files-found: warn

      - name: Pre-migrate host-guard assertion
        if: ${{ inputs.pre-migrate-assert-command != '' }}
        shell: bash
        run: |
          echo "::group::Running pre-migrate-assert-command host guard"
          bash -c "$PRE_MIGRATE_ASSERT_COMMAND"
          echo "::endgroup::"
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          PRE_MIGRATE_ASSERT_COMMAND: ${{ inputs.pre-migrate-assert-command }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Migrate secret passthrough (frozen allowlist: TURSO_*).
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Apply migrations
        shell: bash
        run: |
          if [ -n "$MIGRATE_COMMAND" ]; then
            echo "::group::Running consumer migrate-command"
            bash -c "$MIGRATE_COMMAND"
            echo "::endgroup::"
          else
            # Built-in D1 migrations apply against the remote database. The
            # database name is passed positionally (d1-database input); when
            # empty, wrangler resolves it from the consumer's wrangler config
            # for the target --env. --skip-confirmation is the documented
            # non-interactive flag (the previous --yes was not a valid flag).
            #
            # Consumer lockfile-pinned wrangler (`pnpm exec wrangler`),
            # preflighted by setup-toolchain's require-wrangler — see the
            # snapshot step for why registry-latest is never fetched at runtime.
            pnpm exec wrangler d1 migrations apply ${D1_DATABASE:+"$D1_DATABASE"} \
              --env "$DEPLOY_ENV" \
              --remote \
              --skip-confirmation
          fi
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          D1_DATABASE: ${{ inputs.d1-database }}
          MIGRATE_COMMAND: ${{ inputs.migrate-command }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Migrate secret passthrough (frozen allowlist: TURSO_*).
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

  # ---------------------------------------------------------------------------
  # 4. Deploy workers
  #    Optionally runs build-command (with build-env exported) BEFORE deploy,
  #    then deploys each worker listed in the `workers` csv input.
  #    Runs after check-env (no-migrate path) or migration (migrate:true path).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy workers (${{ inputs.environment }})
    # GitHub Deployment Environment (distinct from the Cloudflare --env label).
    # Empty (the default) attaches no Environment — behaviour is unchanged.
    environment: ${{ inputs.gh-environment }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    needs:
      - check-env
      - migration
    # H1: same per-environment serialization group as migration / boot-smoke,
    # so a migration and its deploy queue as one unit against concurrent
    # callers targeting the same environment. cancel-in-progress false —
    # never cancel an in-flight deploy.
    concurrency:
      group: deploy-cf-${{ github.repository }}-${{ inputs.environment }}
      cancel-in-progress: false
    # H3: `!cancelled()` (NOT `always()`). `always()` jobs execute even in a
    # cancelled run, so a superseded run whose check-env/migration already
    # passed would still start `deploy` after cancellation and race the
    # replacement (old SHA landing after new SHA). `!cancelled()` is otherwise
    # identical semantics but skips on cancellation. It also carries the H0
    # direct-need result checks so a transitively-skipped ancestor cannot
    # skip-poison this job.
    # Run when check-env passes AND migration succeeded or was skipped.
    # 'skipped' is unambiguous here (Story #237): snapshot + apply are steps
    # of the single migration job, so a failed snapshot FAILS that job rather
    # than reporting a downstream sibling as 'skipped'. Given
    # check-env == 'success', migration is 'skipped' if and only if
    # inputs.migrate == false — the recovery-point guarantee holds without a
    # separate inputs.migrate guard.
    if: >-
      !cancelled() &&
      needs.check-env.result == 'success' &&
      (needs.migration.result == 'success' ||
       needs.migration.result == 'skipped')
    outputs:
      deployed_workers: ${{ steps.deploy-step.outputs.deployed_workers }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup toolchain
        uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@b48be232f44cba7fb759a69808cf50fffb42895d
        with:
          cache: 'true'
          packages-read-token: ${{ secrets.packages-read-token }}
          # Single-sourced wrangler preflight (Story #231): the built-in
          # per-worker deploy loop runs `pnpm exec wrangler deploy` (skipped
          # when deploy-command replaces it), and the opt-in worker-secrets
          # step runs `pnpm exec wrangler versions …` regardless of which
          # deploy path ran — require wrangler whenever either applies.
          require-wrangler: ${{ (inputs.deploy-command == '' || inputs.worker-secrets != '') && 'true' || 'false' }}

      # Consumer-side-build handoff (Story #56): when build-artifact is set,
      # download the prebuilt deploy-ready output the consumer's own build job
      # uploaded earlier in this run. The build-command step below is skipped
      # (no framework rebuild, no build secrets cross the boundary). Artifacts
      # are run-scoped and reusable-workflow jobs share the caller's run, so
      # the handoff works without any cross-run plumbing.
      - name: Download build artifact (optional)
        if: ${{ inputs.build-artifact != '' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.build-artifact }}
          path: ${{ inputs.build-artifact-path }}

      - name: Build (optional)
        # Skip the framework rebuild when a prebuilt artifact was supplied — a
        # build-artifact caller already has the deploy-ready output downloaded
        # above. A build-command caller (build-artifact empty) is unchanged.
        if: ${{ inputs.build-command != '' && inputs.build-artifact == '' }}
        shell: bash
        run: |
          # Export build-time env (one KEY=VALUE per line) before the build so
          # prerender/astro builds bake the correct build-time values.
          if [ -n "$BUILD_ENV" ]; then
            echo "::group::Exporting build-env"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              case "$line" in
                \#*) continue ;;  # allow comment lines
              esac
              key="${line%%=*}"
              value="${line#*=}"
              echo "::notice::build-env: exporting $key"
              export "${key}=${value}"
            done <<< "$BUILD_ENV"
            echo "::endgroup::"
          fi

          echo "::group::Running build-command"
          bash -c "$BUILD_COMMAND"
          echo "::endgroup::"
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          BUILD_COMMAND: ${{ inputs.build-command }}
          BUILD_ENV: ${{ inputs.build-env }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Frozen allowlist: TURSO_*. Build is now secretless — build secrets
          # cross the boundary consumer-side via build-artifact, not here.
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Deploy each worker
        id: deploy-step
        shell: bash
        run: |
          # ----- Consumer-supplied deploy replaces the built-in loop -----
          # For pnpm-workspace monorepos with no root wrangler config, the
          # built-in root-level loop errors ("application detection logic has
          # been run in the root of a workspace"). deploy-command lets the
          # consumer publish each worker from its own package dir. It runs once
          # with WORKERS (the csv) + DEPLOY_ENV + the frozen {CLOUDFLARE_*,
          # TURSO_*} secret set exported (no build secrets). deployed_workers is
          # set to the workers input so downstream smoke / rollback targeting
          # keeps working.
          if [ -n "$DEPLOY_COMMAND" ]; then
            echo "::group::Running consumer deploy-command"
            export WORKERS="$WORKERS_CSV"
            if bash -c "$DEPLOY_COMMAND"; then
              echo "✅ consumer deploy-command succeeded"
            else
              echo "::error::Consumer deploy-command FAILED."
              echo "::endgroup::"
              exit 1
            fi
            echo "::endgroup::"
            # Downstream smoke / rollback target the requested workers csv.
            echo "deployed_workers=${WORKERS_CSV}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ----- Built-in root-level deploy loop (default) -----
          # Consumer lockfile-pinned wrangler (`pnpm exec wrangler`) — installed
          # by the Setup toolchain step and preflighted by its require-wrangler
          # input, so a consumer without wrangler as a devDependency failed
          # LOUDLY before anything deployed.
          IFS=',' read -ra WORKERS <<< "$WORKERS_CSV"
          deployed=()
          failed=()

          for worker in "${WORKERS[@]}"; do
            worker="$(echo "$worker" | xargs)"  # trim whitespace
            echo "::group::Deploying $worker to ${DEPLOY_ENV}"
            # No --compatibility-date override: the consumer's wrangler config
            # owns compatibility_date. Injecting today's date here would silently
            # override the pinned value on every deploy, defeating the
            # wrangler-baseline compatibility_date staleness policy and risking
            # untested runtime-behaviour changes at deploy time.
            if pnpm exec wrangler deploy \
              --name "$worker" \
              --env "$DEPLOY_ENV"; then
              echo "✅ $worker deployed"
              deployed+=("$worker")
            else
              echo "::error::❌ wrangler deploy failed for worker: $worker"
              failed+=("$worker")
            fi
            echo "::endgroup::"
          done

          # Surface deployed list to smoke job
          printf -v deployed_str '%s,' "${deployed[@]}"
          echo "deployed_workers=${deployed_str%,}" >> "$GITHUB_OUTPUT"

          if [ "${#failed[@]}" -gt 0 ]; then
            printf "::error::Deploy failed for: %s\n" "${failed[*]}"
            exit 1
          fi
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          WORKERS_CSV: ${{ inputs.workers }}
          DEPLOY_COMMAND: ${{ inputs.deploy-command }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Frozen allowlist: TURSO_* (CLOUDFLARE_* above). No build secrets.
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      # ----- In-pipeline worker-secrets provisioning (opt-in, Story #170) -----
      # Runs AFTER the deploy step and BEFORE boot-smoke (boot-smoke is a
      # separate downstream job). For each secret NAME the consumer enumerates
      # in `worker-secrets`, write the value (resolved from the INHERITED
      # secrets context) onto every deployed worker via the VERSIONS secret API
      # — `wrangler versions secret put`, which is immune to Cloudflare error
      # 10215 even when a prior rollback left the Worker at
      # active ≠ latest-uploaded — then promote the resulting version to 100%
      # with `wrangler versions deploy`. This makes the just-written secrets the
      # ACTIVE version that boot-smoke probes AND realigns any active/latest
      # split a prior rollback introduced (self-heal), breaking the
      # rollback ↔ secret-sync deadlock. When `worker-secrets` is empty (the
      # default) both steps are skipped and behaviour is byte-identical to
      # today.
      #
      # The provisioning loop lives in the versioned, unit-tested platform
      # script scripts/deploy-worker-secrets.mjs (Story #231), sparse-checked
      # out below at `github.job_workflow_sha` — the exact commit the caller's
      # `deploy-cloudflare.yml@<ref>` pin resolved to — so the script version
      # travels in lockstep with the workflow pin (the uptime-apply.yml →
      # apply-uptime-monitors.mjs model).
      - name: Checkout (shared worker-secrets script)
        if: ${{ inputs.worker-secrets != '' }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: dsj1984/mandrel-platform
          # `job_workflow_sha` is a valid runtime github-context field but is
          # absent from actionlint's pinned context type model, so read it
          # through the `fromJSON(toJSON(github))` escape hatch (typed `any`)
          # to keep the workflow lint-clean — same pattern as uptime-apply.yml.
          ref: ${{ fromJSON(toJSON(github)).job_workflow_sha }}
          sparse-checkout: |
            scripts/deploy-worker-secrets.mjs
          sparse-checkout-cone-mode: false
          path: _mandrel-platform-deploy
          persist-credentials: false

      - name: Provision worker secrets in-pipeline (versions secret API)
        if: ${{ inputs.worker-secrets != '' }}
        shell: bash
        # Secret values are resolved inside the script from SECRETS_CONTEXT and
        # passed to wrangler over STDIN — never argv, never logs (GitHub
        # additionally redacts inherited secret values in log output).
        run: node "${GITHUB_WORKSPACE}/_mandrel-platform-deploy/scripts/deploy-worker-secrets.mjs"
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          DEPLOYED_WORKERS: ${{ steps.deploy-step.outputs.deployed_workers }}
          WORKER_SECRETS: ${{ inputs.worker-secrets }}
          # Whole inherited secrets context as JSON so the step can resolve each
          # consumer-enumerated name at runtime (values redacted in logs). This
          # does NOT widen the frozen DEPLOY surface — only names the consumer
          # explicitly lists in worker-secrets are read, and only when opted in.
          SECRETS_CONTEXT: ${{ toJSON(secrets) }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ---------------------------------------------------------------------------
  # 5. Boot-smoke + auto-rollback
  #    When smoke:true (default), verifies each deployed worker, then rolls
  #    back any that fail. The workers.dev host is derived from the account
  #    SUBDOMAIN SLUG (never the account ID); smoke_base_url / smoke_paths
  #    override the built-in probe target, and smoke-command replaces the
  #    probe entirely. smoke:false skips this job so the caller runs its own.
  # ---------------------------------------------------------------------------
  boot-smoke:
    name: Boot smoke + auto-rollback (${{ inputs.environment }})
    # GitHub Deployment Environment (distinct from the Cloudflare --env label).
    # Empty (the default) attaches no Environment — behaviour is unchanged.
    environment: ${{ inputs.gh-environment }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    needs: deploy
    # H1: same per-environment serialization group as migration / deploy.
    concurrency:
      group: deploy-cf-${{ github.repository }}-${{ inputs.environment }}
      cancel-in-progress: false
    # M1 + H0: gate on deployed_workers, not deploy.result == 'success'. A
    # partial multi-worker deploy failure (or a worker-secrets step failure
    # AFTER a good deploy) exits the deploy job 1 → deploy.result == 'failure',
    # which would skip smoke and leave the succeeded workers serving unverified
    # new code with no rollback. Gating on `needs.deploy.outputs.deployed_workers
    # != ''` runs smoke (and its rollback) whenever ANY worker was deployed,
    # even on a partial failure. `!cancelled()` carries the H0 status-check
    # function so a transitively-skipped ancestor cannot skip-poison this job.
    if: >-
      ${{ !cancelled() &&
          needs.deploy.outputs.deployed_workers != '' &&
          inputs.smoke == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup toolchain
        uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@b48be232f44cba7fb759a69808cf50fffb42895d
        with:
          cache: 'true'
          packages-read-token: ${{ secrets.packages-read-token }}
          # M14: the built-in probe NO LONGER needs root wrangler. Its
          # workers.dev subdomain derivation now uses the Cloudflare REST
          # endpoint (GET /accounts/{account_id}/workers/subdomain) with the
          # in-scope CLOUDFLARE_* creds instead of `pnpm exec wrangler whoami`,
          # so a pnpm-workspace consumer with wrangler only in an app
          # sub-package (all three real consumers) no longer fails the smoke
          # preflight after the worker already deployed. The auto-rollback step
          # is the only wrangler call site left, and it fires only on smoke
          # FAILURE with a per-worker "manual rollback required" fallback (or a
          # consumer rollback-command seam), so requiring root wrangler up-front
          # for every smoke run is wrong. Preflight is therefore off here — the
          # built-in probe is wrangler-free.
          require-wrangler: 'false'

      # The boot-smoke probe lives in the versioned, unit-tested platform
      # script scripts/deploy-boot-smoke.mjs (Story #231), sparse-checked out
      # at `github.job_workflow_sha` — the exact commit the caller's
      # `deploy-cloudflare.yml@<ref>` pin resolved to — so the script version
      # travels in lockstep with the workflow pin (the uptime-apply.yml →
      # apply-uptime-monitors.mjs model). The script also fixes the former
      # smoke_base_url duplication: with a shared base URL each path is probed
      # exactly ONCE (not once per worker), and a shared-host failure marks
      # ALL deployed workers for rollback explicitly, since per-worker
      # attribution is impossible on a shared host. verify-commit-sha parses
      # the health response as JSON and reads the TOP-LEVEL "version" field —
      # no more grep/sed extraction that could match a nested version key.
      - name: Checkout (shared boot-smoke script)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: dsj1984/mandrel-platform
          # `job_workflow_sha` is a valid runtime github-context field but is
          # absent from actionlint's pinned context type model, so read it
          # through the `fromJSON(toJSON(github))` escape hatch (typed `any`)
          # to keep the workflow lint-clean — same pattern as uptime-apply.yml.
          ref: ${{ fromJSON(toJSON(github)).job_workflow_sha }}
          sparse-checkout: |
            scripts/deploy-boot-smoke.mjs
          sparse-checkout-cone-mode: false
          path: _mandrel-platform-deploy
          persist-credentials: false

      - name: Smoke-test deployed workers
        id: smoke
        shell: bash
        # M2: step-level timeout SMALLER than the 15-minute job budget. A
        # wedged/hung probe would otherwise hold the runner up to the job
        # timeout and, on the job-timeout cancellation, never reach the script's
        # terminal SMOKE_FAILED_FILE write — leaving bad code deployed with no
        # rollback. Capping the step at 10 min leaves 5 min of job headroom for
        # the rollback step to run. The script also has its own per-request
        # 15s fetch timeout + bounded retries; this is the outer backstop.
        timeout-minutes: 10
        # On failure the script writes the rollback list (sorted, unique, one
        # worker per line) to SMOKE_FAILED_FILE and appends smoke_failed=true
        # to $GITHUB_ENV, then exits 1 — driving the rollback step below.
        run: node "${GITHUB_WORKSPACE}/_mandrel-platform-deploy/scripts/deploy-boot-smoke.mjs"
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          SMOKE_FAILED_FILE: /tmp/smoke-failed-workers.txt
          DEPLOYED_WORKERS: ${{ needs.deploy.outputs.deployed_workers }}
          SMOKE_COMMAND: ${{ inputs.smoke-command }}
          SMOKE_BASE_URL: ${{ inputs.smoke_base_url }}
          SMOKE_PATHS: ${{ inputs.smoke_paths }}
          WORKERS_DEV_SUBDOMAIN: ${{ inputs.workers_dev_subdomain }}
          VERIFY_COMMIT_SHA: ${{ inputs.verify-commit-sha }}
          EXPECTED_SHA: ${{ github.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # M2 + M14 + H3: fire on FAILURE or CANCELLATION — but only once the
      # smoke step ITSELF ran.
      #
      # The former gate `failure() && env.smoke_failed == 'true'` never fired
      # when the smoke step timed out / was cancelled or when
      # deploy-boot-smoke.mjs died before its terminal SMOKE_FAILED_FILE write
      # — leaving bad code deployed with no rollback (M2). This gate widens to
      # `(failure() || cancelled())` and, when the failed-workers file is
      # absent or empty (the smoke never got far enough to write it), falls
      # back to rolling back EVERY worker in
      # needs.deploy.outputs.deployed_workers. The script's terminal-write
      # crash-path fix (deploy-boot-smoke.mjs) makes the file present in the
      # common crash case; this fallback covers the harder timeout/cancel case.
      #
      # `steps.smoke.conclusion != 'skipped'` is load-bearing (audit finding):
      # steps 0–2 of this job (checkout, setup-toolchain, sparse-checkout of the
      # probe script) run BEFORE the smoke step, so a transient failure in ANY
      # of them makes `failure()` true while the smoke step is still `skipped` —
      # without this guard the fallback would roll back an otherwise-healthy
      # deploy that smoke never even evaluated. Scoping to a smoke step that
      # actually reached `failure`/`cancelled` keeps the timeout/wedge coverage
      # (smoke started but did not cleanly pass) while excluding pre-smoke setup
      # flakiness. `steps.smoke.conclusion` is 'skipped' when an earlier step
      # failed, and 'failure'/'cancelled' when the smoke step itself ran and
      # did not pass.
      - name: Rollback failed workers
        if: (failure() || cancelled()) && inputs.smoke == true && steps.smoke.conclusion != 'skipped'
        shell: bash
        run: |
          set -uo pipefail
          echo "::warning::Smoke failed or was cancelled — initiating rollback for affected workers."

          FAILED_FILE="/tmp/smoke-failed-workers.txt"

          # Resolve the rollback target list. Prefer the smoke script's
          # written list; when it is absent or empty (smoke wedged/cancelled
          # before its terminal write, M2), fall back to every deployed worker.
          if [ -s "$FAILED_FILE" ]; then
            ROLLBACK_CSV="$(paste -sd, "$FAILED_FILE")"
          else
            echo "::warning::No smoke-failed-workers file — rolling back ALL deployed workers (smoke likely wedged/cancelled before writing it)."
            ROLLBACK_CSV="$DEPLOYED_WORKERS"
          fi

          # ----- Consumer rollback-command seam (M14) -----
          # For deploy-command / pnpm-workspace consumers whose workers were
          # published from app sub-package dirs (or via
          # `wrangler deploy --config dist/server/wrangler.json`), the built-in
          # root-level `pnpm exec wrangler rollback` cannot address them — the
          # "auto-rollback" guarantee was silently void. rollback-command
          # (symmetric to deploy-command) lets the consumer roll back the same
          # way it deployed. It runs once with WORKERS (the resolved rollback
          # csv) + DEPLOY_ENV + the frozen {CLOUDFLARE_*, TURSO_*} secret set
          # exported. When set, it REPLACES the built-in loop entirely.
          if [ -n "$ROLLBACK_COMMAND" ]; then
            echo "::group::Running consumer rollback-command"
            export WORKERS="$ROLLBACK_CSV"
            bash -c "$ROLLBACK_COMMAND" \
              || echo "::error::Consumer rollback-command FAILED — manual rollback required."
            echo "::endgroup::"
            echo "::error::Deployment rolled back due to failed/cancelled boot-smoke. See logs above."
            exit 1
          fi

          # ----- Built-in root-level rollback loop (default) -----
          # Consumer lockfile-pinned wrangler (`pnpm exec wrangler`) — installed
          # by the Setup toolchain step. `pnpm exec` never falls back to a
          # registry fetch, so a missing devDependency surfaces through the
          # per-worker "manual rollback required" fallback below rather than a
          # silently-unpinned binary running with prod CF creds mid-incident.
          # (require-wrangler is off for the built-in probe now that it is
          # wrangler-free — M14 — so this loop keeps its own fallback.)
          IFS=',' read -ra ROLLBACK_WORKERS <<< "$ROLLBACK_CSV"
          for worker in "${ROLLBACK_WORKERS[@]}"; do
            worker="$(echo "$worker" | xargs)"
            [ -z "$worker" ] && continue
            echo "::group::Rolling back $worker"
            pnpm exec wrangler rollback \
              --name "$worker" \
              --env "$DEPLOY_ENV" \
              --message "Auto-rollback: smoke check failed or was cancelled" \
              || echo "::error::wrangler rollback failed for $worker — manual rollback required."
            echo "::endgroup::"
          done

          echo "::error::Deployment rolled back due to failed/cancelled boot-smoke. See logs above."
          exit 1
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          DEPLOYED_WORKERS: ${{ needs.deploy.outputs.deployed_workers }}
          ROLLBACK_COMMAND: ${{ inputs.rollback-command }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Frozen allowlist: TURSO_* (for consumer rollback-command seam).
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

  # ---------------------------------------------------------------------------
  # 6. Deploy summary (resolved-ref single source of truth)
  #    Emits the RESOLVED ref of THIS reusable workflow into the job summary
  #    (Story #110). `github.job_workflow_sha` is the exact commit SHA GitHub
  #    resolved the caller's `uses: …/deploy-cloudflare.yml@<ref>` pin to, and
  #    `github.workflow_ref` is the full ref path. Echoing the runtime-resolved
  #    values — rather than a hand-maintained literal in a consumer's
  #    deploy-summary string — makes the resolved ref the single source of
  #    truth: a consumer can read it off the job summary instead of carrying a
  #    stale `deploy-cloudflare.yml@<sha>` literal that the pin-drift lint then
  #    has to flag (the athportal stale-literal residual). Runs on every
  #    ATTEMPTED deploy outcome (success, failure, cancelled) so the resolved
  #    ref is always recorded for a run that did anything — but NOT when the
  #    deploy job was skipped (Story #237): an all-skipped chain (red-upstream
  #    CI-green gate, or a failed upstream gate job) previously still booted a
  #    runner just to echo a table for a pipeline that never ran.
  # ---------------------------------------------------------------------------
  deploy-summary:
    name: Deploy summary (${{ inputs.environment }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    needs:
      - deploy
      - boot-smoke
    if: ${{ always() && needs.deploy.result != 'skipped' }}
    steps:
      - name: Emit resolved platform-ref summary
        shell: bash
        run: |
          # The reusable workflow's own resolved ref, straight from the runtime
          # github context — never a hand-edited literal. job_workflow_sha is the
          # 40-hex commit the caller's `@<ref>` pin resolved to; workflow_ref is
          # the full `owner/repo/.github/workflows/deploy-cloudflare.yml@<ref>`
          # path. Consumers should read THIS value rather than maintaining their
          # own echoed `deploy-cloudflare.yml@<sha>` string.
          {
            echo "## Deploy summary — ${DEPLOY_ENV}"
            echo ""
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| Resolved workflow ref | \`${WORKFLOW_REF}\` |"
            echo "| Resolved workflow SHA | \`${JOB_WORKFLOW_SHA}\` |"
            echo "| Deploy result | \`${DEPLOY_RESULT}\` |"
            echo "| Smoke result | \`${SMOKE_RESULT}\` |"
            echo ""
            echo "> The **Resolved workflow SHA** above is the single source of truth"
            echo "> for the \`deploy-cloudflare.yml\` pin this run executed. Read it"
            echo "> here instead of hand-maintaining a \`deploy-cloudflare.yml@<sha>\`"
            echo "> literal in a consumer-side deploy-summary string."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          # `job_workflow_sha` is the resolved 40-hex commit of THIS reusable
          # workflow (the value the caller's `@<ref>` pin resolved to). It is a
          # valid runtime github-context field, but actionlint's pinned context
          # type model does not list it, so it is read through the
          # `fromJSON(toJSON(github))` escape hatch (typed `any`) to keep the
          # workflow lint-clean without dropping the resolved-SHA source of truth.
          JOB_WORKFLOW_SHA: ${{ fromJSON(toJSON(github)).job_workflow_sha }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          SMOKE_RESULT: ${{ needs.boot-smoke.result }}

  # ---------------------------------------------------------------------------
  # 7. Require deploy ran (Story #268 + #272 + #283 — green must mean deployed)
  #    Always-on terminal job: unlike every job above, it does NOT participate
  #    in the CI-green `if:` guard or the `needs:` skip chain, so it runs even
  #    when layer 1 gated the whole chain off. It fails in two distinct "green
  #    run that didn't deploy" cases, which are mutually exclusive so the two
  #    steps never double-fire:
  #      - #268 (red CI, workflow_run only): a `workflow_run` whose upstream
  #        conclusion was NOT `success` — the CI-green guard skips the whole
  #        chain. This case is inherently workflow_run-specific (only a
  #        workflow_run trigger carries an upstream conclusion to be red).
  #      - #283 (all-skipped chain, EVERY trigger): `deploy` resolved to
  #        `skipped` on a run whose CI was NOT red. This fires on ALL triggers,
  #        not just workflow_run (H0 corollary 2 — athportal's dispatch-triggered
  #        all-skipped chain was green today because the former step was
  #        `workflow_run`-only).
  #    REAL MECHANISM (H0 / L1 — corrects the #272 misdiagnosis): the skip is
  #    NOT "environment: jobs do not run on workflow_run events (a documented
  #    GitHub limitation)". That premise was false — the skip happened on
  #    workflow_dispatch too. The actual cause was TRANSITIVE needs-chain
  #    skip-poisoning (actions/runner#2205): the default-skipped opt-in
  #    `environments-isolation-audit` root job skip-poisoned every downstream
  #    job whose `if:` lacked a status-check function, because GitHub's implicit
  #    `success()` evaluates the whole transitive ancestor chain, not just
  #    direct needs. That root cause is now fixed at source (every chain job
  #    carries `!cancelled()` + direct-need result checks), so a `skipped`
  #    deploy on a non-red run means a genuine gate failure or misconfiguration
  #    — and this guard makes it visibly RED instead of falsely green on every
  #    trigger. Every other trigger, and every run whose deploy actually ran,
  #    passes through as a no-op.
  # ---------------------------------------------------------------------------
  require-deploy-ran:
    name: Require deploy ran (${{ inputs.environment }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    needs: [deploy]
    if: always()
    steps:
      - name: Fail if a workflow_run deploy was gated off by red CI
        if: >-
          ${{ github.event_name == 'workflow_run' &&
              github.event.workflow_run.conclusion != 'success' }}
        shell: bash
        run: |
          echo "::error::Upstream CI concluded '${UPSTREAM_CONCLUSION}'. Staging was NOT deployed — this run is intentionally red so a CI-gated-off deploy is never mistaken for a successful one."
          exit 1
        env:
          UPSTREAM_CONCLUSION: ${{ github.event.workflow_run.conclusion }}

      - name: Fail if the deploy chain skipped on a non-red run (any trigger)
        # Trigger-agnostic (H0 corollary 2): NO `github.event_name ==
        # 'workflow_run'` condition — an all-skipped chain must fail on
        # workflow_dispatch / push / schedule too. Excludes the red-CI
        # workflow_run case (handled by the step above) so the two never
        # double-fire.
        if: >-
          ${{ needs.deploy.result == 'skipped' &&
              !(github.event_name == 'workflow_run' &&
                github.event.workflow_run.conclusion != 'success') }}
        shell: bash
        run: |
          echo "::error::The deploy chain SKIPPED (deploy result='skipped') on a run whose CI was not red, so 0 workers deployed while this run would otherwise report green. The historical cause was TRANSITIVE needs-chain skip-poisoning (actions/runner#2205) from the default-skipped opt-in environments-isolation-audit root job — NOT the previously-claimed 'environment: jobs do not run on workflow_run' GitHub limitation, which was a misdiagnosis (the skip occurred on workflow_dispatch too). That root cause is now fixed (every chain job carries an explicit !cancelled() status-check + direct-need result checks), so a skipped deploy here means a genuine upstream gate failure or a misconfigured caller. This run is intentionally red so a non-deploy is never mistaken for a success (refs #283, #272)."
          exit 1
