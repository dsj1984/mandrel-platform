# Shared PR-quality reusable workflow (Story #4).
#
# Consumable as a `workflow_call` target by any consumer repo. Tiers:
#   lint + format-check → typecheck → unit → contract → e2e/smoke
#
# Each tier is independently enable-toggled via inputs so repos can opt out of
# tiers they haven't built yet. The aggregator job (`ci-required`) is the only
# required branch-protection context consumers need to register.
#
# Sharding: jobs that support parallelism accept a `shards` input. When
# shards > 1, configure the matrix at the call site by passing a JSON-encoded
# shard index array via the `shard-matrix` input (e.g. "[1,2,3]" for 3 shards).
# When shards == 1 (default), `shard-matrix` defaults to "[1]".
#
# SHA-pinned third-party actions per roadmap.md.
# setup-toolchain MUST use an absolute cross-repo reference — GitHub prohibits
# relative `uses:` paths in reusable workflows called from another repository.
# Pinned to mandrel-platform-v0.3.0 (869bbbf), whose action.yml manifest is
# expression-clean. This pin is guarded by scripts/check-workflow-portability.mjs
# (Rule 3): if it ever lags onto a commit whose manifest carries a `${{ }}`
# footgun, CI fails before release (the #35 failure mode).
name: PR Quality

on:
  workflow_call:
    inputs:
      # Runner label — e.g. 'ubuntu-latest', or '["self-hosted","domio-runner"]'
      runner:
        description: >
          Runs-on label for all jobs. Single string (e.g. 'ubuntu-latest') or a
          JSON-encoded label array string (e.g. '["self-hosted","domio-runner"]').
          Defaults to ubuntu-latest.
        required: false
        type: string
        default: 'ubuntu-latest'

      # Shard count for jobs that support parallelism (unit, contract, e2e/smoke).
      shards:
        description: >
          Number of parallel shards to split the test suite across. Defaults to 1
          (no sharding). When > 1, also set shard-matrix to the matching index
          array (e.g. "[1,2,3]" for shards: 3).
        required: false
        type: number
        default: 1

      # JSON-encoded shard index array, e.g. "[1]" or "[1,2,3]".
      # Must match `shards`. Defaults to "[1]" (single shard, no parallelism).
      shard-matrix:
        description: >
          JSON-encoded array of shard indices that drives the matrix strategy for
          test jobs. Must agree with `shards` (e.g. shards:3 → shard-matrix:"[1,2,3]").
          Defaults to "[1]".
        required: false
        type: string
        default: '[1]'

      # Per-tier enable toggles.
      enable-lint:
        description: 'Enable the lint + format-check tier.'
        required: false
        type: boolean
        default: true

      enable-typecheck:
        description: 'Enable the typecheck tier.'
        required: false
        type: boolean
        default: true

      enable-unit:
        description: 'Enable the unit-test tier.'
        required: false
        type: boolean
        default: true

      enable-contract:
        description: 'Enable the contract-test tier.'
        required: false
        type: boolean
        default: true

      enable-e2e:
        description: 'Enable the e2e / smoke tier (Playwright).'
        required: false
        type: boolean
        default: true

      # Security tier (Story #65 / MP-10). Private-repo-capable: the secret
      # scan and SAST sub-steps run a pinned binary directly and assert on its
      # exit code, so they BLOCK on a finding even on a private repo with no
      # GitHub Advanced Security (no SARIF / Code Scanning upload required).
      enable-security:
        description: >
          Enable the security tier (PR-diff secret scan + SAST). Blocking on
          findings; works on private repos without GHAS. Default true.
        required: false
        type: boolean
        default: true

      # SAST toggle nested under the security tier. Some repos run their SAST
      # via a dedicated CodeQL/GHAS path and only want the secret scan here.
      enable-sast:
        description: >
          Enable the Semgrep SAST sub-step inside the security tier. Set false
          when the repo runs SAST via a dedicated CodeQL/GHAS workflow and only
          wants the PR-diff secret scan from this tier. Default true.
        required: false
        type: boolean
        default: true

      # Semgrep ruleset config for the SAST sub-step. Defaults to the broad
      # registry ruleset 'p/default', which catches real vuln classes
      # (eval, command injection, taint flows). NOTE: 'p/ci' was rejected as
      # the default — it is too narrow (0 findings on eval()/command-injection
      # fixtures). Do NOT use 'auto' here either — `auto` requires metrics ON
      # (it phones semgrep.dev to tailor the rule set), incompatible with the
      # `--metrics=off` privacy posture of the SAST step. Override with another
      # registry ref (e.g. 'p/security-audit') or a path at the call site.
      semgrep-config:
        description: >
          Semgrep config passed to `semgrep scan --config`. Default 'p/default'
          (broad OSS ruleset; no Semgrep AppSec Platform login required). Must
          be a concrete ruleset/path — 'auto' is unsupported because the step
          runs with --metrics=off.
        required: false
        type: string
        default: 'p/default'

      # Additional SAST exclude globs, APPENDED to the built-in `.agents`
      # exclude (the vendored framework tree a consumer cannot edit). The
      # security tier always passes `--exclude '.agents'`; this input lets a
      # consumer also drop its own generated code / test fixtures from the SAST
      # target set without forking the workflow. Space- or comma-separated; each
      # token becomes its own `--exclude <glob>` arg. Empty (default) → only the
      # built-in `.agents` exclude applies.
      sast-exclude:
        description: >
          Extra Semgrep `--exclude` globs, appended to the built-in `.agents`
          exclude. Space- or comma-separated (e.g. 'dist coverage tests/fixtures').
          Default '' (only the vendored `.agents` framework tree is excluded).
        required: false
        type: string
        default: ''

      # Pinned gitleaks version for the secret-scan sub-step. The asset is
      # selected per-platform (darwin/linux x amd64/arm64) and verified
      # against a pinned SHA-256 before execution.
      gitleaks-version:
        description: >
          Pinned gitleaks release version (without the leading 'v') for the
          PR-diff secret scan. Default 8.30.1.
        required: false
        type: string
        default: '8.30.1'

      # Cache toggle for the setup-toolchain composite action.
      toolchain-cache:
        description: >
          Passed through to setup-toolchain's `cache` input. Set to 'false' on
          self-hosted runners that maintain their own warm pnpm store.
        required: false
        type: string
        default: 'true'

      # pnpm shim destination for self-hosted runners.
      pnpm-dest:
        description: >
          Passed through to setup-toolchain's `pnpm-dest` input. Controls where
          pnpm/action-setup installs the pnpm shim. Leave empty to use
          setup-toolchain's default (runner.temp/pnpm). Self-hosted callers
          should set this explicitly (e.g. the runner.temp/pnpm expression)
          to avoid $HOME races and git-clean eviction.
        required: false
        type: string
        default: ''

    secrets:
      # Turbo remote cache credentials (athportal pattern — roadmap.md).
      TURBO_TOKEN:
        description: 'Turbo remote cache read/write token.'
        required: false
      TURBO_TEAM:
        description: 'Turbo team slug for remote cache scoping.'
        required: false

# Permissions: callers inherit the calling workflow's token permissions.
# We declare the minimum needed here; callers may narrow further.
permissions:
  contents: read

# Cancel superseded runs on the same ref so stale PR pushes don't queue up.
concurrency:
  group: pr-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tier 1: Lint + format-check ───────────────────────────────────────────
  lint:
    name: Lint & format
    if: ${{ inputs.enable-lint }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup toolchain
        uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@869bbbf21faa2cdf6045d64a9c3347b928e196fe
        with:
          cache: ${{ inputs.toolchain-cache }}
          pnpm-dest: ${{ inputs.pnpm-dest }}

      - name: Lint
        run: pnpm run lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Format check
        run: pnpm run format:check
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  # ── Tier 2: Typecheck ─────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    if: ${{ inputs.enable-typecheck }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup toolchain
        uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@869bbbf21faa2cdf6045d64a9c3347b928e196fe
        with:
          cache: ${{ inputs.toolchain-cache }}
          pnpm-dest: ${{ inputs.pnpm-dest }}

      - name: Typecheck
        run: pnpm run typecheck
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  # ── Tier 3: Unit tests ────────────────────────────────────────────────────
  unit:
    name: Unit (${{ matrix.shard }}/${{ inputs.shards }})
    if: ${{ inputs.enable-unit }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(inputs.shard-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup toolchain
        uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@869bbbf21faa2cdf6045d64a9c3347b928e196fe
        with:
          cache: ${{ inputs.toolchain-cache }}
          pnpm-dest: ${{ inputs.pnpm-dest }}

      - name: Unit tests (shard ${{ matrix.shard }}/${{ inputs.shards }})
        run: pnpm run test:unit --shard=${{ matrix.shard }}/${{ inputs.shards }}
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unit-results-${{ matrix.shard }}
          path: |
            **/test-results/
            **/coverage/
          retention-days: 7

  # ── Tier 4: Contract tests ────────────────────────────────────────────────
  contract:
    name: Contract (${{ matrix.shard }}/${{ inputs.shards }})
    if: ${{ inputs.enable-contract }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(inputs.shard-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup toolchain
        uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@869bbbf21faa2cdf6045d64a9c3347b928e196fe
        with:
          cache: ${{ inputs.toolchain-cache }}
          pnpm-dest: ${{ inputs.pnpm-dest }}

      - name: Contract tests (shard ${{ matrix.shard }}/${{ inputs.shards }})
        run: pnpm run test:contract --shard=${{ matrix.shard }}/${{ inputs.shards }}
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Upload contract results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: contract-results-${{ matrix.shard }}
          path: '**/test-results/'
          retention-days: 7

  # ── Tier 5: E2E / Smoke (Playwright) ─────────────────────────────────────
  e2e:
    name: E2E / Smoke (${{ matrix.shard }}/${{ inputs.shards }})
    if: ${{ inputs.enable-e2e }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(inputs.shard-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup toolchain
        uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@869bbbf21faa2cdf6045d64a9c3347b928e196fe
        with:
          cache: ${{ inputs.toolchain-cache }}
          pnpm-dest: ${{ inputs.pnpm-dest }}

      - name: Resolve Playwright version
        id: pw-version
        shell: bash
        run: |
          PW_VERSION=$(node -e "const p=require('./node_modules/@playwright/test/package.json');console.log(p.version)")
          echo "version=${PW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Install browser OS dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps

      - name: E2E / Smoke (shard ${{ matrix.shard }}/${{ inputs.shards }})
        run: pnpm run test:e2e --shard=${{ matrix.shard }}/${{ inputs.shards }}
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-${{ matrix.shard }}
          path: |
            **/playwright-report/
            **/test-results/
          retention-days: 14

  # ── Tier 6: Security (PR-diff secret scan + SAST) ─────────────────────────
  #
  # Private-repo-capable security tier (Story #65 / MP-10). Both sub-steps run
  # a pinned binary directly and BLOCK the job on a finding via a non-zero
  # exit code — no SARIF / Code Scanning upload, so the gate is load-bearing on
  # a PRIVATE repo with NO GitHub Advanced Security (the failure mode that left
  # athportal's `gitleaks-pr` + CodeQL green no-ops and stripped swarm-os's CI
  # secret scan). Cross-platform: the gitleaks asset selector resolves the
  # right binary for self-hosted darwin/linux runners AND ubuntu-latest, each
  # verified against a pinned SHA-256.
  #
  #   • Secret scan — pinned gitleaks binary over the PR diff (blocking).
  #   • SAST        — pinned Semgrep, `--error` fails the job on any finding
  #                   (blocking, no SARIF upload). On pull_request events it is
  #                   scoped to the PR diff via `--baseline-commit <base.sha>`
  #                   (mirroring the secret scan), so only findings INTRODUCED
  #                   by the PR block; on push / schedule it scans the full tree.
  #                   The vendored framework tree `.agents/` is ALWAYS excluded
  #                   (`--exclude '.agents'`): it is materialized from the pinned
  #                   `mandrel` package and a consumer cannot edit it, so gating
  #                   `ci-required` on the framework's own findings is a false
  #                   block (Story #93). Consumers can drop their own generated
  #                   code / fixtures too via the `sast-exclude` input, which is
  #                   APPENDED to the built-in `.agents` exclude.
  #
  # GHAS path (alternative, documented per AC): repos that DO have GitHub
  # Advanced Security can instead run CodeQL (codeql.yml) and flip its
  # `upload: never` → `always` to surface findings as a blocking Code Scanning
  # check. This tier is the no-GHAS-required default so every consumer inherits
  # an effective gate regardless of plan.
  security:
    name: Security (secret scan + SAST)
    if: ${{ inputs.enable-security }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history so the gitleaks PR-diff scan can resolve the merge
          # base; a shallow clone would miss commits introduced by the PR.
          fetch-depth: 0

      # Resolve the gitleaks PR-diff commit range. On pull_request events the
      # scan is scoped to the commits the PR introduces (merge-base..head); on
      # push / other events it falls back to a full-tree scan.
      - name: Resolve secret-scan range
        id: range
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_SHA:-}" ] && [ -n "${HEAD_SHA:-}" ]; then
            echo "mode=pr" >> "$GITHUB_OUTPUT"
            echo "range=${BASE_SHA}..${HEAD_SHA}" >> "$GITHUB_OUTPUT"
            echo "PR-diff secret scan: ${BASE_SHA}..${HEAD_SHA}"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "range=" >> "$GITHUB_OUTPUT"
            echo "Full-tree secret scan (no PR context)."
          fi

      # Download + verify a PINNED gitleaks binary. Cross-platform asset
      # selector: maps runner.os/runner.arch → the release asset, then verifies
      # the archive against a pinned SHA-256 before extraction. Supports
      # self-hosted darwin/linux (arm64 + x64) and ubuntu-latest. Pinning the
      # binary (not the gitleaks-action) is what makes this gate work on a
      # private repo with no GHAS and no license: the action's org features
      # require GITLEAKS_LICENSE, the binary does not.
      - name: Secret scan (pinned gitleaks, blocking)
        shell: bash
        env:
          GITLEAKS_VERSION: ${{ inputs.gitleaks-version }}
          SCAN_MODE: ${{ steps.range.outputs.mode }}
          SCAN_RANGE: ${{ steps.range.outputs.range }}
        run: |
          set -euo pipefail

          # Pinned SHA-256 checksums for gitleaks 8.30.1 release archives.
          # Bump alongside inputs.gitleaks-version when the pin moves.
          # Uses a case statement instead of declare -A to remain compatible
          # with bash 3.2 (the system shell on macOS self-hosted runners).

          # Cross-platform asset selector: runner.os/arch → gitleaks asset slug.
          os="$(uname -s)"
          arch="$(uname -m)"
          case "$os" in
            Darwin) gl_os="darwin" ;;
            Linux)  gl_os="linux" ;;
            *) echo "::error::Unsupported OS for gitleaks asset selector: $os"; exit 1 ;;
          esac
          case "$arch" in
            arm64|aarch64) gl_arch="arm64" ;;
            x86_64|amd64)  gl_arch="x64" ;;
            *) echo "::error::Unsupported arch for gitleaks asset selector: $arch"; exit 1 ;;
          esac

          slug="${GITLEAKS_VERSION}_${gl_os}_${gl_arch}"
          case "$slug" in
            "8.30.1_darwin_arm64") expected="b40ab0ae55c505963e365f271a8d3846efbc170aa17f2607f13df610a9aeb6a5" ;;
            "8.30.1_darwin_x64")   expected="dfe101a4db2255fc85120ac7f3d25e4342c3c20cf749f2c20a18081af1952709" ;;
            "8.30.1_linux_arm64")  expected="e4a487ee7ccd7d3a7f7ec08657610aa3606637dab924210b3aee62570fb4b080" ;;
            "8.30.1_linux_x64")    expected="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb" ;;
            *) expected="" ;;
          esac
          if [ -z "$expected" ]; then
            echo "::error::No pinned checksum for gitleaks $slug — update the SHA256 map for this version/platform."
            exit 1
          fi

          asset="gitleaks_${GITLEAKS_VERSION}_${gl_os}_${gl_arch}.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${asset}"
          tmp="$(mktemp -d)"
          echo "Downloading pinned gitleaks: ${url}"
          curl -fsSL "$url" -o "${tmp}/${asset}"

          # Verify the pinned SHA-256 before trusting the binary.
          actual="$(shasum -a 256 "${tmp}/${asset}" | awk '{print $1}')"
          if [ "$actual" != "$expected" ]; then
            echo "::error::gitleaks checksum mismatch for ${asset}: expected ${expected}, got ${actual}"
            exit 1
          fi
          echo "✅ gitleaks ${asset} checksum verified."

          tar -xzf "${tmp}/${asset}" -C "${tmp}" gitleaks
          chmod +x "${tmp}/gitleaks"
          "${tmp}/gitleaks" version

          # Blocking scan: gitleaks exits non-zero on a leak (default exit-code
          # 1), failing this job. No license, no SARIF upload — works on a
          # private repo with no GHAS.
          # --redact=100 (not bare --redact, whose optional uint would otherwise
          # swallow the trailing '.' path arg). Exit code 1 on a leak (gitleaks
          # default) fails this job.
          if [ "$SCAN_MODE" = "pr" ]; then
            echo "Scanning PR diff range: ${SCAN_RANGE}"
            "${tmp}/gitleaks" git --log-opts="${SCAN_RANGE}" --redact=100 --verbose --no-banner .
          else
            echo "Scanning full working tree."
            "${tmp}/gitleaks" dir --redact=100 --verbose --no-banner .
          fi
          echo "✅ No secrets detected."

      # Resolve the Semgrep SAST baseline, mirroring the gitleaks PR-diff
      # scoping above. On pull_request events the baseline is the PR's merge
      # base (`base.sha`), so `--baseline-commit` makes Semgrep report only
      # findings INTRODUCED by the PR (pre-existing debt is suppressed). On
      # push / schedule / other events the baseline is empty → full-tree scan.
      # `fetch-depth: 0` on the checkout above makes the base commit available.
      - name: Resolve SAST baseline
        id: sast-baseline
        if: ${{ inputs.enable-sast }}
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_SHA:-}" ]; then
            echo "baseline=${BASE_SHA}" >> "$GITHUB_OUTPUT"
            echo "PR-diff SAST baseline: ${BASE_SHA}"
          else
            echo "baseline=" >> "$GITHUB_OUTPUT"
            echo "Full-tree SAST (no PR context)."
          fi

      # SAST via Semgrep, installed from PyPI at a pinned version against the
      # runner's SYSTEM python3. We deliberately do NOT use
      # `actions/setup-python`: on a vanilla self-hosted runner with no
      # RUNNER_TOOL_CACHE configured, setup-python falls back to the
      # GitHub-hosted tool-cache path (`/Users/runner/hostedtoolcache` on
      # macOS) and dies `mkdir: /Users/runner: Permission denied` — before
      # Semgrep ever runs (Story #85: domio #1550 / athportal #2021). Both
      # ubuntu-latest and macOS/Linux self-hosted runners ship a usable
      # `python3`, so installing against it keeps the gate runner-agnostic
      # with no per-runner tool-cache config. `--error` makes findings fail the
      # job WITHOUT relying on a SARIF / Code Scanning upload, so the gate
      # blocks on a private repo with no GHAS. (The GHAS CodeQL path documented
      # on the job header is the alternative.)
      - name: SAST (Semgrep, blocking, no SARIF upload)
        if: ${{ inputs.enable-sast }}
        shell: bash
        env:
          SEMGREP_CONFIG: ${{ inputs.semgrep-config }}
          # PR merge base on pull_request events, empty otherwise. When set,
          # `--baseline-commit` scopes findings to those introduced by the PR.
          BASELINE: ${{ steps.sast-baseline.outputs.baseline }}
          # Extra exclude globs appended to the built-in `.agents` exclude.
          # Space- or comma-separated; empty by default.
          SAST_EXCLUDE: ${{ inputs.sast-exclude }}
        run: |
          set -euo pipefail
          # Pinned Semgrep release from PyPI. `semgrep scan --error` exits
          # non-zero on any finding; `--config` selects the ruleset (default
          # OSS 'p/default'). Bump this pin deliberately.
          #
          # `setuptools` provides `pkg_resources`, which semgrep's transitive
          # opentelemetry dependency imports but does not declare — absent by
          # default on Python ≥3.12. We install it alongside the pinned
          # semgrep so the run works on a 3.12+ system interpreter too.
          #
          # Install strategy (system-python, no hosted tool cache):
          #   • Prefer `pipx` when present — it isolates the install in its own
          #     venv and exposes `semgrep` on PATH, without polluting the
          #     system site-packages. We `--system-site-packages` so the venv
          #     can see a system `setuptools`, then `pipx inject` a pinned one
          #     as a belt-and-suspenders guarantee for `pkg_resources`.
          #   • Otherwise fall back to `python3 -m pip install --user`, which
          #     also needs no tool cache and installs into the user site dir.
          SEMGREP_PIN='semgrep==1.97.0'

          # Build the `--exclude` argument list. The vendored framework tree
          # `.agents/` is ALWAYS excluded: it is materialized from the pinned
          # `mandrel` package and a consumer cannot edit it, so gating on its
          # findings is a false block (Story #93). Semgrep's `--exclude` takes a
          # pattern matched against path components, so `--exclude '.agents'`
          # drops the whole `.agents/**` subtree from the target set (mirroring
          # how it ignores `node_modules` by default). Any extra globs from the
          # `sast-exclude` input are APPENDED, each as its own `--exclude` arg.
          EXCLUDE_ARGS=(--exclude '.agents')
          if [ -n "${SAST_EXCLUDE:-}" ]; then
            # Split on whitespace AND commas so 'dist,coverage tests/fixtures'
            # all work. Empty tokens (e.g. from a trailing comma) are skipped.
            old_ifs="$IFS"
            IFS=', '
            for glob in ${SAST_EXCLUDE}; do
              [ -n "$glob" ] && EXCLUDE_ARGS+=(--exclude "$glob")
            done
            IFS="$old_ifs"
          fi

          run_semgrep() {
            echo "Running $(semgrep --version 2>/dev/null) (config: ${SEMGREP_CONFIG})"
            if [ -n "${BASELINE:-}" ]; then
              echo "PR-diff SAST: baselining against ${BASELINE} (only new findings block)."
            else
              echo "Full-tree SAST (no baseline)."
            fi
            echo "SAST excludes: ${EXCLUDE_ARGS[*]}"
            # `${BASELINE:+--baseline-commit "$BASELINE"}` expands to the flag
            # pair only when BASELINE is non-empty; on push/schedule it vanishes
            # and Semgrep scans the full tree. `"${EXCLUDE_ARGS[@]}"` always
            # carries at least `--exclude '.agents'` (Story #93), plus any globs
            # from the `sast-exclude` input, on BOTH the baseline and full-tree
            # paths since both flow through this one invocation.
            semgrep scan \
              --config "${SEMGREP_CONFIG}" \
              "${EXCLUDE_ARGS[@]}" \
              ${BASELINE:+--baseline-commit "$BASELINE"} \
              --error \
              --disable-version-check \
              --metrics=off \
              --quiet
          }

          if command -v pipx >/dev/null 2>&1; then
            echo "Installing ${SEMGREP_PIN} via pipx (system python3)."
            # `--force` keeps the step idempotent across reused self-hosted
            # runners (a prior `pipx install semgrep` would otherwise abort
            # with "already installed").
            pipx install --force --pip-args='--disable-pip-version-check' \
              --system-site-packages "${SEMGREP_PIN}"
            pipx inject semgrep setuptools >/dev/null 2>&1 || true
            # pipx exposes apps under ~/.local/bin, which may not be on PATH on
            # a fresh runner. `pipx ensurepath` is interactive-shell-oriented;
            # prepend the bin dir directly so `semgrep` resolves this step.
            PATH="${HOME}/.local/bin:${PATH}"
            export PATH
            run_semgrep
          else
            echo "pipx not found; installing ${SEMGREP_PIN} via python3 -m pip install --user."
            python3 -m pip install --user --quiet --disable-pip-version-check \
              setuptools "${SEMGREP_PIN}"
            # `pip install --user` drops console scripts in the user-base bin
            # dir, which is not always on PATH on a fresh runner — add it.
            PATH="$(python3 -m site --user-base)/bin:${PATH}"
            export PATH
            run_semgrep
          fi
          echo "✅ Semgrep found no blocking findings."

  # ── Aggregator: single required branch-protection context ─────────────────
  #
  # `ci-required` is the ONLY context consumers should register in their
  # branch-protection ruleset. It passes when every enabled tier succeeds (or
  # is skipped via its enable toggle). This pattern eliminates required-check-
  # name drift — the job name is defined exactly once here.
  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - lint
      - typecheck
      - unit
      - contract
      - e2e
      - security
    steps:
      - name: Check all tier results
        shell: bash
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          UNIT_RESULT: ${{ needs.unit.result }}
          CONTRACT_RESULT: ${{ needs.contract.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
        run: |
          failed=()
          for tier_result in \
            "lint:${LINT_RESULT}" \
            "typecheck:${TYPECHECK_RESULT}" \
            "unit:${UNIT_RESULT}" \
            "contract:${CONTRACT_RESULT}" \
            "e2e:${E2E_RESULT}" \
            "security:${SECURITY_RESULT}"; do
            tier="${tier_result%%:*}"
            result="${tier_result##*:}"
            if [ "${result}" != "success" ] && [ "${result}" != "skipped" ]; then
              failed+=("${tier}(${result})")
            fi
          done

          if [ ${#failed[@]} -gt 0 ]; then
            echo "❌ Failed tiers: ${failed[*]}" >&2
            exit 1
          fi

          echo "✅ All enabled tiers passed."
