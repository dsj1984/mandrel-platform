# Shared PR-quality reusable workflow (Story #4).
#
# Consumable as a `workflow_call` target by any consumer repo. Tiers:
#   lint + format-check → typecheck → unit → contract → e2e/smoke →
#   migration-guard → security → osv-scan
#
# Each tier is independently enable-toggled via inputs so repos can opt out of
# tiers they haven't built yet. The aggregator job (`ci-required`) is the only
# required branch-protection context consumers need to register.
#
# Sharding: jobs that support parallelism (unit, contract, e2e/smoke) shard
# via the `shard-matrix` input — a JSON-encoded shard index array (e.g.
# "[1,2,3]" for 3 shards; default "[1]", no parallelism). The shard-count
# denominator is derived inside each matrix job as `strategy.job-total`, so
# the matrix is the single source of truth. The legacy `shards` input is
# DEPRECATED and no longer read anywhere (see its declaration below).
#
# Step reuse: the identical per-tier preamble (harden-runner, default
# checkout, setup-toolchain) and the trailing fail-fast cancel step are
# defined ONCE as YAML anchors on the lint tier (the first job) and aliased
# into every other tier job. GitHub Actions supports anchors/aliases since
# 2025-09-18; merge keys (`<<:`) are NOT supported, so the anchors are
# whole-step aliases — jobs needing a non-default checkout (fetch-depth: 0
# in migration-guard/security) keep their own checkout step instead of
# aliasing the default one.
#
# SHA-pinned third-party actions.
# setup-toolchain MUST use an absolute cross-repo reference — GitHub prohibits
# relative `uses:` paths in reusable workflows called from another repository.
# Pinned to mandrel-platform-v0.21.0 (b48be23), whose action.yml manifest
# defines the trust-lockfile + require-wrangler inputs and is expression-clean.
# The pin is kept in lockstep with this workflow's own release so trust-lockfile
# threaded through the workflow_call surface actually reaches the install step
# (bumped from v0.17.0/05f8a84, whose manifest predated require-wrangler — refs
# #162, #252). This pin is guarded by scripts/check-workflow-portability.mjs (Rule 3):
# if it ever lags onto a commit whose manifest carries a `${{ }}` footgun, CI
# fails before release (the #35 failure mode).
name: PR Quality

on:
  workflow_call:
    inputs:
      # Runner label — e.g. 'ubuntu-latest', or '["self-hosted","domio-runner"]'
      runner:
        description: >
          Runs-on label for all jobs. Single string (e.g. 'ubuntu-latest') or a
          JSON-encoded label array string (e.g. '["self-hosted","domio-runner"]').
          Defaults to ubuntu-latest.
        required: false
        type: string
        default: 'ubuntu-latest'

      # DEPRECATED (Story #235). The shard-count denominator is derived inside
      # each matrix job as `strategy.job-total`, so this input is no longer
      # read anywhere in this workflow. It stays DECLARED for one release so
      # existing callers that pass it keep validating (behaviour is identical
      # whether or not it is passed); it is scheduled for REMOVAL in the next
      # breaking release. Configure sharding via `shard-matrix` alone.
      shards:
        description: >
          DEPRECATED — no longer read. Sharding is configured solely via
          shard-matrix; the shard-count denominator is derived from the matrix
          size (strategy.job-total). Declared for backwards compatibility
          only; scheduled for removal in the next breaking release.
        required: false
        type: number
        default: 1

      # JSON-encoded shard index array, e.g. "[1]" or "[1,2,3]". The single
      # sharding control: each test job's `--shard=<n>/<total>` denominator is
      # derived from the matrix size (`strategy.job-total`), so a mismatched
      # second input cannot under- or over-run the suite.
      shard-matrix:
        description: >
          JSON-encoded array of shard indices that drives the matrix strategy
          for the test jobs (e.g. "[1,2,3]" for 3 shards). The shard-count
          denominator each test invocation uses is derived from the matrix
          size (strategy.job-total), so this is the only sharding input.
          Defaults to "[1]" (single shard, no parallelism).
        required: false
        type: string
        default: '[1]'

      # Opt-in fail-fast (Story #223). When true, the FIRST tier-job failure
      # cancels the whole run via the Actions API, so doomed sibling tiers stop
      # consuming runner capacity (GitHub-hosted minutes, or a small self-hosted
      # runner pool — the swarm-os run 28666023203 failure mode). Default false
      # is byte-for-byte today's behaviour: every tier runs to completion.
      # Correctness under cancellation is carried by the `ci-required`
      # aggregator below: it runs `if: always()` and counts `cancelled` as
      # non-success, so branch protection stays red after a fail-fast cancel.
      # NOTE: cross-tier `needs:` gating was REJECTED as the mechanism — needs:
      # edges are static and cannot be toggled by a workflow_call input. The
      # cancel call needs `actions: write` on the token (declared below;
      # callers with restricted default token permissions must grant it — see
      # docs/reusable-workflows.md).
      fail-fast:
        description: >
          Cancel the entire run on the first tier-job failure. Opt-in: default
          false preserves full run-to-completion tier parallelism (identical
          behaviour to before this input existed). When true, each tier job's
          final step cancels the current run on that tier's failure, freeing
          runner capacity that cannot change the outcome. Requires the
          caller's GITHUB_TOKEN to allow the declared actions write permission
          (see docs/reusable-workflows.md).
        required: false
        type: boolean
        default: false

      # Per-tier enable toggles.
      enable-lint:
        description: 'Enable the lint + format-check tier.'
        required: false
        type: boolean
        default: true

      enable-typecheck:
        description: 'Enable the typecheck tier.'
        required: false
        type: boolean
        default: true

      enable-unit:
        description: 'Enable the unit-test tier.'
        required: false
        type: boolean
        default: true

      enable-contract:
        description: 'Enable the contract-test tier.'
        required: false
        type: boolean
        default: true

      enable-e2e:
        description: 'Enable the e2e / smoke tier (Playwright).'
        required: false
        type: boolean
        default: true

      # Destructive-migration guard (Story #111). Platformizes the guard domio
      # and athportal each hand-rolled and swarm-os lacked. OPT-IN (default
      # false) because not every consumer ships DB migrations; repos with a
      # migration tree set this true to inherit the same PR-time invariant.
      # When enabled it becomes a `needs:` of `ci-required`, so it is
      # branch-protection-load-bearing through the single aggregator context.
      enable-migration-guard:
        description: >
          Enable the destructive-migration label guard. Scans CHANGED migration
          files for a destructive SQL/drizzle signal (DROP / ALTER … DROP /
          TRUNCATE / drizzle drop-ops) and BLOCKS the PR unless the override
          label (migration-guard-label) is applied. Opt-in: default false.
        required: false
        type: boolean
        default: false

      # The override acknowledgement label. A reviewer applies this label to a
      # PR to consciously allow a detected destructive migration. The name is
      # part of the documented contract (docs/reusable-workflows.md).
      migration-guard-label:
        description: >
          PR label that overrides a destructive-migration finding. When this
          label is on the PR, the guard reports the finding but does NOT block.
          Default 'migration:destructive-ok'.
        required: false
        type: string
        default: 'migration:destructive-ok'

      # Comma-separated migration path globs the guard scans. A changed file
      # must match one of these (or end in `.sql`) to be inspected, so an
      # unrelated source file mentioning DROP never trips the guard.
      migration-guard-globs:
        description: >
          Comma-separated migration path globs scanned by the destructive
          guard. A changed file matching one of these (or any `*.sql`) is
          inspected for a destructive signal. Default
          '**/migrations/**,**/drizzle/**'.
        required: false
        type: string
        default: '**/migrations/**,**/drizzle/**'

      # Optional coverage floor (Story #109). Off by default (0) so
      # non-adopters keep today's behaviour: pr-quality.yml already uploads
      # `**/coverage/` as an artifact, but no job asserts a floor, so a PR can
      # drop coverage while ci-required stays green. Set this to a percent and
      # the unit job fails when measured coverage falls below it — and the unit
      # job is a `needs:` of ci-required, so the floor is load-bearing. Coverage
      # is read from the EXISTING `**/coverage/coverage-summary.json` output
      # (json-summary reporter); no new tooling is required of consumers.
      coverage-threshold:
        description: >
          Minimum coverage percentage the unit job must meet. 0 (default)
          disables the gate, preserving current behaviour. When > 0, the unit
          job fails if measured coverage (read from the existing
          **/coverage/coverage-summary.json) is below this floor. The unit job
          is a needs: of ci-required, so the floor blocks the merge.
        required: false
        type: number
        default: 0

      # Which coverage metric the floor asserts when coverage-threshold > 0.
      # One of: lines | statements | functions | branches. Default 'lines'.
      coverage-metric:
        description: >
          Coverage metric the coverage-threshold floor asserts: 'lines',
          'statements', 'functions', or 'branches'. Read from total.<metric>.pct
          in coverage-summary.json. Default 'lines'. Ignored when
          coverage-threshold is 0.
        required: false
        type: string
        default: 'lines'

      # Security tier (Story #65 / MP-10). Private-repo-capable: the secret
      # scan and SAST sub-steps run a pinned binary directly and assert on its
      # exit code, so they BLOCK on a finding even on a private repo with no
      # GitHub Advanced Security (no SARIF / Code Scanning upload required).
      enable-security:
        description: >
          Enable the security tier (PR-diff secret scan + SAST). Blocking on
          findings; works on private repos without GHAS. Default true.
        required: false
        type: boolean
        default: true

      # SAST toggle nested under the security tier. Some repos run their SAST
      # via a dedicated CodeQL/GHAS path and only want the secret scan here.
      enable-sast:
        description: >
          Enable the Semgrep SAST sub-step inside the security tier. Set false
          when the repo runs SAST via a dedicated CodeQL/GHAS workflow and only
          wants the PR-diff secret scan from this tier. Default true.
        required: false
        type: boolean
        default: true

      # Semgrep ruleset config for the SAST sub-step. Defaults to 'vendored',
      # a sentinel (NOT a literal semgrep --config value) that the SAST step
      # resolves to the path of this reusable workflow's OWN checked-out copy
      # of `.semgrep/rules.json` (Story #132) — a deterministic,
      # platform-controlled snapshot of the registry ruleset 'p/default',
      # filtered to the languages this platform's reusable workflows and
      # consumer trees actually scan (js/ts/yaml/json/bash/dockerfile/
      # generic/regex). It is NOT the live registry alias: that bit us on the
      # 0.14.0 release when 'p/default' silently grew the pnpm supply-chain
      # rules + `secrets-inherit`, redding a full-tree scan with zero code
      # change on our side. See docs/reusable-workflows.md's "SAST ruleset
      # provenance" section for the bump process
      # (`scripts/update-semgrep-rules.mjs`). NOTE: 'p/ci' was rejected as an
      # alternative default — it is too narrow (0 findings on
      # eval()/command-injection fixtures). Do NOT use 'auto' here either —
      # `auto` requires metrics ON (it phones semgrep.dev to tailor the rule
      # set), incompatible with the `--metrics=off` privacy posture of the
      # SAST step. A caller MAY still override with a live registry ref (e.g.
      # 'p/security-audit') or a path of their own — that reintroduces
      # registry drift for that input, a deliberate per-caller opt-out, not
      # the platform default.
      semgrep-config:
        description: >
          Semgrep config passed to `semgrep scan --config`. Default
          'vendored' resolves to this reusable workflow's own checked-out,
          platform-controlled ruleset snapshot at `.semgrep/rules.json` (see
          docs/reusable-workflows.md) — NOT the live registry. Pass a
          registry ref (e.g. 'p/security-audit') or a path to opt back into a
          different ruleset; 'auto' is unsupported because the step runs with
          --metrics=off.
        required: false
        type: string
        default: 'vendored'

      # Additional SAST exclude globs, APPENDED to the built-in `.agents`
      # exclude (the vendored framework tree a consumer cannot edit). The
      # security tier always passes `--exclude '.agents'`; this input lets a
      # consumer also drop its own generated code / test fixtures from the SAST
      # target set without forking the workflow. Space- or comma-separated; each
      # token becomes its own `--exclude <glob>` arg. Empty (default) → only the
      # built-in `.agents` exclude applies.
      sast-exclude:
        description: >
          Extra Semgrep `--exclude` globs, appended to the built-in `.agents`
          exclude. Space- or comma-separated (e.g. 'dist coverage tests/fixtures').
          Default '' (only the vendored `.agents` framework tree is excluded).
        required: false
        type: string
        default: ''

      # Cache toggle for the setup-toolchain composite action.
      toolchain-cache:
        description: >
          Passed through to setup-toolchain's `cache` input. Set to 'false' on
          self-hosted runners that maintain their own warm pnpm store.
        required: false
        type: string
        default: 'true'

      # pnpm shim destination for self-hosted runners.
      pnpm-dest:
        description: >
          Passed through to setup-toolchain's `pnpm-dest` input. Controls where
          pnpm/action-setup installs the pnpm shim. Leave empty to use
          setup-toolchain's default (runner.temp/pnpm). Self-hosted callers
          should set this explicitly (e.g. the runner.temp/pnpm expression)
          to avoid $HOME races and git-clean eviction.
        required: false
        type: string
        default: ''

      # Transitional lockfile-policy exception (Story #149). Passed through to
      # every setup-toolchain invocation's `trust-lockfile` input, appending
      # --trust-lockfile to the install step's `pnpm install --frozen-lockfile`
      # when 'true'. Exists so a consumer whose lockfile trips the pnpm
      # supply-chain policy check (TRUST_DOWNGRADE / MINIMUM_RELEASE_AGE_VIOLATION
      # findings introduced by #133's canonical config) has a documented,
      # consumer-controlled remediation path instead of hard-failing every tier
      # that delegates to setup-toolchain for its install. Default 'false'
      # preserves today's behavior on every job — no --trust-lockfile appended.
      # See docs/reusable-workflows.md for the documented-exception framing:
      # this is a transitional flag, not a permanent bypass — drop it once the
      # flagged lockfile entries clear the policy naturally.
      trust-lockfile:
        description: >
          Passed through to setup-toolchain's `trust-lockfile` input on every
          call site. Appends --trust-lockfile to the install step when 'true'.
          Default 'false' preserves current behavior (no --trust-lockfile) on
          every job. Intended as a transitional/documented-exception flag —
          see docs/reusable-workflows.md.
        required: false
        type: string
        default: 'false'

      # Egress audit (Story #112). Adds step-security/harden-runner in
      # `egress-policy: audit` mode as the FIRST step of every tier job, so each
      # consumer inherits a zero-risk network-egress baseline on every PR run.
      # Audit mode only REPORTS outbound traffic (it never blocks), so adopting
      # it cannot break a build; it can later be tightened to `block` with an
      # allowlist (see docs/reusable-workflows.md). Runner-aware: the step is
      # gated to GitHub-hosted ubuntu-latest, the only runner where the action
      # installs the monitor. On self-hosted runners (a JSON-array `runner`
      # string such as the domio/athportal labels) it is a NO-OP — harden-runner
      # deploys its agent via the runner image there, with no workflow step, so
      # running the action would be redundant at best. Default true: every
      # default ubuntu-latest consumer inherits the baseline automatically.
      enable-harden-runner:
        description: >
          Enable the step-security/harden-runner egress audit (audit mode,
          non-blocking) as the first step of each tier job. Effective only on
          the GitHub-hosted ubuntu-latest runner; a no-op on self-hosted runners
          (where harden-runner's agent ships in the runner image, not the
          workflow). Default true.
        required: false
        type: boolean
        default: true

      # OSV-scanner advisory tier (Story #114). Renovate *bumps* dependency
      # versions but never alerts on advisories for versions sitting un-bumped
      # (inside `minimumReleaseAge` or major-gated), leaving a window with no
      # live CVE signal. This tier closes it: a pinned OSV-scanner binary scans
      # the lockfile/manifest tree for known advisories. Like the secret/SAST
      # tiers it runs a PINNED, checksum-verified binary directly and asserts on
      # findings via the run log / job summary — NO SARIF / GHAS dependency — so
      # it is load-bearing on a PRIVATE repo with no GitHub Advanced Security
      # (the same constraint that made gitleaks/Semgrep the chosen gates over
      # CodeQL). Default ON: every consumer inherits the advisory signal on pin
      # bump. When enabled it is a `needs:` of `ci-required`, so the gate is
      # branch-protection-load-bearing through the single aggregator context.
      enable-osv-scan:
        description: >
          Enable the OSV-scanner advisory tier (scans the lockfile/manifest tree
          for known dependency advisories via a pinned, checksum-verified
          binary; findings surface in the run log + job summary, no SARIF/GHAS).
          Default true.
        required: false
        type: boolean
        default: true

      # Severity-to-gate threshold for the OSV-scan tier. OSV-scanner's own exit
      # code is non-zero on ANY advisory regardless of severity; this input lets
      # a consumer decide which CVSS band fails `ci-required` vs only warns. Each
      # advisory's CVSS base score (the group's `max_severity` in OSV's JSON) is
      # bucketed into critical (≥9.0) / high (≥7.0) / medium (≥4.0) / low (>0) /
      # none (unscored). A finding at or above the configured band BLOCKS the
      # job (and therefore the merge); findings below it are reported as a
      # WARNING in the job summary without failing. Set 'critical' to gate on
      # criticals only, or 'none' to fail on ANY advisory including unscored
      # ones (strictest). Default 'high'.
      osv-fail-on-severity:
        description: >
          Lowest CVSS severity band that FAILS the OSV-scan tier (and therefore
          ci-required): 'critical' (>=9.0), 'high' (>=7.0), 'medium' (>=4.0),
          'low' (>0), or 'none' (any advisory, including unscored). Advisories
          below the band are reported as warnings without blocking. Default
          'high'.
        required: false
        type: string
        default: 'high'

      # Pinned OSV-scanner version for the advisory tier. The per-platform asset
      # (darwin/linux × amd64/arm64) is verified against a pinned SHA-256 before
      # execution, mirroring the gitleaks secret-scan posture. Bump alongside
      # the checksum map in the osv-scan job when this pin moves.
      osv-scanner-version:
        description: >
          Pinned OSV-scanner release version (without the leading 'v') for the
          advisory tier. Default 2.4.0. Bump alongside the per-platform SHA-256
          map in the osv-scan job.
        required: false
        type: string
        default: '2.4.0'

      # Per-finding suppression/allow-list for the OSV-scan tier (Story #145).
      # Optional consumer-supplied JSON file keyed by OSV/GHSA id; matched
      # findings are reported as SUPPRESSED instead of gating ci-required. A
      # consumer with no file at this path sees byte-for-byte identical
      # gating behaviour to today (the file is read with a missing-file
      # fallback to "no suppressions"). See docs/reusable-workflows.md.
      osv-allowlist-path:
        description: >
          Path (relative to the consumer repo root) to an optional OSV
          allow-list JSON file. Each entry requires id, reason, and
          revisitBy; optionally package/ecosystem to scope the match.
          Entries past revisitBy re-gate as blocking. Missing file is a
          no-op (identical to having no allow-list). Default
          '.osv-allowlist.json'.
        required: false
        type: string
        default: '.osv-allowlist.json'

      # Wrangler-baseline tier (Story #177, roadmap §2a.3). Four wrangler
      # invariants — env.* named-Environment split, logpush: true, an
      # Analytics Engine binding, and a compatibility_date staleness policy —
      # were "kept by convention" with no automated check (repo-ops consumers
      # matrix §2/§7). scripts/check-wrangler-baseline.mjs enforces all four
      # against the consumer's own wrangler.toml / wrangler.jsonc; a consumer
      # with no wrangler config at all (not every consumer is a Cloudflare
      # Worker) is a no-op pass. Runs as a step inside the `lint` tier rather
      # than a standalone job — it needs no toolchain beyond Node, matching
      # the check-docs-staleness.mjs precedent of a dependency-free inline
      # script. Default ON, but see `wrangler-baseline-fail-on-violation`
      # below for the advisory rollout posture.
      enable-wrangler-baseline-check:
        description: >
          Enable the wrangler.toml/wrangler.jsonc baseline check (env.* split,
          logpush, Analytics Engine binding, compatibility_date staleness
          window) as a step in the lint tier. A consumer with no wrangler
          config is a no-op pass. Default true.
        required: false
        type: boolean
        default: true

      # Advisory-first rollout (acceptance criteria): the gate ships
      # non-blocking by default so the fleet can be swept clean via the
      # dashboard output before any consumer's `ci-required` starts failing on
      # it. Flip the caller's default to `true` once every consumer is green,
      # mirroring the repo-settings dashboard's non-blocking-by-design posture
      # until a per-consumer decision promotes it.
      wrangler-baseline-fail-on-violation:
        description: >
          When true, an un-excepted wrangler-baseline violation fails the
          lint tier (and therefore ci-required). When false (default),
          violations are reported in the run log but never block — the
          advisory rollout posture until the fleet is clean. A consumer
          declares a legitimate per-rule opt-out via
          "mandrel.wranglerBaselineExceptions" in its own wrangler config
          regardless of this setting (see docs/reusable-workflows.md).
        required: false
        type: boolean
        default: false

      # Staleness window (days) for the compatibility_date rule. Renovate's
      # shared preset bumps compatibility_date whenever wrangler itself is
      # bumped, but a Worker that goes untouched by that bump for a long
      # stretch can still drift; this is the independent staleness backstop.
      wrangler-baseline-max-age-days:
        description: >
          Maximum age (in days) of compatibility_date before the
          wrangler-baseline check flags it as stale. Default 90.
        required: false
        type: number
        default: 90

    secrets:
      # Turbo remote cache credentials (athportal pattern).
      TURBO_TOKEN:
        description: 'Turbo remote cache read/write token.'
        required: false
      TURBO_TEAM:
        description: 'Turbo team slug for remote cache scoping.'
        required: false
      # Private-registry read token (GitHub Packages etc.). Passed to every
      # setup-toolchain call site so a consumer whose committed .npmrc
      # authenticates a private scope via ${PACKAGES_READ_TOKEN} installs
      # cleanly on the frozen-lockfile tiers. Optional — repos without a
      # private-registry dependency omit it (default behavior unchanged).
      packages-read-token:
        description: 'Token for reading a private npm registry during install.'
        required: false

# Permissions: callers inherit the calling workflow's token permissions.
# We declare the minimum needed here; callers may narrow further.
# `actions: write` exists solely for the opt-in fail-fast cancel step
# (Story #223) — a reusable workflow cannot elevate beyond what the caller's
# token grants, so callers with restricted default token permissions must
# grant it at the caller level (see docs/reusable-workflows.md). The cancel
# step itself fails loud-but-non-fatal (::warning::) when the grant is
# missing, so a permission gap can never mask a real tier failure.
permissions:
  contents: read
  actions: write

# NOTE: concurrency is declared at JOB level (below), not here. A workflow
# consumed only via `workflow_call` never has its workflow-level `concurrency:`
# evaluated — its jobs run inside the CALLER's run, so a workflow-level block
# here is dead code that serializes nothing (the same pitfall uptime-apply.yml
# and codeql.yml document). Each tier job carries its own
# `pr-quality-<job>-${{ github.ref }}` group with `cancel-in-progress: true`,
# so a superseded PR push cancels the prior run's same-tier job WITHOUT
# serializing the parallel tiers within a single run.

jobs:
  # ── Tier 1: Lint + format-check ───────────────────────────────────────────
  lint:
    name: Lint & format
    if: ${{ inputs.enable-lint }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    # Per-job (see the note above `jobs:`): a unique per-tier group keyed on
    # the caller's ref cancels a superseded run's lint job without serializing
    # the sibling tiers of the same run.
    concurrency:
      group: pr-quality-lint-${{ github.ref }}
      cancel-in-progress: true
    steps:
      # Egress audit baseline (Story #112). Audit mode reports — never blocks —
      # outbound network traffic. Gated to GitHub-hosted ubuntu-latest; a no-op
      # on self-hosted runners (harden-runner ships its agent in the runner
      # image there). MUST be the first step so it monitors all that follow.
      # Anchored (`&harden-runner`) and aliased into every other tier job —
      # whole-step aliases only; merge keys (`<<:`) are unsupported by Actions.
      - &harden-runner
        name: Harden runner (egress audit)
        # L6: match any GitHub-hosted ubuntu image (ubuntu-latest,
        # ubuntu-24.04, ubuntu-22.04, …), not just the exact 'ubuntu-latest'
        # string — a capable pinned-version runner would otherwise silently
        # lose the egress-audit baseline. `startsWith` is false for a
        # JSON-array self-hosted `runner` string, keeping the step a no-op
        # there (harden-runner ships its agent in the self-hosted image).
        if: ${{ inputs.enable-harden-runner && startsWith(inputs.runner, 'ubuntu-') }}
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Default shallow checkout, anchored (`&checkout`) for the tiers that
      # need no git history. Jobs whose gates resolve merge bases / diff
      # ranges (migration-guard, security) keep their own fetch-depth: 0
      # checkout — an anchor cannot be partially overridden without merge
      # keys. NOTE (Story #235): this tier historically used fetch-depth: 0
      # with no consumer — nothing in lint/format/wrangler-baseline reads git
      # history — so the full-history clone was dropped.
      - &checkout
        name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # No later step does authenticated git network ops, so do not leave
          # GITHUB_TOKEN persisted in .git/config while third-party code
          # (pnpm lifecycle scripts, PyPI Semgrep, Playwright) runs under a
          # token carrying `actions: write` — a compromised package could read
          # it from .git/config (M5). The side-checkouts already set this.
          persist-credentials: false

      - &setup-toolchain
        name: Setup toolchain
        uses: dsj1984/mandrel-platform/.github/actions/setup-toolchain@1ace1d82dfd181ce0a02367294c614ac9894da9f
        with:
          cache: ${{ inputs.toolchain-cache }}
          pnpm-dest: ${{ inputs.pnpm-dest }}
          trust-lockfile: ${{ inputs.trust-lockfile }}
          packages-read-token: ${{ secrets.packages-read-token }}

      - name: Lint
        run: pnpm run lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Format check
        run: pnpm run format:check
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # Wrangler-baseline check (Story #177, roadmap §2a.3). Dependency-free
      # Node script — no toolchain beyond what setup-toolchain already
      # installed above. Runs against the consumer's own wrangler.toml /
      # wrangler.jsonc at the repo root; a consumer with none is a no-op pass.
      # Resolves the script from the installed npm config package first (the
      # `mandrel-platform` `exports["./scripts/*"]` surface every consumer
      # already gets via its devDependency), falling back to this repo's own
      # checkout path when running inside mandrel-platform itself (there is no
      # installed copy of the package to depend on here).
      - name: Wrangler baseline check
        if: ${{ inputs.enable-wrangler-baseline-check }}
        shell: bash
        env:
          MAX_AGE_DAYS: ${{ inputs.wrangler-baseline-max-age-days }}
          FAIL_ON_VIOLATION: ${{ inputs.wrangler-baseline-fail-on-violation }}
        run: |
          set -euo pipefail
          if [ -f "node_modules/mandrel-platform/scripts/check-wrangler-baseline.mjs" ]; then
            script="node_modules/mandrel-platform/scripts/check-wrangler-baseline.mjs"
          elif [ -f "scripts/check-wrangler-baseline.mjs" ]; then
            script="scripts/check-wrangler-baseline.mjs"
          elif [ "${FAIL_ON_VIOLATION}" = "true" ]; then
            # L5: in opted-in BLOCKING mode a missing check script means the
            # gate the consumer explicitly enabled never ran — that must fail,
            # not silently pass. (Advisory mode keeps the warn-and-pass path.)
            echo "::error::check-wrangler-baseline.mjs not found in node_modules/mandrel-platform/scripts or ./scripts, but wrangler-baseline-fail-on-violation=true — the blocking baseline gate cannot run. Add mandrel-platform as a devDependency to provide the script."
            exit 1
          else
            echo "::warning::check-wrangler-baseline.mjs not found in node_modules/mandrel-platform/scripts or ./scripts — skipping (add mandrel-platform as a devDependency to enable this check)."
            exit 0
          fi
          args=(--max-age-days "${MAX_AGE_DAYS}")
          if [ "${FAIL_ON_VIOLATION}" != "true" ]; then
            args+=(--warn-only)
          fi
          node "${script}" "${args[@]}"

      # Opt-in fail-fast (Story #223): on this tier's failure, cancel the whole
      # run so doomed sibling tiers stop consuming runner capacity. MUST be the
      # LAST step of the job, so `if: always()` steps (artifact uploads) finish
      # before the run-wide cancel signal lands. Correctness under cancellation
      # is carried by `ci-required`: it runs `if: always()` and counts
      # `cancelled` as non-success, so branch protection stays red. Loud but
      # NON-FATAL: any cancel failure (typically the caller's token lacking
      # `actions: write`) surfaces as a ::warning:: and exits 0, so a
      # permission gap can never mask this tier's own failure result. Anchored
      # (`&cancel-on-failure`) and aliased as the LAST step of every tier job
      # below — a whole-step YAML alias keeps the `if:` gate visible on the
      # workflow surface (a composite action would hide it).
      - &cancel-on-failure
        name: Cancel run on tier failure (fail-fast)
        if: ${{ failure() && inputs.fail-fast }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          echo "fail-fast: tier failed — requesting cancellation of run ${RUN_ID}."
          if command -v gh >/dev/null 2>&1; then
            if gh run cancel "${RUN_ID}" --repo "${REPO}"; then
              echo "Cancellation requested via gh run cancel."
              exit 0
            fi
            echo "gh run cancel failed; falling back to the REST cancel endpoint."
          fi
          status="$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${REPO}/actions/runs/${RUN_ID}/cancel" || true)"
          if [ "${status}" = "202" ]; then
            echo "Cancellation requested via REST (HTTP 202)."
            exit 0
          fi
          echo "::warning::fail-fast could not cancel run ${RUN_ID} (HTTP ${status:-n/a}) — the tier failure above still fails ci-required. Grant 'actions: write' on the caller's GITHUB_TOKEN to enable fail-fast cancellation (see docs/reusable-workflows.md)."
          exit 0

  # ── Tier 2: Typecheck ─────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    if: ${{ inputs.enable-typecheck }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    concurrency:
      group: pr-quality-typecheck-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - *harden-runner

      - *checkout

      - *setup-toolchain

      - name: Typecheck
        run: pnpm run typecheck
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # Opt-in fail-fast (Story #223) — aliased cancel step; see the lint
      # tier's anchor (`&cancel-on-failure`) for the full rationale (must be
      # the LAST step; loud-but-non-fatal; ci-required counts cancelled as
      # non-success).
      - *cancel-on-failure

  # ── Tier 3: Unit tests ────────────────────────────────────────────────────
  unit:
    name: Unit (${{ matrix.shard }}/${{ strategy.job-total }})
    if: ${{ inputs.enable-unit }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    # Keyed on the shard too so parallel shards of the SAME run keep distinct
    # groups (a shared group would serialize them); across runs a superseded
    # push still cancels the prior run's matching shard.
    concurrency:
      group: pr-quality-unit-${{ matrix.shard }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(inputs.shard-matrix) }}
    steps:
      - *harden-runner

      - *checkout

      - *setup-toolchain

      - name: Unit tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: pnpm run test:unit --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # ── Optional coverage floor (Story #109) ──────────────────────────────
      #
      # Off by default: when `coverage-threshold` is 0 both steps are skipped,
      # so non-adopters keep today's behaviour. When set, the gate reads the
      # EXISTING `**/coverage/coverage-summary.json` (the same json-summary
      # output uploaded below) and FAILS the unit job — which is a `needs:` of
      # ci-required — when measured `total.<metric>.pct` is below the floor. A
      # set floor with NO coverage summary also fails (never a silent pass on
      # missing data).
      #
      # The gate logic is the platform's own unit-tested
      # scripts/check-coverage-threshold.mjs, delivered via a sparse
      # side-checkout of mandrel-platform at `github.job_workflow_sha` — the
      # same resolved-ref mechanism the SAST vendored-ruleset step below uses
      # (Story #230; replaces the inlined heredoc copy whose drift #163
      # documented). A script fetched at `job_workflow_sha` is exactly as
      # version-locked as inline YAML: the consumer always runs the script
      # that shipped with the workflow version it pinned, with zero drift risk.
      - name: Checkout gate scripts (mandrel-platform@resolved-sha)
        if: ${{ inputs.coverage-threshold != 0 }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: dsj1984/mandrel-platform
          # `job_workflow_sha` is a valid runtime github-context field that
          # actionlint's pinned context type model does not list, so it is
          # read through the `fromJSON(toJSON(github))` escape hatch (typed
          # `any`) — same pattern as the SAST vendored-ruleset checkout.
          ref: ${{ fromJSON(toJSON(github)).job_workflow_sha }}
          sparse-checkout: |
            scripts
          sparse-checkout-cone-mode: false
          path: _mandrel-platform-scripts
          persist-credentials: false

      - name: Coverage threshold gate
        if: ${{ inputs.coverage-threshold != 0 }}
        shell: bash
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
          COVERAGE_METRIC: ${{ inputs.coverage-metric }}
        run: |
          set -euo pipefail
          node _mandrel-platform-scripts/scripts/check-coverage-threshold.mjs \
            --threshold "${COVERAGE_THRESHOLD}" \
            --metric "${COVERAGE_METRIC}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unit-results-${{ matrix.shard }}
          path: |
            **/test-results/
            **/coverage/
          retention-days: 7

      # Opt-in fail-fast (Story #223) — aliased cancel step; see the lint
      # tier's anchor (`&cancel-on-failure`) for the full rationale (must be
      # the LAST step; loud-but-non-fatal; ci-required counts cancelled as
      # non-success).
      - *cancel-on-failure

  # ── Tier 4: Contract tests ────────────────────────────────────────────────
  contract:
    name: Contract (${{ matrix.shard }}/${{ strategy.job-total }})
    if: ${{ inputs.enable-contract }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    concurrency:
      group: pr-quality-contract-${{ matrix.shard }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(inputs.shard-matrix) }}
    steps:
      - *harden-runner

      - *checkout

      - *setup-toolchain

      - name: Contract tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: pnpm run test:contract --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Upload contract results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: contract-results-${{ matrix.shard }}
          path: '**/test-results/'
          retention-days: 7

      # Opt-in fail-fast (Story #223) — aliased cancel step; see the lint
      # tier's anchor (`&cancel-on-failure`) for the full rationale (must be
      # the LAST step; loud-but-non-fatal; ci-required counts cancelled as
      # non-success).
      - *cancel-on-failure

  # ── Tier 5: E2E / Smoke (Playwright) ─────────────────────────────────────
  e2e:
    name: E2E / Smoke (${{ matrix.shard }}/${{ strategy.job-total }})
    if: ${{ inputs.enable-e2e }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 45
    concurrency:
      group: pr-quality-e2e-${{ matrix.shard }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(inputs.shard-matrix) }}
    steps:
      - *harden-runner

      - *checkout

      - *setup-toolchain

      - name: Resolve Playwright version
        id: pw-version
        shell: bash
        run: |
          PW_VERSION=$(node -e "const p=require('./node_modules/@playwright/test/package.json');console.log(p.version)")
          echo "version=${PW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Install browser OS dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps

      - name: E2E / Smoke (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: pnpm run test:e2e --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-${{ matrix.shard }}
          path: |
            **/playwright-report/
            **/test-results/
          retention-days: 14

      # Opt-in fail-fast (Story #223) — aliased cancel step; see the lint
      # tier's anchor (`&cancel-on-failure`) for the full rationale (must be
      # the LAST step; loud-but-non-fatal; ci-required counts cancelled as
      # non-success).
      - *cancel-on-failure

  # ── Destructive-migration label guard (Story #111) ───────────────────────
  #
  # Platformizes the destructive-migration guard domio and athportal each
  # hand-rolled and swarm-os was missing. OPT-IN via `enable-migration-guard`.
  # When enabled it is a `needs:` of `ci-required` (below), so it is
  # branch-protection-load-bearing through the single aggregator context.
  #
  # Contract (documented in docs/reusable-workflows.md):
  #   • Detects a destructive signal in CHANGED migration files only — DROP /
  #     ALTER … DROP / TRUNCATE / drizzle drop-ops. Comment-only mentions are
  #     stripped before matching, so a `-- DROP TABLE …` note never trips it.
  #   • A changed file is "a migration" when its path matches one of
  #     `migration-guard-globs` OR ends in `.sql`.
  #   • The override is an explicit PR label (`migration-guard-label`,
  #     default `migration:destructive-ok`). With the label present the guard
  #     reports the finding but does NOT block; absent, a finding fails the job.
  #
  # STATIC, PR-time signal only (per the Story's Out of Scope): it inspects
  # changed migration files, it does NOT introspect a live database, and it
  # does not touch the snapshot/rollback flow in deploy-cloudflare.yml.
  #
  # The gate logic is the platform's own unit-tested
  # scripts/check-destructive-migration.mjs (see its sibling
  # check-destructive-migration.test.mjs), delivered via a sparse
  # side-checkout of mandrel-platform at `github.job_workflow_sha` — the same
  # resolved-ref mechanism the SAST vendored-ruleset step below uses (Story
  # #230; replaces a ~120-line in-workflow bash re-implementation of the same
  # contract). A consumer still needs no consumer-side script copy to inherit
  # the gate, and always runs the script that shipped with the workflow
  # version it pinned.
  migration-guard:
    name: Destructive-migration guard
    if: ${{ inputs.enable-migration-guard }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    concurrency:
      group: pr-quality-migration-guard-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      # Job-level permissions REPLACE the workflow-level block, so the
      # fail-fast cancel grant (Story #223) must be re-declared here.
      actions: write
      # Story #292: the override-label re-fetch below reads
      # repos/{repo}/issues/{n}/labels via `gh api`. GITHUB_TOKEN can read a
      # PUBLIC repo's issues regardless of granted scopes, which is why this
      # job worked without this line on this (public) repo — but on a
      # PRIVATE consumer repo the same call 403s without an explicit read
      # grant, so the guard silently and permanently treated the override
      # label as absent. `pull-requests: read` covers the PR-labels read.
      pull-requests: read
    steps:
      - *harden-runner

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history so the merge-base diff resolves the PR's changed set.
          fetch-depth: 0
          # This job runs the destructive-migration gate script; no step does
          # authenticated git network ops, so do not persist GITHUB_TOKEN in
          # .git/config while it runs (M5).
          persist-credentials: false

      # Fetch the tested gate script at the exact SHA the caller's
      # `uses: …/pr-quality.yml@<ref>` pin resolved to — the same
      # `job_workflow_sha` side-checkout mechanism the SAST vendored-ruleset
      # step uses (full rationale on that step, in the security job below).
      - name: Checkout gate scripts (mandrel-platform@resolved-sha)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: dsj1984/mandrel-platform
          # `job_workflow_sha` is a valid runtime github-context field that
          # actionlint's pinned context type model does not list, so it is
          # read through the `fromJSON(toJSON(github))` escape hatch (typed
          # `any`) — same pattern as the SAST vendored-ruleset checkout.
          ref: ${{ fromJSON(toJSON(github)).job_workflow_sha }}
          sparse-checkout: |
            scripts
          sparse-checkout-cone-mode: false
          path: _mandrel-platform-scripts
          persist-credentials: false

      # Resolve the PR's changed files and run the guard. On pull_request
      # events we diff the MERGE BASE of base..head (the commits the PR
      # actually introduces) against head; on other events the guard has no PR
      # context and is a no-op pass. The script filters the changed set to
      # migration files (`migration-guard-globs` plus an always-on `*.sql`
      # tail), strips SQL/JS comments before matching, treats a DELETED
      # migration file as destructive by itself, honours the override label,
      # and writes the job-summary block — the exit code is the gate.
      - name: Scan for destructive migrations
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GLOBS: ${{ inputs.migration-guard-globs }}
          OVERRIDE_LABEL: ${{ inputs.migration-guard-label }}
          # L4: the override label is re-fetched LIVE via `gh api` at run time
          # (below) rather than read from the triggering event payload, so
          # adding OR removing the label re-evaluates the gate correctly on a
          # re-run even when the caller does not subscribe to labeled/unlabeled
          # events. `gh api` needs a token and the PR coordinates.
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Story #292: fallback source when the live re-fetch fails — the
          # labels attached to the PR at the triggering event. Possibly
          # stale (a label added/removed since the event won't show), but a
          # slightly-stale override read beats an override that never works.
          EVENT_LABELS_JSON: ${{ toJSON(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_SHA:-}" ] || [ -z "${HEAD_SHA:-}" ]; then
            echo "No pull_request context — destructive-migration guard is a no-op."
            exit 0
          fi

          # M8: diff from the MERGE BASE of base..head, not the base tip. A
          # two-dot `git diff "${BASE_SHA}" "${HEAD_SHA}"` compares endpoints,
          # so once main advances past the fork point it reports migrations
          # merged by OTHERS as this PR's changes (and shows a migration absent
          # from head as a `D` destructive block) — a false positive that
          # trains reviewers to reflexively apply the override label. The merge
          # base is the true fork point; `fetch-depth: 0` on the checkout above
          # already makes it resolvable.
          merge_base="$(git merge-base "${BASE_SHA}" "${HEAD_SHA}")"
          echo "Migration guard diff base (merge-base of ${BASE_SHA}..${HEAD_SHA}): ${merge_base}"

          # L4 / Story #292: re-fetch the PR's labels live so a label
          # add/remove since the triggering event is honoured. Exact-element
          # match against the configured override label (jq compares whole
          # strings, so there is no substring-collision false positive).
          #
          # Resolution order:
          #   1. Live `gh api` re-fetch (primary — catches a label change
          #      since the triggering event, e.g. a re-run with no new push).
          #   2. Event-payload labels (fallback — possibly stale, but keeps
          #      the override usable when the live re-fetch 403s/network-
          #      fails, e.g. a PR-scoped token on a private consumer repo).
          #   3. Absent (fail closed — a real destructive migration still
          #      blocks).
          # The stderr from a failed `gh api` call is captured and surfaced
          # (not swallowed to /dev/null) so a permission/network problem is
          # diagnosable in the job log instead of reading identically to
          # "label genuinely absent".
          label_present="false"
          label_source="none"
          if [ -n "${PR_NUMBER:-}" ]; then
            gh_api_err="$(mktemp)"
            if labels_json="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" --jq '[.[].name]' 2>"${gh_api_err}")"; then
              label_source="live"
              if printf '%s' "${labels_json}" \
                | jq -e --arg l "${OVERRIDE_LABEL}" 'index($l) != null' >/dev/null 2>&1; then
                label_present="true"
              fi
              echo "Live PR labels re-fetched via gh api; override label '${OVERRIDE_LABEL}' present: ${label_present}"
            else
              echo "::warning::Could not re-fetch PR labels via gh api (repos/${REPO}/issues/${PR_NUMBER}/labels): $(cat "${gh_api_err}") — falling back to the triggering event's label payload."
              if labels_json="$(printf '%s' "${EVENT_LABELS_JSON}" | jq -e '[.[].name]' 2>"${gh_api_err}")"; then
                label_source="event-payload"
                if printf '%s' "${labels_json}" \
                  | jq -e --arg l "${OVERRIDE_LABEL}" 'index($l) != null' >/dev/null 2>&1; then
                  label_present="true"
                fi
                echo "::warning::Using event-payload labels (possibly stale) — override label '${OVERRIDE_LABEL}' present: ${label_present}"
              else
                echo "::warning::Event-payload label fallback also unavailable ($(cat "${gh_api_err}")) — treating the override label as ABSENT so a destructive migration still blocks."
              fi
            fi
            rm -f "${gh_api_err}"
          fi

          echo "Override label resolution: source=${label_source} present=${label_present}"

          # `--diff-filter` keeps Added/Copied/Modified/Renamed/Deleted; a
          # DELETED migration is itself a destructive signal, so we keep D.
          args=(--changed-files - --migration-glob "${GLOBS}" --override-label "${OVERRIDE_LABEL}")
          if [ "${label_present}" = "true" ]; then
            args+=(--label-present)
          fi
          git diff --name-only --diff-filter=ACMRD "${merge_base}" "${HEAD_SHA}" \
            | node _mandrel-platform-scripts/scripts/check-destructive-migration.mjs "${args[@]}"

      # Opt-in fail-fast (Story #223) — aliased cancel step; see the lint
      # tier's anchor (`&cancel-on-failure`) for the full rationale (must be
      # the LAST step; loud-but-non-fatal; ci-required counts cancelled as
      # non-success).
      - *cancel-on-failure

  # ── Tier 6: Security (PR-diff secret scan + SAST) ─────────────────────────
  #
  # Private-repo-capable security tier (Story #65 / MP-10). Both sub-steps run
  # a pinned binary directly and BLOCK the job on a finding via a non-zero
  # exit code — no SARIF / Code Scanning upload, so the gate is load-bearing on
  # a PRIVATE repo with NO GitHub Advanced Security (the failure mode that left
  # athportal's `gitleaks-pr` + CodeQL green no-ops and stripped swarm-os's CI
  # secret scan). Cross-platform: the shared gitleaks-scan composite action's
  # asset selector resolves the right binary for self-hosted darwin/linux
  # runners AND ubuntu-latest, each verified against a pinned SHA-256 (the
  # version + checksum map is single-homed in that composite — Story #229).
  #
  #   • Secret scan — pinned gitleaks binary over the PR diff (blocking).
  #   • SAST        — pinned Semgrep, `--error` fails the job on any finding
  #                   (blocking, no SARIF upload). On pull_request events it is
  #                   scoped to the PR diff via `--baseline-commit <merge-base>`
  #                   (M8: the true fork point, not the base-branch tip, so
  #                   base drift never surfaces phantom findings), so only INTRODUCED
  #                   by the PR block; on push / schedule it scans the full tree.
  #                   The vendored framework tree `.agents/` is ALWAYS excluded
  #                   (`--exclude '.agents'`): it is materialized from the pinned
  #                   `mandrel` package and a consumer cannot edit it, so gating
  #                   `ci-required` on the framework's own findings is a false
  #                   block (Story #93). Consumers can drop their own generated
  #                   code / fixtures too via the `sast-exclude` input, which is
  #                   APPENDED to the built-in `.agents` exclude.
  #
  # GHAS path (alternative, documented per AC): repos that DO have GitHub
  # Advanced Security can instead run CodeQL (codeql.yml) and flip its
  # `upload: never` → `always` to surface findings as a blocking Code Scanning
  # check. This tier is the no-GHAS-required default so every consumer inherits
  # an effective gate regardless of plan.
  security:
    name: Security (secret scan + SAST)
    if: ${{ inputs.enable-security }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    concurrency:
      group: pr-quality-security-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      # Job-level permissions REPLACE the workflow-level block, so the
      # fail-fast cancel grant (Story #223) must be re-declared here.
      actions: write
    steps:
      - *harden-runner

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history so the gitleaks PR-diff scan can resolve the merge
          # base; a shallow clone would miss commits introduced by the PR.
          fetch-depth: 0
          # This job runs third-party code (PyPI Semgrep, the pinned gitleaks
          # binary); no step does authenticated git network ops, so do not
          # persist GITHUB_TOKEN in .git/config while it runs (M5).
          persist-credentials: false

      # Resolve the gitleaks commit range so the scan is scoped to what the
      # event INTRODUCED — pre-existing findings never block. On pull_request
      # events the range is the commits the PR introduces (merge-base..head).
      # On push events (Story #175 canonical `workflow_run` deploy trigger made
      # push-to-main CI load-bearing — see also the SAST baseline below) the
      # range is `event.before..sha`, the commits the push added; the pushed
      # code already passed its PR's diff scan, so a full-tree re-scan on every
      # push would block on unrelated pre-existing debt. Only when no ranged
      # base is resolvable (no PR context, and no valid non-zero `event.before`
      # ancestor — e.g. a branch-creation push) does it fall back to a
      # full-tree scan. `fetch-depth: 0` on the checkout above makes the base
      # commit reachable.
      - name: Resolve secret-scan range
        id: range
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [ -n "${BASE_SHA:-}" ] && [ -n "${HEAD_SHA:-}" ]; then
            echo "mode=range" >> "$GITHUB_OUTPUT"
            echo "range=${BASE_SHA}..${HEAD_SHA}" >> "$GITHUB_OUTPUT"
            echo "PR-diff secret scan: ${BASE_SHA}..${HEAD_SHA}"
          elif [ "${EVENT_NAME:-}" = "push" ] && [ -n "${BEFORE_SHA:-}" ] && \
               [ "${BEFORE_SHA}" != "${ZERO_SHA}" ] && \
               git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            echo "mode=range" >> "$GITHUB_OUTPUT"
            echo "range=${BEFORE_SHA}..${PUSH_HEAD_SHA}" >> "$GITHUB_OUTPUT"
            echo "push-diff secret scan: ${BEFORE_SHA}..${PUSH_HEAD_SHA}"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "range=" >> "$GITHUB_OUTPUT"
            echo "Full-tree secret scan (no ranged base)."
          fi

      # Download + verify a PINNED gitleaks binary and run the blocking scan
      # via the shared first-party gitleaks-scan composite action, which owns
      # the version + per-platform SHA-256 checksum map and the cross-platform
      # asset selector (darwin/linux × arm64/x64; self-hosted and
      # ubuntu-latest). Pinning the binary (not the gitleaks-action) is what
      # makes this gate work on a private repo with no GHAS and no license:
      # the action's org features require GITLEAKS_LICENSE, the binary does
      # not. Blocking: gitleaks exits non-zero on a leak (default exit-code
      # 1), failing this job — no SARIF upload required.
      #
      # PIN NOTE (Story #229, same lockstep model as setup-toolchain / #162):
      # pinned to the intra-PR commit that introduced the composite — the
      # first SHA whose tree contains it. Bump to the next release SHA in the
      # post-release pin-bump follow-up.
      - name: Secret scan (pinned gitleaks, blocking)
        uses: dsj1984/mandrel-platform/.github/actions/gitleaks-scan@b48be232f44cba7fb759a69808cf50fffb42895d
        with:
          # 'range' mode from the resolver maps to a range-scoped git-history
          # scan; the no-ranged-base fallback stays a full working-tree scan.
          mode: ${{ steps.range.outputs.mode == 'range' && 'git' || 'dir' }}
          log-opts: ${{ steps.range.outputs.range }}
          verbose: 'true'

      # M7: fetch THIS reusable workflow's hash-pinned Semgrep lockfile at the
      # exact resolved SHA the caller pinned (`job_workflow_sha`), so the SAST
      # step installs Semgrep + its full transitive closure via
      # `pip install --require-hashes` rather than a top-pin-only PyPI resolve
      # whose ~40 transitives float at run time. The lockfile lives in THIS
      # repo's `scripts/`, not the consumer's checkout, so — like the vendored
      # ruleset — it comes from a dedicated side-checkout. Gated on
      # `enable-sast` (needed regardless of `semgrep-config`, unlike the
      # vendored-ruleset checkout below which is vendored-only).
      - name: Checkout Semgrep lockfile (mandrel-platform@resolved-sha)
        if: ${{ inputs.enable-sast }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: dsj1984/mandrel-platform
          # `job_workflow_sha` is a valid runtime github-context field that
          # actionlint's pinned context type model does not list, so it is
          # read through the `fromJSON(toJSON(github))` escape hatch (typed
          # `any`) — same pattern as the vendored-ruleset checkout below.
          ref: ${{ fromJSON(toJSON(github)).job_workflow_sha }}
          sparse-checkout: |
            scripts/semgrep-requirements.txt
          sparse-checkout-cone-mode: false
          path: _mandrel-platform-semgrep
          persist-credentials: false

      # Check out THIS reusable workflow's own repo (mandrel-platform) at the
      # exact SHA the caller's `uses: …/pr-quality.yml@<ref>` pin resolved to
      # (`github.job_workflow_sha` — the same resolved-ref single-source-of-
      # truth primitive `deploy-summary` echoes in deploy-cloudflare.yml,
      # Story #110), into a side directory `_mandrel-platform-sast/`. The
      # caller's own checkout (above) never contains `.semgrep/rules.json` —
      # that file lives in THIS repo, not the consumer's — so the vendored
      # ruleset has to come from a second, explicit checkout rather than the
      # primary one. Resolving via `job_workflow_sha` (not a hand-maintained
      # ref literal) means a consumer always gets the ruleset snapshot that
      # shipped with the exact pr-quality.yml version it pinned — no drift
      # between "which workflow ran" and "which ruleset it scanned with".
      - name: Checkout vendored SAST ruleset (mandrel-platform@resolved-sha)
        if: ${{ inputs.enable-sast && inputs.semgrep-config == 'vendored' }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: dsj1984/mandrel-platform
          # `job_workflow_sha` is the resolved 40-hex commit of THIS reusable
          # workflow (the value the caller's `@<ref>` pin resolved to). It is
          # a valid runtime github-context field, but actionlint's pinned
          # context type model does not list it, so it is read through the
          # `fromJSON(toJSON(github))` escape hatch (typed `any`) to keep the
          # workflow lint-clean — same pattern as deploy-summary in
          # deploy-cloudflare.yml (Story #110).
          ref: ${{ fromJSON(toJSON(github)).job_workflow_sha }}
          sparse-checkout: |
            .semgrep
          sparse-checkout-cone-mode: false
          path: _mandrel-platform-sast
          persist-credentials: false

      # Resolve the Semgrep SAST baseline, mirroring the gitleaks range
      # scoping above. On pull_request events the baseline is the MERGE BASE of
      # base..head (M8: `github.event.pull_request.base.sha` is the base
      # branch TIP, which drifts past the fork point once main advances — the
      # same base-tip-vs-merge-base drift the migration guard had; the audit
      # flags this as the milder same-family SAST case). Using the merge base
      # makes `--baseline-commit` report only findings INTRODUCED by the PR,
      # never findings from commits merged into base by others. On push events
      # the baseline is `event.before` (the commits the push added), so a
      # push-to-main CI run — load-bearing since the canonical `workflow_run`
      # deploy trigger, Story #175 — reports only push-introduced findings
      # instead of full-tree-blocking on pre-existing debt. Only when no
      # baseline is resolvable (no PR context, no valid non-zero `event.before`
      # ancestor) does it fall back to a full-tree scan. `fetch-depth: 0` on
      # the checkout above makes the merge base / base commit resolvable.
      - name: Resolve SAST baseline
        id: sast-baseline
        if: ${{ inputs.enable-sast }}
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [ -n "${BASE_SHA:-}" ] && [ -n "${HEAD_SHA:-}" ]; then
            # M8: baseline on the merge base of base..head, not the base tip.
            merge_base="$(git merge-base "${BASE_SHA}" "${HEAD_SHA}")"
            echo "baseline=${merge_base}" >> "$GITHUB_OUTPUT"
            echo "PR-diff SAST baseline (merge-base of ${BASE_SHA}..${HEAD_SHA}): ${merge_base}"
          elif [ "${EVENT_NAME:-}" = "push" ] && [ -n "${BEFORE_SHA:-}" ] && \
               [ "${BEFORE_SHA}" != "${ZERO_SHA}" ] && \
               git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            echo "baseline=${BEFORE_SHA}" >> "$GITHUB_OUTPUT"
            echo "push-diff SAST baseline: ${BEFORE_SHA}"
          else
            echo "baseline=" >> "$GITHUB_OUTPUT"
            echo "Full-tree SAST (no ranged base)."
          fi

      # SAST via Semgrep, installed from PyPI at a pinned version against the
      # runner's SYSTEM python3. We deliberately do NOT use
      # `actions/setup-python`: on a vanilla self-hosted runner with no
      # RUNNER_TOOL_CACHE configured, setup-python falls back to the
      # GitHub-hosted tool-cache path (`/Users/runner/hostedtoolcache` on
      # macOS) and dies `mkdir: /Users/runner: Permission denied` — before
      # Semgrep ever runs (Story #85: domio #1550 / athportal #2021). Both
      # ubuntu-latest and macOS/Linux self-hosted runners ship a usable
      # `python3`, so installing against it keeps the gate runner-agnostic
      # with no per-runner tool-cache config. `--error` makes findings fail the
      # job WITHOUT relying on a SARIF / Code Scanning upload, so the gate
      # blocks on a private repo with no GHAS. (The GHAS CodeQL path documented
      # on the job header is the alternative.)
      - name: SAST (Semgrep, blocking, no SARIF upload)
        if: ${{ inputs.enable-sast }}
        shell: bash
        env:
          SEMGREP_CONFIG: ${{ inputs.semgrep-config }}
          # PR merge base on pull_request events, empty otherwise. When set,
          # `--baseline-commit` scopes findings to those introduced by the PR.
          BASELINE: ${{ steps.sast-baseline.outputs.baseline }}
          # Extra exclude globs appended to the built-in `.agents` exclude.
          # Space- or comma-separated; empty by default.
          SAST_EXCLUDE: ${{ inputs.sast-exclude }}
        run: |
          set -euo pipefail

          # M7: hash-pinned lockfile, side-checked-out at the resolved
          # job_workflow_sha above. On a Linux runner (the default ubuntu-latest
          # and every linux self-hosted runner) Semgrep + its FULL transitive
          # closure install via `pip install --require-hashes -r`, so a
          # hijacked transitive can no longer alter or disable this fleet-wide
          # gate. The lockfile pins linux x86_64 / cp312 wheels (see its
          # header); a self-hosted DARWIN runner cannot satisfy those hashes, so
          # it falls back to the top-pinned install below (the linux-only
          # lockfile is deliberate per this change's scope — mac hashes are not
          # generated).
          LOCKFILE="${GITHUB_WORKSPACE}/_mandrel-platform-semgrep/scripts/semgrep-requirements.txt"

          # Resolve the 'vendored' sentinel (Story #132) to the path of the
          # side-checked-out platform ruleset from the step above; any other
          # value (a registry ref like 'p/security-audit' or a caller-owned
          # path) passes through unchanged — that is the deliberate
          # per-caller opt-out of the platform-controlled default.
          if [ "${SEMGREP_CONFIG}" = "vendored" ]; then
            SEMGREP_CONFIG="${GITHUB_WORKSPACE}/_mandrel-platform-sast/.semgrep/rules.json"
            if [ ! -f "${SEMGREP_CONFIG}" ]; then
              echo "::error::Vendored ruleset not found at ${SEMGREP_CONFIG} — the 'Checkout vendored SAST ruleset' step must run before this one when semgrep-config is 'vendored'."
              exit 1
            fi
          fi

          # Pinned Semgrep. `semgrep scan --error` exits non-zero on any
          # finding; `--config` selects the ruleset (default: this reusable
          # workflow's own vendored `.semgrep/rules.json`, a deterministic
          # snapshot — NOT the live registry alias 'p/default'). Bump the
          # ruleset deliberately via `scripts/update-semgrep-rules.mjs` (see
          # docs/reusable-workflows.md).
          #
          # `setuptools` provides `pkg_resources`, which semgrep's transitive
          # opentelemetry dependency imports but does not declare — absent by
          # default on Python ≥3.12. It is IN the hash-pinned lockfile (Linux
          # path) and installed alongside the top-pin (darwin fallback), so the
          # run works on a 3.12+ interpreter either way.
          #
          # Install strategy — an EPHEMERAL `python3 -m venv` on every path
          # (Story #92). We deliberately do NOT use `pip install --user`:
          # `--user` installs into the runner's SHARED, MUTABLE user
          # site-packages (`~/Library/Python/X.Y/lib/python/site-packages` on
          # macOS). On a self-hosted host whose user-site already holds a
          # compiled native extension built for a DIFFERENT arch (e.g. a prior
          # native-arm64 Python left an arm64 `rpds.cpython-39-darwin.so`), a
          # later x86_64/Rosetta run REUSES that stale `.so` instead of
          # rebuilding it, and Semgrep dies at IMPORT before it scans:
          #   `mach-o file, but is an incompatible architecture
          #    (have 'arm64', need 'x86_64')`.
          # A venv disables user-site by default (PEP 370) and rebuilds native
          # deps for the venv interpreter's own arch, so the install is
          # hermetic and arch-correct on a vanilla, possibly-dirty self-hosted
          # runner — no per-runner `rpds` purge needed (athportal #2021 / PR
          # #2023). The venv lives under a `mktemp -d` dir, so it is per-run and
          # never reads/writes the shared user site. `pipx` is no longer used:
          # it cannot consume a `--require-hashes` requirements file, and the
          # M7 hash-pinning is the reason the whole tree now flows through pip.
          SEMGREP_PIN='semgrep==1.97.0'

          # Build the `--exclude` argument list. The vendored framework tree
          # `.agents/` is ALWAYS excluded: it is materialized from the pinned
          # `mandrel` package and a consumer cannot edit it, so gating on its
          # findings is a false block (Story #93). Semgrep's `--exclude` takes a
          # pattern matched against path components, so `--exclude '.agents'`
          # drops the whole `.agents/**` subtree from the target set (mirroring
          # how it ignores `node_modules` by default). `_mandrel-platform-sast`
          # is the side-checkout directory the 'vendored' ruleset resolution
          # step (above) materializes to carry `.semgrep/rules.json` — it is
          # mandrel-platform's OWN source tree, not the caller's, and must
          # never enter this caller's finding set regardless of which
          # `semgrep-config` value is in effect (the directory only exists
          # when `semgrep-config == 'vendored'`, but excluding it
          # unconditionally is harmless and keeps this list static). Any
          # extra globs from the `sast-exclude` input are APPENDED, each as
          # its own `--exclude` arg.
          EXCLUDE_ARGS=(--exclude '.agents' --exclude '_mandrel-platform-sast')
          if [ -n "${SAST_EXCLUDE:-}" ]; then
            # Split on whitespace AND commas so 'dist,coverage tests/fixtures'
            # all work. Empty tokens (e.g. from a trailing comma) are skipped.
            old_ifs="$IFS"
            IFS=', '
            for glob in ${SAST_EXCLUDE}; do
              [ -n "$glob" ] && EXCLUDE_ARGS+=(--exclude "$glob")
            done
            IFS="$old_ifs"
          fi

          run_semgrep() {
            echo "Running $(semgrep --version 2>/dev/null) (config: ${SEMGREP_CONFIG})"
            if [ -n "${BASELINE:-}" ]; then
              echo "PR-diff SAST: baselining against ${BASELINE} (only new findings block)."
            else
              echo "Full-tree SAST (no baseline)."
            fi
            echo "SAST excludes: ${EXCLUDE_ARGS[*]}"
            # `${BASELINE:+--baseline-commit "$BASELINE"}` expands to the flag
            # pair only when BASELINE is non-empty; on push/schedule it vanishes
            # and Semgrep scans the full tree. `"${EXCLUDE_ARGS[@]}"` always
            # carries at least `--exclude '.agents'` (Story #93), plus any globs
            # from the `sast-exclude` input, on BOTH the baseline and full-tree
            # paths since both flow through this one invocation.
            semgrep scan \
              --config "${SEMGREP_CONFIG}" \
              "${EXCLUDE_ARGS[@]}" \
              ${BASELINE:+--baseline-commit "$BASELINE"} \
              --error \
              --disable-version-check \
              --metrics=off \
              --quiet
          }

          # Ephemeral, per-run venv under a fresh mktemp dir. venvs disable
          # user-site by default (PEP 370), so a stale / foreign-arch native
          # extension in the runner's shared user site-packages (the Story #92
          # rpds arm64-vs-x86_64 failure) is NOT read — pip rebuilds native
          # deps for THIS interpreter's arch into the isolated venv. No
          # reliance on the shared `--user` site.
          venv_dir="$(mktemp -d)/semgrep-venv"
          python3 -m venv "${venv_dir}"
          # The lockfile pins cp312-only native wheels, so the hash-pinned path
          # is valid ONLY on a Linux interpreter whose ABI tag is cp312. Gating
          # on `uname` alone is a fleet-wide time bomb: when `ubuntu-latest`
          # rolls its default python3 to 3.13, cp312 wheels become
          # ABI-incompatible, `--only-binary :all:` forbids an sdist fallback,
          # and `--require-hashes` hard-fails ci-required across every consumer
          # at once. Probe the actual interpreter version and fall back to the
          # top-pin install (the same path the darwin branch uses) on any
          # non-312 interpreter, so a Python roll-forward degrades to
          # unpinned-but-green rather than fleet-red. Re-pin the lockfile to the
          # new cpXY when the CI image moves (M7 lockfile-refresh follow-up).
          pyver="$("${venv_dir}/bin/python" -c 'import sys; print(f"{sys.version_info.major}{sys.version_info.minor}")')"
          # `--retries 3` (L8): a PyPI/registry blip must not fail the whole
          # fleet's ci-required and force a manual re-run. `--require-hashes`
          # fails closed on any hash mismatch, so retries only widen the
          # availability window, never the trust boundary.
          if [ "$(uname -s)" = "Linux" ] && [ "${pyver}" = "312" ] && [ -f "${LOCKFILE}" ]; then
            echo "Installing hash-pinned Semgrep from ${LOCKFILE} (Linux cp${pyver}, --require-hashes)."
            # `--require-hashes -r` installs semgrep + its ENTIRE transitive
            # closure (setuptools included) only if every artifact matches a
            # pinned sha256 in the lockfile — no floating transitive can slip
            # in. `--only-binary :all:` keeps pip on the pinned wheels rather
            # than building an sdist whose artifact hash would differ.
            "${venv_dir}/bin/python" -m pip install --quiet --disable-pip-version-check \
              --retries 3 --require-hashes --only-binary :all: -r "${LOCKFILE}"
          else
            # Fallback for non-Linux (self-hosted darwin) runners: the linux
            # lockfile's wheels cannot satisfy this platform, so install the
            # top-pin directly with setuptools. This path is NOT hash-pinned by
            # design — the M7 lockfile is scoped to the linux CI target; mac
            # hashes are deliberately not generated.
            echo "Non-Linux runner (or no lockfile): installing ${SEMGREP_PIN} (+ setuptools) without hash-pinning."
            "${venv_dir}/bin/python" -m pip install --quiet --disable-pip-version-check \
              --retries 3 setuptools "${SEMGREP_PIN}"
          fi
          # Put the venv's bin dir first so the `semgrep` resolved by
          # `run_semgrep` is the hermetic one, not any shared/user-site copy.
          PATH="${venv_dir}/bin:${PATH}"
          export PATH
          run_semgrep
          echo "✅ Semgrep found no blocking findings."

      # Opt-in fail-fast (Story #223) — aliased cancel step; see the lint
      # tier's anchor (`&cancel-on-failure`) for the full rationale (must be
      # the LAST step; loud-but-non-fatal; ci-required counts cancelled as
      # non-success).
      - *cancel-on-failure

  # ── Tier 7: OSV-scanner advisory scan ─────────────────────────────────────
  #
  # Dependency-advisory tier (Story #114). Renovate bumps versions but never
  # alerts on advisories for versions sitting un-bumped (inside
  # `minimumReleaseAge` or major-gated), so there is a window with no live CVE
  # signal. This tier closes it: a PINNED, checksum-verified OSV-scanner binary
  # scans the lockfile/manifest tree (`scan source -r .`) against the OSV
  # database and reports known advisories. Like the secret/SAST tiers it runs
  # the binary directly and asserts on findings via the run log / job summary —
  # NO SARIF / Code Scanning upload — so the gate is load-bearing on a PRIVATE
  # repo with NO GitHub Advanced Security (the same constraint that made
  # gitleaks/Semgrep the chosen gates over CodeQL). Default ON
  # (`enable-osv-scan`), so every consumer inherits the advisory signal on pin
  # bump. When enabled it is a `needs:` of `ci-required` (below), so it is
  # branch-protection-load-bearing through the single aggregator context.
  #
  # Severity-to-gate (documented in docs/reusable-workflows.md):
  #   • OSV-scanner's own exit code is non-zero on ANY advisory regardless of
  #     severity. We do NOT rely on it for the gate decision; instead we emit
  #     JSON, bucket each advisory's CVSS base score (the group's
  #     `max_severity`) into critical (≥9.0) / high (≥7.0) / medium (≥4.0) /
  #     low (>0) / none (unscored), and FAIL the job only when a finding lands
  #     at or above `osv-fail-on-severity` (default 'high'). Findings below the
  #     band are reported as a WARNING in the job summary without blocking.
  #   • A human-readable table is always written to $GITHUB_STEP_SUMMARY and
  #     the run log, so findings surface with no GHAS dependency.
  #
  # Cross-platform: the asset selector resolves the right binary for self-hosted
  # darwin/linux runners AND ubuntu-latest, each verified against a pinned
  # SHA-256 before execution (mirroring the gitleaks secret-scan tier).
  osv-scan:
    name: OSV advisory scan
    if: ${{ inputs.enable-osv-scan }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    concurrency:
      group: pr-quality-osv-scan-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      # Job-level permissions REPLACE the workflow-level block, so the
      # fail-fast cancel grant (Story #223) must be re-declared here.
      actions: write
    steps:
      - *harden-runner

      - *checkout

      # OSV-scanner advisory tier via the shared first-party osv-scan
      # composite action (Story #310), which owns the pinned OSV-scanner
      # version + per-platform SHA-256 checksum map, the download/verify/scan,
      # and the severity-band gate (extracted from the ~360-line inline block
      # this step replaced). Pinning the BINARY inside the composite keeps the
      # gate SHA-action-ratchet-exempt and GHAS-free — findings surface via
      # the run log / job summary, load-bearing on a private repo with no
      # GitHub Advanced Security. Behaviour is unchanged: same inputs, same
      # blocking semantics, same job summary. The scheduled advisory-scan.yml
      # workflow calls the SAME composite in non-blocking mode.
      #
      # Portability contract (scripts/check-workflow-portability.mjs): a
      # reusable workflow references a first-party composite by absolute
      # owner/repo/path@<sha> form only — never a relative ./ path.
      - name: OSV advisory scan (pinned binary)
        uses: dsj1984/mandrel-platform/.github/actions/osv-scan@f2d4f68015496bde6f60a53b8cae00d73087f7a3
        with:
          osv-scanner-version: ${{ inputs.osv-scanner-version }}
          fail-on-severity: ${{ inputs.osv-fail-on-severity }}
          allowlist-path: ${{ inputs.osv-allowlist-path }}

      # Opt-in fail-fast (Story #223) — aliased cancel step; see the lint
      # tier's anchor (`&cancel-on-failure`) for the full rationale (must be
      # the LAST step; loud-but-non-fatal; ci-required counts cancelled as
      # non-success).
      - *cancel-on-failure

  # ── Aggregator: single required branch-protection context ─────────────────
  #
  # `ci-required` is the ONLY context consumers should register in their
  # branch-protection ruleset. It passes when every enabled tier succeeds (or
  # is skipped via its enable toggle). This pattern eliminates required-check-
  # name drift — the job name is defined exactly once here.
  ci-required:
    name: ci-required
    # Honor the `runner` input like every tier job above (it is a trivial bash
    # results-aggregator, safe on any runner). Hardcoding ubuntu-latest here
    # left a single GitHub-hosted job in an otherwise fully self-hosted run, so
    # a self-hosted consumer whose GitHub-hosted minutes are unavailable (e.g. a
    # billing/spending-limit block) could get every tier green yet still fail
    # the required aggregate. Defaults to ubuntu-latest via the input default.
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    if: always()
    needs:
      - lint
      - typecheck
      - unit
      - contract
      - e2e
      - migration-guard
      - security
      - osv-scan
    steps:
      # Self-maintaining aggregator: results are derived from `toJSON(needs)`,
      # so the `needs:` array above is the single source of truth — adding a
      # job to `needs:` is the ONLY edit required to include it in the gate.
      # Pass on `success`/`skipped`; fail on anything else, INCLUDING
      # `cancelled` (load-bearing for the fail-fast design: a tier cancelled
      # by a sibling's failure must not read as green). Requires `jq` on the
      # runner (preinstalled on GitHub-hosted images). Guarded by
      # scripts/check-ci-required-aggregator.test.mjs — do not reintroduce a
      # hardcoded per-job env/loop list here.
      - name: Check all required job results
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failed="$(jq -r '
            to_entries
            | map(select(.value.result != "success" and .value.result != "skipped"))
            | map("\(.key)(\(.value.result))")
            | join(" ")
          ' <<<"${NEEDS_JSON}")"

          if [ -n "${failed}" ]; then
            echo "❌ Failed jobs: ${failed}" >&2
            exit 1
          fi

          # A required aggregate must never be satisfied VACUOUSLY: if EVERY
          # tier skipped (all enable toggles off), nothing actually ran, so a
          # green here would be a load-bearing pass from nothing. Fail instead,
          # forcing an all-toggles-off caller to register something real.
          # Derived from toJSON(needs) — no hardcoded tier-name list.
          all_skipped="$(jq -r '
            [ to_entries[] | .value.result ] as $r
            | ($r | length) as $n
            | if $n > 0 and ([ $r[] | select(. == "skipped") ] | length) == $n
              then "yes" else "no" end
          ' <<<"${NEEDS_JSON}")"

          if [ "${all_skipped}" = "yes" ]; then
            echo "❌ Every required tier was skipped — the aggregate cannot pass vacuously. Enable at least one tier." >&2
            exit 1
          fi

          echo "✅ All required jobs passed (success or skipped)."
