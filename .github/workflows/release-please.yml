name: Release Please

# Action pinning: every `uses:` ref — first-party `actions/*` included — is
# pinned to a full 40-char commit SHA with a `# vX.Y.Z` comment, matching the
# repo-wide pin ratchet enforced by ci.yml's check-action-pins job.
#
# Token preference: RELEASE_PLEASE_TOKEN (PAT or GitHub App installation
# token) over the default GITHUB_TOKEN. The default token does NOT trigger
# downstream workflows on PRs it opens (GitHub's anti-recursion safeguard),
# so release PRs never run the required CI check and cannot auto-merge. A
# user-scoped PAT acts like a real user, so CI fires normally.
# Required PAT scopes: contents:write, pull-requests:write, workflows:write.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish:
        description: >-
          Recovery lever: publish the current package.json version to npm even
          when release-please reports no new release (root_release_created is
          false because the release was already tagged). Use when a release was
          cut but its npm-publish was interrupted — e.g. the await-smoke gate
          was cancelled/timed out. The operator asserts the cross-repo smoke
          already passed for the release commit; this path bypasses the
          (already-satisfied) smoke gate.
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

# Serialize the release train (same posture as platform-sync-repair.yml):
# two quick pushes to main running release-please concurrently is a known
# source of duplicate/conflicting release PRs and 422s. cancel-in-progress
# stays false — an in-flight release run must finish, not be cancelled;
# the follow-up run queues behind it.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Run release-please
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Root package at `.` emits un-prefixed outputs (`release_created`,
    # `tag_name`). There is no `.--release_created` output for the root path.
    outputs:
      root_release_created: ${{ steps.release.outputs.release_created }}
      root_tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Pre-release gate (Story #38): block the publish until the external
  # cross-repo smoke (dsj1984/mandrel-platform-smoke, fired by
  # smoke-dispatch.yml on this same push) posts a green `smoke/cross-repo`
  # commit status on the release commit. A red or absent smoke fails this job
  # and stops npm-publish. Timeout failure is recoverable by re-running the
  # workflow once the smoke is green — it never permanently wedges the train.
  await-smoke:
    name: Await cross-repo smoke
    needs: release-please
    if: ${{ needs.release-please.outputs.root_release_created == 'true' }}
    runs-on: ubuntu-latest
    # Job timeout is a hard backstop set ABOVE the poll loop's own budget
    # (MAX_ATTEMPTS * INTERVAL ≈ 15 min below), so the loop's clean
    # `::error::Timed out … Re-run` message wins over GitHub's generic
    # "operation was canceled" whenever the smoke never resolves — e.g. its
    # deploy jobs are stuck `pending` behind deploy-cloudflare's
    # cancel-in-progress:false concurrency groups, so the smoke `gate` (which
    # `needs:` those jobs) never runs and never posts a status. The previous
    # 60*25s loop matched the 25-min job timeout exactly, so the hard job
    # cancel raced — and won — the loop's own recoverable message.
    timeout-minutes: 18
    permissions:
      contents: read
      statuses: read
    steps:
      - name: Poll smoke/cross-repo status on the release commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          # 44 sleeps * 20s ≈ 14.7 min of polling, comfortably under the
          # 18-min job timeout so the loop self-terminates with a clean,
          # recoverable error rather than being hard-cancelled mid-sleep.
          MAX_ATTEMPTS: '45'
          INTERVAL: '20'
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for smoke/cross-repo status on ${SHA} (up to ${MAX_ATTEMPTS} attempts, ${INTERVAL}s apart) …"
          for i in $(seq 1 "${MAX_ATTEMPTS}"); do
            # Read the COMBINED-status endpoint (`…/commits/${SHA}/status`), not
            # the per-status list (`…/statuses`). The combined endpoint returns
            # the latest state per context across the whole commit — so a release
            # commit carrying more than one page (30) of statuses can still
            # surface smoke/cross-repo, which page-1-only paging (L9) could bury.
            # `--paginate --slurp` walks every `statuses[]` page AND merges them
            # into a single JSON array, then an EXTERNAL `jq` flattens and
            # selects. `--slurp` is load-bearing (audit finding): with
            # `--paginate` alone `gh` applies `--jq` PER PAGE and emits one line
            # per page, so a commit with >30 statuses (exactly the case this
            # endpoint switch targets) yields a multi-line `state` that never
            # matches the case arms below — silently re-burying smoke/cross-repo
            # on page ≥2.
            #
            # CRITICAL: `--slurp` is NOT compatible with `gh`'s own `--jq`
            # ("the --slurp option is not supported with --jq or --template").
            # A prior revision combined them and every attempt failed instantly,
            # so `|| echo none` made state="none" forever and EVERY release
            # timed out. Pipe `--slurp`'s raw JSON to a standalone `jq -r`
            # instead — the only supported way to slurp AND transform.
            #
            # `|| echo none` (M10): under `set -euo pipefail` a transient `gh api`
            # (or jq) non-zero (5xx, secondary rate limit) would otherwise abort
            # the whole poll on a single blip the 15-min budget exists to ride
            # out. Swallow it to "none" so the blip reads as one "no status yet"
            # attempt, bounded by MAX_ATTEMPTS, instead of killing the job.
            state="$(gh api --paginate --slurp "repos/${REPO}/commits/${SHA}/status" 2>/dev/null \
              | jq -r '[.[].statuses[]] | map(select(.context=="smoke/cross-repo")) | (first.state // "none")' \
              || echo none)"
            # A blank result (e.g. an empty combined-status body) also means
            # "no status yet"; normalize so the case-match below is well-defined.
            state="${state:-none}"
            echo "  attempt ${i}/${MAX_ATTEMPTS}: smoke/cross-repo=${state}"
            case "${state}" in
              success) echo "✅ cross-repo smoke green — release may publish."; exit 0 ;;
              failure|error) echo "::error::cross-repo smoke ${state} for ${SHA} — blocking release."; exit 1 ;;
            esac
            # Don't sleep after the final attempt — fail immediately once the
            # budget is spent, instead of burning one last idle interval.
            [ "${i}" -lt "${MAX_ATTEMPTS}" ] && sleep "${INTERVAL}"
          done
          echo "::error::Timed out waiting for cross-repo smoke on ${SHA} after ~$(( MAX_ATTEMPTS * INTERVAL / 60 )) min. The smoke never posted a terminal status (likely a wedged or queued smoke run — check dsj1984/mandrel-platform-smoke). Recover by re-running this workflow once the smoke is green, or dispatch release-please with force_publish=true if the smoke has already passed for ${SHA}."
          exit 1

  npm-publish:
    name: Publish to npm
    needs: [release-please, await-smoke]
    # Normal path: publish when release-please cut a release AND the await-smoke
    # gate passed. Recovery path: a manual workflow_dispatch with
    # force_publish=true republishes an already-tagged release whose publish was
    # interrupted, bypassing the (already-satisfied) smoke gate. `!cancelled()`
    # lets it run on the recovery path even though await-smoke is skipped there.
    #
    # M12: the force branch additionally requires `await-smoke.result != 'failure'`
    # so a recovery dispatch cannot short-circuit past a smoke that FAILED in the
    # SAME run. Without it, a release PR that merged just before the recovery
    # dispatch would run await-smoke, and a red smoke would still publish because
    # the force branch was evaluated first. `!= 'failure'` (not `== 'success'`)
    # keeps the genuine recovery case working: when force_publish targets an
    # already-tagged release with no new release cut, await-smoke is `skipped`
    # (its `if:` gates on root_release_created), and `skipped != 'failure'` holds.
    if: >-
      ${{ !cancelled()
          && ( (github.event_name == 'workflow_dispatch' && inputs.force_publish
                && needs.await-smoke.result != 'failure')
               || (needs.release-please.outputs.root_release_created == 'true'
                   && needs.await-smoke.result == 'success') ) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # `id-token: write` is load-bearing: it mints the short-lived OIDC token
    # the npm CLI exchanges for a publish credential under npm trusted
    # publishing (no long-lived NPM_TOKEN). The same OIDC context drives the
    # provenance attestation npm generates for the release.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Force-publish guard (H4). The force_publish recovery lever previously
      # trusted the operator assertion completely: a dispatch with
      # force_publish=true from a non-main branch, or from a main HEAD that has
      # advanced past the tagged release commit, would `npm publish` an
      # untagged/unreleased tree under the current package.json version — with a
      # valid OIDC provenance attestation. This step runs ONLY on the force
      # path; the normal release-created path already publishes a freshly-tagged
      # release commit and is not re-gated here.
      #
      # It enforces:
      #   1. the ref is refs/heads/main, and
      #   2. the release tag for the current package.json version EXISTS.
      # It then RESOLVES that tag's commit and hands it to the re-checkout step
      # below, so force_publish publishes the exact TAGGED release tree rather
      # than whatever HEAD currently is. That is strictly safer than the old
      # "tag must equal HEAD" assertion AND actually recoverable: a recovery
      # publish after main has advanced (the normal case — you fix something,
      # merge, then recover the stuck release) no longer fails on a HEAD/tag
      # mismatch, because the tag's tree is what gets published.
      #
      # Tag NAME is component-prefixed (`<pkg name>-v<version>`, per
      # release-please-config.json `include-component-in-tag: true`), derived
      # from package.json `name` so it tracks a rename — NOT the bare `v<version>`
      # a prior revision hardcoded (which 404'd against the real
      # `mandrel-platform-v<version>` tag and broke every force_publish).
      # Tag resolution goes through the GitHub API, NOT `git rev-parse`: the
      # checkout above is shallow (fetch-depth 1) and tagless. Annotated tags are
      # dereferenced to the underlying commit.
      - name: Guard force_publish (ref + tag)
        id: guard
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.force_publish }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
        shell: bash
        run: |
          set -euo pipefail
          fail() { echo "::error::force_publish guard: $1"; exit 1; }

          # Assertion 1 — ref must be refs/heads/main.
          if [ "${REF}" != "refs/heads/main" ]; then
            fail "github.ref is '${REF}', expected 'refs/heads/main' — force_publish may only run on main."
          fi

          # Resolve the version to publish and its component-prefixed release tag.
          VERSION="$(node -p "require('./package.json').version")"
          PKG_NAME="$(node -p "require('./package.json').name")"
          TAG="${PKG_NAME}-v${VERSION}"
          echo "Guarding force_publish for ${TAG} (package.json version ${VERSION})"

          # Assertion 2 — the release tag must exist. Resolve via the GitHub API
          # (the checkout is shallow+tagless). A 404 means no such tag.
          REF_JSON="$(gh api "repos/${REPO}/git/ref/tags/${TAG}" 2>/dev/null || echo '')"
          if [ -z "${REF_JSON}" ]; then
            fail "tag '${TAG}' does not exist in ${REPO} — refusing to publish an untagged/unreleased tree."
          fi

          OBJ_TYPE="$(printf '%s' "${REF_JSON}" | jq -r '.object.type')"
          OBJ_SHA="$(printf '%s' "${REF_JSON}" | jq -r '.object.sha')"

          # Annotated tags point at a tag object; dereference to its commit.
          if [ "${OBJ_TYPE}" = "tag" ]; then
            TAG_SHA="$(gh api "repos/${REPO}/git/tags/${OBJ_SHA}" --jq '.object.sha')"
          else
            TAG_SHA="${OBJ_SHA}"
          fi

          echo "tag_sha=${TAG_SHA}" >> "$GITHUB_OUTPUT"
          echo "✅ force_publish guard passed: ref=${REF}, ${TAG} → ${TAG_SHA} (will publish that tree)."

      # Re-checkout the TAGGED release tree on the force path, so npm publish
      # ships exactly the tagged release — never the current HEAD. On the normal
      # (release-created) path this step is skipped and the initial HEAD checkout
      # (the freshly-tagged release commit) is what publishes.
      - name: Checkout tagged release tree (force_publish recovery)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.force_publish }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ steps.guard.outputs.tag_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          # Deliberately NO `registry-url:`. setup-node's registry-url writes an
          # `.npmrc` with `_authToken=${NODE_AUTH_TOKEN}` and sets NODE_AUTH_TOKEN
          # to a placeholder (XXXXX-XXXXX-XXXXX-XXXXX); npm then uses that garbage
          # token and NEVER performs the OIDC trusted-publishing exchange → 404.
          # Omitting it leaves no token in scope, so npm 11.5.1+ falls through to
          # OIDC. Default registry is registry.npmjs.org.

      # Trusted publishing exchanges the workflow's OIDC token for a
      # short-lived npm credential — no NODE_AUTH_TOKEN / NPM_TOKEN is set.
      # The npm CLI (>= 11.5.1, bundled with the .nvmrc Node) detects the
      # OIDC environment automatically and emits a provenance attestation
      # (also pinned by `publishConfig.provenance: true` in package.json).
      # The trusted publisher for this workflow is configured on the
      # mandrel-platform npm package settings page; see the release-please.yml
      # section of docs/reusable-workflows.md.
      - name: Publish
        run: npm publish --provenance --access public
