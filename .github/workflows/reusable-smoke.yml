# Cross-repo reusable-workflow smoke test (Story #38).
#
# GitHub validates a reusable workflow's / composite action's interface ONLY
# when it is called from another repo — never when this repo's own CI runs on
# it. That blind spot shipped the #24 → #30 → #32 → #35/#36 chain: five fixes
# that each passed in-repo CI green and broke only when a real consumer
# (domio / athportal) called pr-quality.yml.
#
# The static lint (scripts/check-workflow-portability.mjs) catches the KNOWN
# footgun classes. This workflow is the DYNAMIC catch-all: it calls
# pr-quality.yml the way a consumer does — by ABSOLUTE owner/repo path @ a ref,
# NOT by ./ — which forces GitHub's cross-repo validation + action-manifest
# loading. If pr-quality.yml or any action it pins is broken cross-repo, the
# smoke fails on `main` BEFORE the release PR is merged/tagged.
#
# Why @main (a mutable ref) and not a SHA: the smoke must track the version
# about to be released. The §6.2 SHA-pinning rule governs third-party actions,
# not this first-party self-smoke. On push to main, @main resolves to the
# just-merged commit — i.e. the exact tree a release would tag.
name: Reusable Workflow Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly — catch drift from external action updates (pnpm/action-setup,
    # actions/setup-node) or changes in GitHub's reusable-workflow validator,
    # even when mandrel-platform itself hasn't changed.
    - cron: '0 12 * * 1'

permissions:
  contents: read

concurrency:
  group: reusable-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Call pr-quality.yml exactly as a cross-repo consumer would. Only the
  # typecheck tier is enabled — the cheapest tier whose script is a no-op in
  # this config-and-scripts repo — so a healthy call runs fully green. The
  # smoke's signal is "did the cross-repo call materialize jobs and load every
  # action past 'Set up job'", which a passing tier necessarily demonstrates.
  smoke-call:
    name: smoke-call
    uses: dsj1984/mandrel-platform/.github/workflows/pr-quality.yml@main
    with:
      enable-lint: false
      enable-typecheck: true
      enable-unit: false
      enable-contract: false
      enable-e2e: false

  # Single stable aggregator check (mirrors the ci-required pattern). On a
  # healthy call this passes trivially; on failure it inspects the run's jobs
  # to name the failure mode (#30/#32 vs #35/#36 vs a real tier failure).
  smoke-gate:
    name: smoke-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [smoke-call]
    if: always()
    permissions:
      contents: read
      actions: read
    steps:
      - name: Assert cross-repo call materialized and loaded past "Set up job"
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          CALL_RESULT: ${{ needs.smoke-call.result }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${CALL_RESULT}" = "success" ]; then
            echo "✅ pr-quality.yml@main was called cross-repo and every tier job passed 'Set up job'."
            exit 0
          fi

          echo "smoke-call result: ${CALL_RESULT} — diagnosing failure mode…" >&2
          jobs_json="$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs" --paginate)"

          # The reusable workflow's tier jobs are reported as "smoke-call / <job>".
          # Use a portable while-read loop (no mapfile) so names with spaces are
          # read whole and the gate runs on any bash.
          tiers="$(echo "$jobs_json" | jq -r '.jobs[] | select(.name | startswith("smoke-call /")) | .name')"

          if [ -z "${tiers}" ]; then
            echo "::error::pr-quality.yml@main produced 0 tier jobs — the reusable workflow failed cross-repo validation (the #30/#32 'workflow file issue / 0 jobs' failure mode). Run scripts/check-workflow-portability.mjs and check for relative uses: paths or \${{ }} in workflow_call input descriptions/defaults."
            exit 1
          fi

          fail=0
          while IFS= read -r name; do
            [ -z "${name}" ] && continue
            setup="$(echo "$jobs_json" | jq -r --arg n "$name" '.jobs[] | select(.name==$n) | (.steps[] | select(.name=="Set up job") | .conclusion) // "missing"')"
            echo "  ${name}: Set up job → ${setup}" >&2
            if [ "${setup}" != "success" ]; then
              echo "::error::'${name}' failed at 'Set up job' (${setup}) — cross-repo action-manifest load failed (the #35/#36 failure mode: an internal action pin points to a manifest with a \${{ }} footgun). Run scripts/check-workflow-portability.mjs (Rule 3)."
              fail=1
            fi
          done <<< "${tiers}"

          if [ "${fail}" -eq 0 ]; then
            echo "::error::Tier jobs materialized and passed 'Set up job', but smoke-call still failed — this looks like a real tier-command failure, not a cross-repo portability defect. Inspect the tier logs."
          fi
          exit 1
