# Reusable full-history secret-scan workflow — post-merge SIGNAL channel.
#
# The shared pr-quality.yml security tier blocks on the PR DIFF
# (merge-base..head). Secrets already in history, or landed via a path that
# bypasses a PR (force-push, fork-merge), are never seen by the diff scan. This
# reusable workflow scans the FULL history (fetch-depth: 0) on every push to the
# caller's default branch, so historical leaks surface even though they cannot
# retro-block the merge that delivered them.
#
# SIGNAL, NOT A GATE: the scan runs in the gitleaks-scan composite's
# non-blocking mode — a finding never fails the push (you cannot retro-block
# an already-landed commit). Findings surface three
# ways: (1) the gitleaks SARIF uploaded as a build artifact (works on private
# repos with no GHAS), (2) a job-summary count, and (3) — on public / GHAS
# repos only — a Code Scanning upload. The blocking PR-time gate stays the
# pr-quality security tier.
#
# Consumed as a workflow_call target (see docs/reusable-workflows.md). Minimal
# caller:
#   on:
#     push:
#       branches: [main]
#   jobs:
#     secret-scan:
#       uses: dsj1984/mandrel-platform/.github/workflows/secret-scan-push.yml@<sha> # <tag>
#       secrets: inherit
#
# SHA-pinned third-party actions.
name: secret-scan-push

on:
  workflow_call:
    inputs:
      runner:
        description: >
          Runs-on label for the scan job. Default 'ubuntu-latest'. The
          post-merge full-history scan does not need the consumer's PR runner;
          ubuntu-latest is recommended even for self-hosted consumers.
        required: false
        type: string
        default: 'ubuntu-latest'

permissions:
  contents: read

jobs:
  gitleaks-history:
    name: gitleaks (full history, post-merge signal)
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
      # Only used by the Code Scanning upload step, which runs on public/GHAS
      # repos. Harmless (and unused) on a private repo without GHAS.
      security-events: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # fetch-depth: 0 pulls every commit reachable from the default branch,
          # not just the merge tip — the whole point of the historical scan.
          fetch-depth: 0
          persist-credentials: false

      # Download + verify a PINNED gitleaks binary and scan the full git
      # history (no log-opts → every reachable commit) via the shared
      # first-party gitleaks-scan composite action, which owns the version +
      # per-platform SHA-256 checksum map and the cross-platform asset
      # selector (darwin/linux × arm64/x64, bash-3.2-compatible). The pinned
      # binary — not the gitleaks-action — is what makes this work on a
      # private repo with no GHAS and no license. Signal channel:
      # non-blocking keeps the push green (the SARIF + summary carry the
      # findings) while download/checksum failures still fail the job.
      #
      # PIN NOTE (Story #229, same lockstep model as setup-toolchain / #162):
      # pinned to mandrel-platform-v0.21.0 (b48be23), the release SHA whose tree
      # carries the gitleaks-scan composite (bumped off the intra-PR commit
      # e5851e6 in the #252 post-release pin-bump).
      - name: Scan full history (pinned gitleaks, signal, non-blocking)
        uses: dsj1984/mandrel-platform/.github/actions/gitleaks-scan@b48be232f44cba7fb759a69808cf50fffb42895d
        with:
          mode: git
          non-blocking: 'true'
          report-format: sarif
          report-path: gitleaks.sarif

      - name: Upload gitleaks SARIF (artifact — works on private repos)
        if: ${{ always() && hashFiles('gitleaks.sarif') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gitleaks-history-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore

      - name: Job summary
        if: ${{ always() }}
        shell: bash
        run: |
          set -uo pipefail
          {
            echo "### gitleaks — full-history secret scan (signal)"
            echo ""
            # A MISSING SARIF is NOT the same as "zero findings": gitleaks always
            # writes its report on a successful scan, so an absent report reliably
            # means the scan did not complete (crash, config error, OOM). In
            # non-blocking mode the composite swallows that non-zero exit as a
            # `::warning::` — if the summary then rendered count=0 the primary
            # signal surface would show a reassuring green ✅ for a scan that never
            # ran. Render an explicit "did not produce a report" warning instead
            # (M9, temp/audits/workflow-robustness-review-2026-07-05.md).
            if [ ! -f gitleaks.sarif ]; then
              echo "⚠️ **scan did not produce a report — likely crashed.**"
              echo ""
              echo "gitleaks always writes a SARIF report on a completed scan, so"
              echo "a missing report means the scan did NOT finish (crash, config"
              echo "error, or OOM) — this is **not** a clean \"no secrets found\""
              echo "result. This full-history scan runs non-blocking, so the push"
              echo "stayed green; re-run the workflow and inspect the"
              echo "\`Scan full history\` step log for the failure. Until the scan"
              echo "completes, history is **unverified**, not clean."
            else
              count="$(jq '[.runs[].results[]?] | length' gitleaks.sarif 2>/dev/null || echo '?')"
              if [ "$count" = "0" ]; then
                echo "✅ No potential secrets found in repository history."
              else
                echo "⚠️ **${count}** potential secret finding(s) in history."
                echo ""
                echo "This is a post-merge **signal**, not a merge gate. Review the"
                echo "\`gitleaks-history-sarif\` artifact, rotate any confirmed secret,"
                echo "and purge it from history. The PR-time blocking scan is the"
                echo "pr-quality security tier."
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Code Scanning upload requires GitHub Advanced Security, unavailable on a
      # private repo without a GHAS licence. Gate to public so this signal
      # workflow stays green on private (findings still surface via the artifact
      # + job summary above).
      - name: Upload SARIF to Code Scanning (public / GHAS only)
        if: ${{ always() && github.event.repository.visibility == 'public' && hashFiles('gitleaks.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks-history
