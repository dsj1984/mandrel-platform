# Reusable full-history secret-scan workflow — post-merge SIGNAL channel.
#
# The shared pr-quality.yml security tier blocks on the PR DIFF
# (merge-base..head). Secrets already in history, or landed via a path that
# bypasses a PR (force-push, fork-merge), are never seen by the diff scan. This
# reusable workflow scans the FULL history (fetch-depth: 0) on every push to the
# caller's default branch, so historical leaks surface even though they cannot
# retro-block the merge that delivered them.
#
# SIGNAL, NOT A GATE: the scan is continue-on-error — it never fails the push
# (you cannot retro-block an already-landed commit). Findings surface three
# ways: (1) the gitleaks SARIF uploaded as a build artifact (works on private
# repos with no GHAS), (2) a job-summary count, and (3) — on public / GHAS
# repos only — a Code Scanning upload. The blocking PR-time gate stays the
# pr-quality security tier.
#
# Consumed as a workflow_call target (see docs/reusable-workflows.md). Minimal
# caller:
#   on:
#     push:
#       branches: [main]
#   jobs:
#     secret-scan:
#       uses: dsj1984/mandrel-platform/.github/workflows/secret-scan-push.yml@<sha> # <tag>
#       secrets: inherit
#
# SHA-pinned third-party actions.
name: secret-scan-push

on:
  workflow_call:
    inputs:
      runner:
        description: >
          Runs-on label for the scan job. Default 'ubuntu-latest'. The
          post-merge full-history scan does not need the consumer's PR runner;
          ubuntu-latest is recommended even for self-hosted consumers.
        required: false
        type: string
        default: 'ubuntu-latest'
      gitleaks-version:
        description: >
          Pinned gitleaks release version (without the leading 'v'). Default
          8.30.1. Bump in lockstep with the SHA-256 checksum map below.
        required: false
        type: string
        default: '8.30.1'

permissions:
  contents: read

jobs:
  gitleaks-history:
    name: gitleaks (full history, post-merge signal)
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
      # Only used by the Code Scanning upload step, which runs on public/GHAS
      # repos. Harmless (and unused) on a private repo without GHAS.
      security-events: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # fetch-depth: 0 pulls every commit reachable from the default branch,
          # not just the merge tip — the whole point of the historical scan.
          fetch-depth: 0
          persist-credentials: false

      # Download + verify a PINNED gitleaks binary. Cross-platform asset
      # selector maps runner.os/arch → the release asset, then verifies the
      # archive against a pinned SHA-256 before extraction (self-hosted
      # darwin/linux arm64+x64 and ubuntu-latest). The pinned binary — not the
      # gitleaks-action — is what makes this work on a private repo with no GHAS
      # and no license. case statement (not declare -A) keeps bash 3.2 (macOS
      # self-hosted) compatible.
      - name: Install pinned gitleaks
        shell: bash
        env:
          GITLEAKS_VERSION: ${{ inputs.gitleaks-version }}
        run: |
          set -euo pipefail
          os="$(uname -s)"; arch="$(uname -m)"
          case "$os" in
            Darwin) gl_os="darwin" ;;
            Linux)  gl_os="linux" ;;
            *) echo "::error::Unsupported OS for gitleaks asset selector: $os"; exit 1 ;;
          esac
          case "$arch" in
            arm64|aarch64) gl_arch="arm64" ;;
            x86_64|amd64)  gl_arch="x64" ;;
            *) echo "::error::Unsupported arch for gitleaks asset selector: $arch"; exit 1 ;;
          esac
          slug="${GITLEAKS_VERSION}_${gl_os}_${gl_arch}"
          case "$slug" in
            "8.30.1_darwin_arm64") expected="b40ab0ae55c505963e365f271a8d3846efbc170aa17f2607f13df610a9aeb6a5" ;;
            "8.30.1_darwin_x64")   expected="dfe101a4db2255fc85120ac7f3d25e4342c3c20cf749f2c20a18081af1952709" ;;
            "8.30.1_linux_arm64")  expected="e4a487ee7ccd7d3a7f7ec08657610aa3606637dab924210b3aee62570fb4b080" ;;
            "8.30.1_linux_x64")    expected="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb" ;;
            *) expected="" ;;
          esac
          if [ -z "$expected" ]; then
            echo "::error::No pinned checksum for gitleaks $slug — update the SHA256 map for this version/platform."
            exit 1
          fi
          asset="gitleaks_${GITLEAKS_VERSION}_${gl_os}_${gl_arch}.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${asset}"
          tmp="$(mktemp -d)"
          echo "Downloading pinned gitleaks: ${url}"
          curl -fsSL "$url" -o "${tmp}/${asset}"
          actual="$(shasum -a 256 "${tmp}/${asset}" | awk '{print $1}')"
          if [ "$actual" != "$expected" ]; then
            echo "::error::gitleaks checksum mismatch for ${asset}: expected ${expected}, got ${actual}"
            exit 1
          fi
          echo "✅ gitleaks ${asset} checksum verified."
          tar -xzf "${tmp}/${asset}" -C "${tmp}" gitleaks
          chmod +x "${tmp}/gitleaks"
          echo "GITLEAKS_BIN=${tmp}/gitleaks" >> "$GITHUB_ENV"
          "${tmp}/gitleaks" version

      # Full git history (no --log-opts → every reachable commit). Signal
      # channel: continue-on-error keeps the push green; the SARIF + summary
      # carry the findings. --redact=100 avoids echoing the secret value.
      - name: Scan full history (signal, non-blocking)
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          "${GITLEAKS_BIN}" git . --no-banner --redact=100 \
            --report-format sarif --report-path gitleaks.sarif

      - name: Upload gitleaks SARIF (artifact — works on private repos)
        if: ${{ always() && hashFiles('gitleaks.sarif') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gitleaks-history-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore

      - name: Job summary
        if: ${{ always() }}
        shell: bash
        run: |
          set -uo pipefail
          if [ -f gitleaks.sarif ]; then
            count="$(jq '[.runs[].results[]?] | length' gitleaks.sarif 2>/dev/null || echo '?')"
          else
            count="0"
          fi
          {
            echo "### gitleaks — full-history secret scan (signal)"
            echo ""
            if [ "$count" = "0" ]; then
              echo "✅ No potential secrets found in repository history."
            else
              echo "⚠️ **${count}** potential secret finding(s) in history."
              echo ""
              echo "This is a post-merge **signal**, not a merge gate. Review the"
              echo "\`gitleaks-history-sarif\` artifact, rotate any confirmed secret,"
              echo "and purge it from history. The PR-time blocking scan is the"
              echo "pr-quality security tier."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Code Scanning upload requires GitHub Advanced Security, unavailable on a
      # private repo without a GHAS licence. Gate to public so this signal
      # workflow stays green on private (findings still surface via the artifact
      # + job summary above).
      - name: Upload SARIF to Code Scanning (public / GHAS only)
        if: ${{ always() && github.event.repository.visibility == 'public' && hashFiles('gitleaks.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks-history
