# Dispatch the cross-repo smoke on every push to main (Story #38).
#
# mandrel-platform cannot faithfully smoke its own reusable workflows in-repo
# (a same-repo reference uses GitHub's lenient path). So on every push to main
# we fire a repository_dispatch at the external consumer repo
# (dsj1984/mandrel-platform-smoke), which calls pr-quality.yml@main and
# deploy-cloudflare.yml@main as a real cross-repo consumer and posts a
# `smoke/cross-repo` commit status back on this SHA. The release-please
# `await-smoke` gate blocks npm-publish until that status is green.
#
# Tokens:
#   - the pending self-status uses the built-in GITHUB_TOKEN (statuses: write).
#   - the cross-repo trigger uses SMOKE_DISPATCH_TOKEN (a fine-grained PAT with
#     Actions: write on the smoke repo — required by the workflow_dispatch API).
#     We use workflow_dispatch, NOT repository_dispatch, because gitleaks-action
#     (inside deploy-cloudflare's secret-isolation-audit) rejects the
#     repository_dispatch event. The smoke repo's gate posts the final status
#     back using the same PAT, which therefore also needs Commit statuses: write
#     on THIS repo.
name: Dispatch Cross-repo Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: smoke-dispatch-${{ github.sha }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Mark commit pending (built-in token)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          gh api -X POST "repos/${REPO}/statuses/${SHA}" \
            -f state=pending \
            -f context=smoke/cross-repo \
            -f description="cross-repo smoke dispatched" >/dev/null
          echo "smoke/cross-repo set pending on ${SHA}"

      - name: Trigger smoke via workflow_dispatch (PAT)
        env:
          GH_TOKEN: ${{ secrets.SMOKE_DISPATCH_TOKEN }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run smoke.yml \
            --repo dsj1984/mandrel-platform-smoke \
            --ref main \
            -f sha="${SHA}"
          echo "Triggered smoke (workflow_dispatch) for ${SHA}"

      # Story #296: link the dispatched smoke RUN to the pending status so
      # release-please's await-smoke gate can fail fast when that run dies at
      # startup. A `startup_failure` smoke never runs its `gate` job, so it
      # never posts a terminal `smoke/cross-repo` status of its own — the gate
      # would otherwise poll the full ~15-min budget before timing out. We
      # re-post the SAME `pending` status carrying the smoke run's URL in
      # `target_url`; await-smoke resolves that run and blocks the instant it
      # sees the run terminally concluded non-green.
      #
      # Best-effort by contract: `workflow_dispatch` does not return the run id,
      # so we correlate the newest workflow_dispatch run of smoke.yml just
      # created (per-SHA `concurrency` above serializes this job, so a same-push
      # re-run cannot interleave). A miss (run not yet registered, API blip,
      # absent token) logs a warning and leaves the plain `pending` status in
      # place — await-smoke then degrades to its existing timeout. This step
      # MUST NOT fail the job (the smoke was already triggered above), so it
      # runs WITHOUT `set -e` and always exits 0.
      - name: Link dispatched smoke run to the pending status (best-effort)
        env:
          GH_TOKEN: ${{ github.token }}
          SMOKE_TOKEN: ${{ secrets.SMOKE_DISPATCH_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -uo pipefail
          smoke_repo="dsj1984/mandrel-platform-smoke"
          run_url=""
          # Poll briefly for the just-dispatched run to register (newest
          # workflow_dispatch run of smoke.yml, createdAt-desc default sort).
          for _ in 1 2 3 4 5 6; do
            run_url="$(GH_TOKEN="${SMOKE_TOKEN}" gh run list \
              --repo "${smoke_repo}" \
              --workflow smoke.yml \
              --event workflow_dispatch \
              --limit 1 \
              --json url \
              --jq '.[0].url // ""' 2>/dev/null || echo '')"
            [ -n "${run_url}" ] && break
            sleep 5
          done
          if [ -z "${run_url}" ]; then
            echo "::warning::Could not resolve the dispatched smoke run URL — smoke/cross-repo stays plain 'pending'; await-smoke falls back to its timeout."
            exit 0
          fi
          if gh api -X POST "repos/${REPO}/statuses/${SHA}" \
            -f state=pending \
            -f context=smoke/cross-repo \
            -f description="cross-repo smoke dispatched (run linked)" \
            -f target_url="${run_url}" >/dev/null 2>&1; then
            echo "smoke/cross-repo pending status now links smoke run: ${run_url}"
          else
            echo "::warning::Failed to stamp the smoke run URL onto the pending status — non-fatal; await-smoke falls back to its timeout."
          fi
          exit 0

      # Fail-closed stays fail-closed, but loudly: without this, a failed
      # dispatch (expired SMOKE_DISPATCH_TOKEN, renamed smoke repo, …) strands
      # the `smoke/cross-repo` status at `pending` forever — release-please's
      # await-smoke gate then blocks with zero failure signal on the commit.
      # Flip the status to `failure` pointing at this run so the wedge is
      # visible and diagnosable from the commit itself.
      - name: Mark commit failed on dispatch failure (built-in token)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          gh api -X POST "repos/${REPO}/statuses/${SHA}" \
            -f state=failure \
            -f context=smoke/cross-repo \
            -f description="smoke dispatch failed — see dispatch run" \
            -f target_url="${RUN_URL}" >/dev/null
          echo "smoke/cross-repo set failure on ${SHA} (dispatch run: ${RUN_URL})"
