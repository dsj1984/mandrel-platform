# Dispatch the cross-repo smoke on every push to main (Story #38).
#
# mandrel-platform cannot faithfully smoke its own reusable workflows in-repo
# (a same-repo reference uses GitHub's lenient path). So on every push to main
# we fire a repository_dispatch at the external consumer repo
# (dsj1984/mandrel-platform-smoke), which calls pr-quality.yml@main and
# deploy-cloudflare.yml@main as a real cross-repo consumer and posts a
# `smoke/cross-repo` commit status back on this SHA. The release-please
# `await-smoke` gate blocks npm-publish until that status is green.
#
# Requires the SMOKE_DISPATCH_TOKEN secret (fine-grained PAT with actions:write
# on the smoke repo + commit-statuses:write on this repo).
name: Dispatch Cross-repo Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-dispatch-${{ github.sha }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set pending status + dispatch smoke
        env:
          GH_TOKEN: ${{ secrets.SMOKE_DISPATCH_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          # Mark the commit pending; the smoke's gate job resolves it.
          gh api -X POST "repos/${REPO}/statuses/${SHA}" \
            -f state=pending \
            -f context=smoke/cross-repo \
            -f description="cross-repo smoke dispatched" >/dev/null

          # Fire repository_dispatch at the smoke repo carrying this SHA.
          printf '{"event_type":"mandrel-smoke","client_payload":{"sha":"%s"}}' "${SHA}" > payload.json
          gh api -X POST repos/dsj1984/mandrel-platform-smoke/dispatches --input payload.json >/dev/null

          echo "Dispatched mandrel-smoke for ${SHA}; smoke/cross-repo set pending."
