# Dogfood caller: the platform runs its own full-history secret scan (#236).
#
# Invokes the reusable secret-scan-push.yml on every push to main, exactly the
# way a consumer repo does — this file is the in-repo reference example for the
# "Minimal caller" documented in docs/reusable-workflows.md. Two deliberate
# differences from a consumer's caller:
#
#   • The `uses:` ref is a same-repo RELATIVE path, not a SHA-pinned cross-repo
#     ref. A relative ref in a CALLER is legitimate (and self-updating — the
#     called workflow is always the copy on the same commit); the portability
#     lint's relative-`uses:` ban targets refs INSIDE reusable workflows
#     (`workflow_call` targets), which break cross-repo consumers, not callers.
#   • No `secrets: inherit` — the scan needs none, and this caller has no
#     consumer secrets to forward.
#
# SIGNAL, NOT A GATE: the called workflow is continue-on-error on the scan step
# and never fails the push. Findings surface via the gitleaks-history-sarif
# artifact and the job summary (see docs/reusable-workflows.md
# § secret-scan-push.yml).
name: Secret scan (push)

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    uses: ./.github/workflows/secret-scan-push.yml
    permissions:
      contents: read
      # The reusable workflow's job declares security-events: write for its
      # Code Scanning upload step (public/GHAS repos only). Granted here so the
      # called workflow's declared permissions never exceed the caller's grant.
      security-events: write
