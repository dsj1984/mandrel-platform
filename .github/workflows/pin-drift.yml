# Cross-consumer pin-drift dashboard (Story #67, MP-12).
#
# A scheduled standing check that asserts every mandrel-platform consumer
# (domio, athportal, swarm-os — data-driven via scripts/pin-drift-consumers.json)
# pins a SINGLE platform SHA across all of its workflow chains, and flags any
# consumer whose workflow `uses:` pin OR its `mandrel-platform` npm devDependency
# lags the latest mandrel-platform release (or where the two surfaces skew). The
# split-pin / release-lag / surface-skew state went undetected for releases;
# this job surfaces it automatically and renders a human-readable dashboard on
# the job summary.
#
# Coupling vs. the supply-chain hold (Story #107): the checker reads the latest
# release's published_at and SUPPRESSES lag/skew that is fully explained by the
# Renovate `minimumReleaseAge` hold window (default 3 days, mirrored in
# scripts/pin-drift-consumers.json) — Renovate has not raised the bump PR yet,
# so a one-release-behind consumer is reported as `holding`, not drift. A split
# pin is never suppressed. See docs/runbooks/pin-drift-dashboard.md.
#
# The checker (scripts/check-pin-drift.mjs) reads each consumer's
# `.github/workflows/` AND its package.json over the GitHub API via the `gh`
# CLI. The built-in
# GITHUB_TOKEN only grants read access to THIS repo, so reading the private
# consumer repos requires a fine-grained PAT (PIN_DRIFT_TOKEN) with
# Contents: read + Metadata: read on each consumer repo. When that secret is
# absent the run still completes — consumers it can't read are reported as
# `⚠️ error` rows rather than failing the job (the dashboard is informational
# by default; it does not gate).
#
# This job also composes two more GitHub-side drift dashboards, both sharing
# the same consumer registry (scripts/pin-drift-consumers.json) and the same
# non-blocking posture (standing decision #10 — report, never gate):
#
#   - scripts/check-repo-settings.mjs (Story #171): merge-method / squash-
#     source / auto-merge / Actions-token-permission drift against
#     docs/runbooks/repo-settings.json.
#   - scripts/check-ruleset.mjs (Story #178): live branch-ruleset drift
#     (PR-required, bypass actors, required status checks, linear history,
#     force-push/deletion blocked) against docs/runbooks/main-protection.json.
#
# Together these three steps are the "GitHub-side drift" pass — everything
# that lives in a consumer's GitHub API state rather than its checked-out
# files.
#
# SHA-pinned third-party actions.
name: Pin Drift Dashboard

on:
  # Mondays 07:00 UTC — a weekly standing sweep ahead of the work week.
  schedule:
    - cron: "0 7 * * 1"
  # On-demand: run the dashboard from the Actions tab.
  workflow_dispatch:
    inputs:
      strict:
        description: "Fail the job when any consumer is split-pinned or lagging"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: pin-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pin-drift:
    name: pin-drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc

      - name: Cross-consumer pin-drift dashboard
        env:
          # Cross-repo reads need a PAT; fall back to the built-in token so the
          # workflow is valid even before the secret is provisioned (cross-repo
          # rows then surface as errors rather than hard-failing).
          GH_TOKEN: ${{ secrets.PIN_DRIFT_TOKEN || github.token }}
          # Raw PIN_DRIFT_TOKEN so the script can tell a PROVIDED-but-dead PAT
          # (expired → every cross-repo row errors → hard-fail) apart from the
          # not-yet-provisioned bootstrap (absent → benign, exit 0). Empty when
          # the secret is unset (M11).
          PIN_DRIFT_TOKEN: ${{ secrets.PIN_DRIFT_TOKEN }}
          STRICT: ${{ inputs.strict && '--strict' || '' }}
        shell: bash
        run: |
          set -euo pipefail
          # STRICT is either empty or "--strict". Pass it only when set so the
          # empty case adds no argument — shellcheck SC2086-clean and safe under
          # `set -u` (no array expansion that an empty array would trip on).
          if [ -n "$STRICT" ]; then
            node scripts/check-pin-drift.mjs "$STRICT"
          else
            node scripts/check-pin-drift.mjs
          fi

      - name: Repo-settings baseline dashboard (GitHub-side drift, Story #171)
        env:
          GH_TOKEN: ${{ secrets.PIN_DRIFT_TOKEN || github.token }}
        shell: bash
        run: node scripts/check-repo-settings.mjs

      - name: Branch-ruleset drift dashboard (GitHub-side drift, Story #178)
        env:
          GH_TOKEN: ${{ secrets.PIN_DRIFT_TOKEN || github.token }}
        shell: bash
        run: node scripts/check-ruleset.mjs
