# Reusable consumer release-automation workflow — the release-lifecycle channel.
#
# mandrel-platform already runs release-please for its OWN release
# (release-please.yml), but that file is platform-internal: it is bound to this
# repo's npm-publish posture and has no `workflow_call` contract. Consumers have
# had no shared release-automation unit — each consumer's version/changelog/tag
# lifecycle was hand-rolled. This workflow closes that gap as a fourth
# distribution channel (alongside pr-quality.yml, deploy-cloudflare.yml, and the
# npm config package), extending the platform from CI/deploy into the full
# release lifecycle.
#
# WHY release-please (not changesets): the platform already depends on
# release-please for its own release train and codifies the conventional-commit
# contract in .agents/rules/git-conventions.md and release-please-config.json's
# changelog-sections. A consumer adopting this workflow inherits the SAME
# conventional-commit → version-bump → changelog mapping the platform itself
# uses, with zero new mental model. changesets would introduce a second,
# divergent authoring convention (per-change markdown intents) that conflicts
# with the commit-message-as-source-of-truth posture git-conventions.md already
# mandates. See docs/reusable-workflows.md § release-automation.yml.
#
# SCOPE: version bump + CHANGELOG + git tag + release PR/GitHub Release only.
# This unit deliberately does NOT publish to any registry — consumers deploy to
# Cloudflare, not npm, so registry publish is out of scope (Story #117). A
# consumer that DOES publish wires its own publish job keyed off this workflow's
# `release_created` / `tag_name` outputs.
#
# Consumed as a workflow_call target (see docs/reusable-workflows.md). Minimal
# caller:
#   on:
#     push:
#       branches: [main]
#   jobs:
#     release:
#       uses: dsj1984/mandrel-platform/.github/workflows/release-automation.yml@<sha> # <tag>
#       secrets: inherit
#
# SHA-pinned third-party actions.
name: release-automation

on:
  workflow_call:
    inputs:
      runner:
        description: >
          Runs-on label for the release-please job. Default 'ubuntu-latest'.
        required: false
        type: string
        default: 'ubuntu-latest'
      target-branch:
        description: >
          Branch release-please maintains the release PR against. Defaults to
          'main'. Set to your release branch if the consumer cuts releases off a
          branch other than its default.
        required: false
        type: string
        default: 'main'
      release-type:
        description: >
          release-please release strategy. Defaults to 'node' (reads/writes
          package.json version + CHANGELOG.md). Use 'simple' for a non-Node
          repo that only needs a version file + changelog, or any other
          release-please release-type. Ignored when 'config-file' is supplied
          (the config file owns per-package release-type).
        required: false
        type: string
        default: 'node'
      config-file:
        description: >
          Path to a release-please config JSON. Optional — when omitted the
          action runs in single-package mode driven by 'release-type'.
          Supply this for a monorepo, for per-package naming, or to pin
          changelog-sections to the platform's git-conventions.md mapping.
        required: false
        type: string
        default: ''
      manifest-file:
        description: >
          Path to a release-please manifest JSON. Required when 'config-file' is
          set (manifest + config are a matched pair); ignored otherwise.
        required: false
        type: string
        default: ''
    secrets:
      release-token:
        description: >
          PAT or GitHub App installation token used instead of GITHUB_TOKEN.
          STRONGLY recommended: the default GITHUB_TOKEN does NOT trigger
          downstream workflows on the release PR it opens (GitHub's
          anti-recursion safeguard), so that PR never runs the consumer's
          required CI and cannot auto-merge. A user-scoped PAT acts like a real
          user, so CI fires. Required scopes: contents:write,
          pull-requests:write. Falls back to GITHUB_TOKEN when unset.
        required: false
    outputs:
      release_created:
        description: >
          'true' when this run cut a release (the release PR merged and a tag
          was created). Wire a consumer publish/deploy job's `if:` off this.
        value: ${{ jobs.release-please.outputs.release_created }}
      tag_name:
        description: >
          The created tag name (e.g. 'v1.4.0') when release_created is 'true';
          empty otherwise.
        value: ${{ jobs.release-please.outputs.tag_name }}

permissions:
  contents: read

jobs:
  release-please:
    name: Run release-please
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    # Root/single package emits un-prefixed outputs (`release_created`,
    # `tag_name`) regardless of single-package vs config-file mode.
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Token preflight (Story #174): three independently-adopting consumers
      # each rediscovered the anti-recursion trap the Secrets table below
      # already documents — the default GITHUB_TOKEN silently degrades the
      # release PR (opens fine, but never runs required CI and never
      # auto-merges) instead of failing loudly. A `workflow_call` cannot
      # inspect the caller's secrets store directly, so this step checks
      # whether `release-token` resolved to a non-empty value and prints an
      # actionable `::warning::` when it did not — non-blocking, because
      # GITHUB_TOKEN is a legitimate (if degraded) configuration for a
      # consumer that manually merges release PRs. See docs/reusable-workflows.md
      # § release-automation.yml → Secrets for the wiring fix.
      - name: Warn when release-token is unset
        shell: bash
        env:
          RELEASE_TOKEN: ${{ secrets.release-token }}
        run: |
          if [ -z "${RELEASE_TOKEN}" ]; then
            echo "::warning::release-automation.yml: 'release-token' secret is unset — falling back to the default GITHUB_TOKEN. \
            GitHub's anti-recursion safeguard means PRs opened with GITHUB_TOKEN do NOT trigger downstream workflows, so the \
            release PR release-please just opened will never run your required CI and can never auto-merge. Wire a PAT or \
            GitHub App installation token (scopes: contents:write, pull-requests:write) as this caller's 'release-token' \
            secret. See docs/reusable-workflows.md § release-automation.yml → Secrets."
          fi

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.release-token || github.token }}
          target-branch: ${{ inputs.target-branch }}
          # release-type drives single-package mode. When the caller supplies
          # a config-file (and matched manifest-file), the config file owns
          # per-package release-type, so release-type MUST NOT be forced here
          # — passing it would shadow the config. We therefore send an empty
          # release-type in config-file mode and the single-package input
          # otherwise.
          #
          # The branch order matters: GitHub Actions `A && B || C` returns
          # operand *values* with `''` treated as falsy, so `config-file != ''
          # && '' || release-type` ALWAYS collapses to `release-type` (the `''`
          # is falsy and falls through). We must instead gate on config-file
          # being EMPTY so the truthy branch carries the value we want to keep:
          # single-package → inputs.release-type; config-file mode → ''.
          release-type: ${{ inputs.config-file == '' && inputs.release-type || '' }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
