# Generated by agents-bootstrap-github (Story #4227) from the Story-body SSOT
# (.agents/scripts/lib/story-body/story-body.js). Do NOT hand-edit the
# field set — field headings must stay in lockstep with story-body.parse().
# Re-run /agents-bootstrap-github to refresh. The CI conformance lint
# (lint-issue-body.js) is the drift guard between this form and the parser.
name: Epic
description: File a Epic that round-trips through the Mandrel body parser.
title: "[Epic]: "
labels:
  - type::epic
  - agent::review-spec
body:
  - type: markdown
    attributes:
      value: |
        Fill the fields below. They serialize to the canonical Story body
        the framework parses — keep each section's content under its own
        heading. Machine-managed sections (dispatch manifest, lifecycle
        transitions) are added by the runtime; you do not author them here.
  - type: textarea
    id: goal
    attributes:
      label: "Goal"
      description: "One sentence: the purpose of this work."
      placeholder: "Add a conformance lint that parses human-opened issue bodies."
    validations:
      required: true
  - type: textarea
    id: changes
    attributes:
      label: "Changes"
      description: "Files or globs this work touches, one per line (e.g. `- src/foo.js: add handler`). Advisory — the binding contract is Acceptance/Verify."
      placeholder: "- src/foo.js: add the handler\n- tests/foo.test.js: cover it"
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance"
      description: "Observable, checkable criteria — one per line. This is the binding definition of done."
      placeholder: "- The lint comments on a non-conformant body\n- A conformant body produces no comment"
    validations:
      required: true
  - type: textarea
    id: verify
    attributes:
      label: "Verify"
      description: "Exact commands that prove the work, one per line (annotate the tier, e.g. `(unit)`)."
      placeholder: "- npm test -- tests/foo.test.js (unit)"
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: "References"
      description: "Read-only paths worth consulting, one per line. Optional."
      placeholder: "- docs/architecture.md"
    validations:
      required: false
  - type: input
    id: depends_on
    attributes:
      label: "Blocked by"
      description: "Comma-separated issue refs this work depends on (e.g. #123, #456). Optional."
      placeholder: "#123, #456"
    validations:
      required: false
